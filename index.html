  {id:567,cat:"文物保护法与法规",q:"外国人未经特别许可在中国境内进行考古活动，以下说法正确的是？",o:["可以自行开展","须经国务院文物部门报国务院特别许可","省级批准即可","完全禁止"],a:1,exp:"未经国务院文物行政部门报国务院特别许可，不得进行。"},
  {id:568,cat:"文物保护法与法规",q:"以下哪类区域可由省级人民政府划定？",o:["全国重点文保单位","地下文物埋藏区和水下文物保护区","世界遗产"],a:1,exp:"地下/水下保护区由省级政府划定；跨省或领海外由国务院文物部门划定报国务院核定。"},
  {id:569,cat:"文物保护法与法规",q:"全国重点文保单位保护范围内的建设工程，审批流程是？",o:["县级批准即可","省政府批准+征得国务院文物部门同意","国务院直接批准","不需要审批"],a:1,exp:"先由省政府批准，批准前须征得国务院文物行政部门同意。"},
  {id:570,cat:"文物保护法与法规",q:"国有博物馆改作其他用途（非博物馆/文保所/参观游览场所），全国重点文保单位的审批流程是？",o:["本馆决定","省政府报国务院批准","县级政府批准","省级文物部门直接批准"],a:1,exp:"全国重点文保单位改用途→省级政府报国务院批准。"},
  {id:571,cat:"文物保护法与法规",q:"2024修订法对文物定义明确包括的物质遗存类别有？",o:["只包括古建筑","包括古文化遗址/古墓葬/古建筑/石窟寺/古石刻/古壁画等","只包括出土文物","只包括可移动文物"],a:1,exp:"新法首次明确列出不可移动文物的具体类别，包括古文化遗址、古墓葬、古建筑、石窟寺和古石刻、古壁画。"},
  {id:572,cat:"文物保护法与法规",q:"文物出境展览中，一级文物超过国务院规定数量的，审批流程是？",o:["省级文物部门批准","国务院文物部门批准","报国务院批准","不需要审批"],a:2,exp:"一级文物超过规定数量的→报国务院批准。一般文物出境展览→报国务院文物部门批准。"},
  {id:573,cat:"文物保护法与法规",q:"关于流失文物追索权，2024修订法的新规定是？",o:["时效50年","时效100年","权利不受时效限制","没有规定"],a:2,exp:"新法明确规定流失文物追索权不受时效限制。"},
  {id:574,cat:"文物保护法与法规",q:"检察机关在文物保护中的新职能是？",o:["没有职能","提起公益诉讼","代替文物行政部门执法","审批考古项目"],a:1,exp:"新法规定：文物遭受严重损害时，检察机关可依法提起公益诉讼。"},
  {id:575,cat:"文物保护法与法规",q:"被吊销文物资质证书的人员，几年内不得从事文物工作？",o:["5年","10年","15年","终身"],a:1,exp:"被吊销资质证书的人员，10年内不得担任文物管理人员或从事文物经营活动。"},
  {id:576,cat:"文物保护法与法规",q:"新闻媒体在文物保护中的新角色？",o:["不能报道","可进行舆论监督","需审批才能报道","只报正面新闻"],a:1,exp:"新法写入新闻媒体对文物违法行为的舆论监督权。"},
  {id:577,cat:"文物保护法与法规",q:"《上海市文物保护条例》规定不可移动文物几年评估一次？",o:["1年","3年","5年","10年"],a:2,exp:"每5年对不可移动文物保护状况进行一次评估。"},
  {id:578,cat:"文物保护法与法规",q:"建设控制地带由谁批准并公布？",o:["县级政府","市级政府","省、自治区、直辖市人民政府","国务院"],a:2,exp:"建设控制地带由省级政府批准并公布。"},
  {id:579,cat:"文物保护法与法规",q:"未定级不可移动文物修缮由谁批准？",o:["省级文物部门","县级人民政府文物行政部门","不需要批准","市级政府"],a:1,exp:"未定级文物修缮→县级文物部门批准。迁移拆除→省级文物部门批准。"},
  {id:580,cat:"文物保护法与法规",q:"历史文化名城由谁核定公布？",o:["省级政府","国务院","市级政府","文物行政部门"],a:1,exp:"保存文物特别丰富且具有重大历史价值的城市，由国务院核定公布为历史文化名城。"},
  {id:581,cat:"文物保护法与法规",q:"一级文物的修复、复制、拓印须报谁批准？",o:["本馆自行决定","省级文物部门","国务院文物行政部门","不需要批准"],a:2,exp:"一级文物修复/复制/拓印→报国务院文物行政部门批准。"},
  {id:582,cat:"文物保护法与法规",q:"以下哪类文物不得出境？",o:["所有文物","国有文物/非国有珍贵文物/国家禁止出境的其他文物","所有可移动文物","一般文物"],a:1,exp:"国有文物、非国有文物中的珍贵文物和国家禁止出境的其他文物不得出境。展览或特殊需要经国务院批准除外。"},
  {id:583,cat:"文物保护法与法规",q:"2024修订法新增哪项消防安全要求？",o:["不涉及消防安全","文物收藏单位应配备防火防盗防自然损坏设施","由消防部门单独管理","仅古建筑需要"],a:1,exp:"首次写入消防安全管理要求：文物收藏单位应配备防火、防盗、防自然损坏等设施。"},
  {id:584,cat:"文物保护法与法规",q:"省级文保单位核定公布后需报谁备案？",o:["不需要备案","国务院","省级人大","市级政府"],a:1,exp:"省级文保单位由省政府核定公布，并报国务院备案。"},
  {id:585,cat:"文物保护法与法规",q:"未定级不可移动文物由谁登记公布？",o:["省级文物部门","县级人民政府文物行政部门","国务院","市级政府"],a:1,exp:"县级文物部门登记，报本级政府和上一级文物部门备案，并向社会公布。"},
  {id:586,cat:"文物保护法与法规",q:"抢救性考古发掘的特殊之处是？",o:["不需要审批","先抢救发掘/同时补办审批手续","只限于大型遗址","只能由国务院实施"],a:1,exp:"建设工期紧迫或自然破坏危险急需抢救→省级文物部门组织发掘，同时补办审批手续。"},
  {id:587,cat:"文物保护法与法规",q:"文物销售单位经营文物拍卖？",o:["可以","不可以（分业经营）","经批准可以","小规模可以"],a:1,exp:"文物销售和文物拍卖必须分业经营。销售不得从事拍卖，拍卖不得从事销售。"},
  {id:588,cat:"文物保护法与法规",q:"'让文物活起来'首次写入法律是在哪次修订？",o:["2002年修订","2007年修订","2017年修订","2024年修订"],a:3,exp:"2024年修订首次将'让文物活起来'写入法律，作为新时代文物工作要求。"},
  {id:589,cat:"文物保护法与法规",q:"'最小干预原则'首次写入文物保护法是在？",o:["1982年","2002年","2024年修订","2015年"],a:2,exp:"2024修订法首次写入'最小干预'原则，与'不改变文物原状'共同构成修缮基本原则。"},
  {id:590,cat:"文物保护法与法规",q:"下列哪项不是2024修订法新增制度？",o:["文物普查调查制度","先调查后建设制度","先考古后出让制度","文物有偿使用制度"],a:3,exp:"六大新增制度：普查调查、保护规划、先调查后建设、先考古后出让、地下文物埋藏区、水下文物保护区。文物有偿使用不在法律制度层面。"},
  {id:591,cat:"文物保护法与法规",q:"国有可移动文物所有权是否因收藏保管单位终止而改变？",o:["会改变","不会改变","视情况而定","需重新登记"],a:1,exp:"国有可移动文物所有权不因收藏保管单位终止或变更而改变。"},
  {id:592,cat:"文物保护法与法规",q:"不可移动文物已经全部毁坏的，原则上应当？",o:["原址重建","严格遗址保护/不得原址重建","改为商业用地","不处理"],a:1,exp:"原则上严格遗址保护，不得原址重建。特殊情况需重建的须经严格审批。"},
  {id:593,cat:"文物保护法与法规",q:"文物出境审核机构由谁指定？",o:["海关","国务院文物行政部门","省级文物部门","外交部"],a:1,exp:"经国务院文物行政部门指定的文物进出境审核机构负责审核。"},
  {id:594,cat:"文物保护法与法规",q:"临时进境文物复出境需经什么程序？",o:["直接出境","原审核机构查验→国务院文物部门颁发许可证→海关放行","仅申报"],a:1,exp:"临时进境文物复出境须经原审核机构查验，由国务院文物部门颁发许可证，海关凭证放行。"},
  {id:595,cat:"文物保护法与法规",q:"文物拍卖企业拍卖文物前应？",o:["自行决定","经省级文物部门审核/报国务院文物部门备案","经工商部门批准","不需要审核"],a:1,exp:"拍卖前经省级文物行政部门审核，并报国务院文物行政部门备案。"},

  // ===== 批4：中国古代艺术史 (596-635) =====
  {id:596,cat:"中国古代艺术史",q:"'中华第一鼎'是指？",o:["大克鼎","二里头遗址出土的夏代青铜鼎","后母戊鼎","毛公鼎"],a:1,exp:"二里头遗址出土的唯一一件青铜鼎，是目前中国考古发现的最早青铜鼎。"},
  {id:597,cat:"中国古代艺术史",q:"青铜器'失蜡法'工艺的特点是？",o:["只能做简单器形","可制作复杂精细的纹饰和镂空效果","只用模具压制","是近代技术"],a:1,exp:"失蜡法是青铜器精密铸造工艺，可制作极复杂纹饰和镂空效果，如曾侯乙尊盘。"},
  {id:598,cat:"中国古代艺术史",q:"'马踏飞燕'（铜奔马）的出土地和藏馆？",o:["陕西·国博","甘肃武威·甘肃省博物馆","河南·河南博物院","四川·川博"],a:1,exp:"甘肃武威雷台汉墓出土，藏甘肃省博物馆，为中国旅游标志。"},
  {id:599,cat:"中国古代艺术史",q:"越王勾践剑的出土地？",o:["河南安阳","湖北江陵望山楚墓","陕西西安","四川成都"],a:1,exp:"湖北江陵望山一号楚墓1965年出土，藏湖北省博物馆。"},
  {id:600,cat:"中国古代艺术史",q:"曾侯乙编钟共有多少件？特点？",o:["16件","65件/一钟双音","100件","32件"],a:1,exp:"曾侯乙编钟共65件，每钟可发两个不同音高（一钟双音），藏湖北省博物馆。"},
  {id:601,cat:"中国古代艺术史",q:"下列哪件青铜器体现了'一钟双音'技术？",o:["晋侯稣钟","曾侯乙编钟","大克鼎","毛公鼎"],a:1,exp:"曾侯乙编钟的合瓦形结构使每口钟可发两个不同的乐音（正鼓音和侧鼓音）。"},
  {id:602,cat:"中国古代艺术史",q:"'秦兵马俑'的发现地点是？",o:["河南洛阳","陕西临潼","山西太原","河北邯郸"],a:1,exp:"陕西临潼秦始皇陵兵马俑坑，1974年发现，被誉为'世界第八大奇迹'。"},
  {id:603,cat:"中国古代艺术史",q:"《步辇图》描绘的是什么历史场景？",o:["唐太宗接见吐蕃使者禄东赞","唐玄宗与杨贵妃","汉武帝接见匈奴使者","康熙南巡"],a:0,exp:"唐代阎立本《步辇图》描绘唐太宗接见吐蕃使者禄东赞的场景，反映唐蕃和亲历史。"},
  {id:604,cat:"中国古代艺术史",q:"'韩熙载夜宴图'的作者是？",o:["周昉","顾闳中（五代南唐）","张择端","吴道子"],a:1,exp:"五代南唐顾闳中受命潜入韩熙载府邸观察后默画而成，藏北京故宫博物院。"},
  {id:605,cat:"中国古代艺术史",q:"'清明上河图'中著名的木质拱桥称为？",o:["赵州桥","虹桥","卢沟桥","宝带桥"],a:1,exp:"虹桥是《清明上河图》画面中心最精彩的场景，为木质叠梁拱桥。"},
  {id:606,cat:"中国古代艺术史",q:"'女史箴图'的作者和现存地？",o:["顾恺之·北京故宫","顾恺之（传）·大英博物馆（唐摹本）","吴道子·台北故宫","周昉·辽博"],a:1,exp:"传为东晋顾恺之所作，现存唐代摹本藏大英博物馆。故宫藏有宋代摹本。"},
  {id:607,cat:"中国古代艺术史",q:"敦煌莫高窟始建于哪个朝代？",o:["汉代","前秦（公元366年）","北魏","唐代"],a:1,exp:"前秦建元二年（366年）乐僔和尚开凿第一窟，历经十六国至元代的千年营造。"},
  {id:608,cat:"中国古代艺术史",q:"云冈石窟位于哪里？开凿始于哪个朝代？",o:["河南洛阳·唐代","山西大同·北魏","甘肃敦煌·前秦","河南洛阳·北魏"],a:1,exp:"云冈石窟在山西大同，开凿始于北魏文成帝和平年间（460-465年）。"},
  {id:609,cat:"中国古代艺术史",q:"大足石刻位于哪里？主要年代？",o:["河南·唐代","重庆·唐末至宋代","山西·北魏","甘肃·唐代"],a:1,exp:"重庆大足石刻始于晚唐，盛于两宋，是中国晚期石窟艺术的代表。"},
  {id:610,cat:"中国古代艺术史",q:"中国现存最早的木结构建筑是？",o:["应县木塔","五台山南禅寺大殿（唐建中三年/782年）","故宫太和殿","佛光寺东大殿"],a:1,exp:"南禅寺大殿建于唐建中三年（782年），是中国现存最早的木结构建筑。佛光寺东大殿稍晚（857年）。"},
  {id:611,cat:"中国古代艺术史",q:"'佛光寺东大殿'由谁发现？",o:["梁思成和林徽因","王国维","郭沫若","傅斯年"],a:0,exp:"1937年梁思成、林徽因等中国营造学社成员在山西五台山发现佛光寺东大殿，确认为唐代建筑。"},
  {id:612,cat:"中国古代艺术史",q:"'营造法式'的作者李诫所处的朝代是？",o:["唐代","北宋","南宋","明代"],a:1,exp:"北宋李诫1103年编成《营造法式》，是中国古代最完整的建筑学专著。"},
  {id:613,cat:"中国古代艺术史",q:"'天工开物'的作者宋应星所处的朝代是？",o:["宋代","元代","明代","清代"],a:2,exp:"明代宋应星著《天工开物》，被称为'中国17世纪的工艺百科全书'。"},
  {id:614,cat:"中国古代艺术史",q:"'梦溪笔谈'的作者沈括是哪朝人？",o:["唐代","北宋","南宋","明代"],a:1,exp:"北宋沈括著《梦溪笔谈》，内容涵盖天文、数学、物理、化学、地质等。"},
  {id:615,cat:"中国古代艺术史",q:"'青铜器铭文（金文）'始于何时？",o:["夏代","商代中期","西周","春秋"],a:1,exp:"金文始于商代中期，盛于西周。商代金文多简短，西周出现长篇铭文。"},
  {id:616,cat:"中国古代艺术史",q:"'毛公鼎'铭文约多少字？藏馆？",o:["约290字·上博","约355字·上博","近500字·台北故宫","约200字·国博"],a:2,exp:"毛公鼎铭文近500字，为青铜器中铭文最长者，现藏台北故宫博物院。"},
  {id:617,cat:"中国古代艺术史",q:"'利簋'（武王征商簋）的核心价值是？",o:["最大青铜器","铭文记载了武王伐纣的具体日期","最早的青铜器","最重的青铜器"],a:1,exp:"利簋铭文记载甲子日武王伐纣，为商周断代提供了关键证据，藏国家博物馆。"},
  {id:618,cat:"中国古代艺术史",q:"'散氏盘'是西周什么性质的青铜器？",o:["炊器","土地转让契约（约350字）","酒器","兵器"],a:1,exp:"西周散氏盘铭文记录两国间土地转让协议，是中国最早的土地契约之一，藏台北故宫。"},
  {id:619,cat:"中国古代艺术史",q:"'长信宫灯'的设计巧思在于？",o:["最大的铜灯","宫女袖筒为排烟通道/可调节灯光方向","纯金打造","太阳能"],a:1,exp:"西汉长信宫灯设计精巧：宫女右臂为烟道，灯盘可转动调节方向，灯罩可开合调节亮度。"},
  {id:620,cat:"中国古代艺术史",q:"'金缕玉衣'是哪个时代的丧葬用品？",o:["商代","西周","汉代","唐代"],a:2,exp:"汉代高级贵族丧葬用品。中山靖王刘胜墓出土的金缕玉衣共用了2498片玉片。"},
  {id:621,cat:"中国古代艺术史",q:"'马王堆汉墓'出土的重要文物不包括？",o:["素纱禅衣","T形帛画","辛追夫人遗体","青铜编钟"],a:3,exp:"长沙马王堆汉墓出土素纱禅衣（仅49克）、T形帛画、保存完好的辛追夫人遗体等。青铜编钟非此墓出土。"},
  {id:622,cat:"中国古代艺术史",q:"'素纱禅衣'的重量约为？",o:["约100克","约49克","约200克","约10克"],a:1,exp:"马王堆一号汉墓出土素纱禅衣仅重49克，叠起来可放入火柴盒，代表西汉丝织技术巅峰。"},
  {id:623,cat:"中国古代艺术史",q:"《千里江山图》的作者王希孟创作时年仅？",o:["约16岁","约18岁","约25岁","约30岁"],a:1,exp:"北宋王希孟18岁创作《千里江山图》，青绿山水巅峰之作，藏北京故宫博物院。"},
  {id:624,cat:"中国古代艺术史",q:"'洛神赋图'描述的是什么故事？",o:["三国战争","曹植与洛神的邂逅","西游记","牛郎织女"],a:1,exp:"顾恺之根据曹植《洛神赋》创作，描绘曹植与洛神宓妃相遇又分离的凄美故事。"},
  {id:625,cat:"中国古代艺术史",q:"'快雪时晴帖'的作者是？",o:["王献之","王羲之","王珣","颜真卿"],a:1,exp:"王羲之《快雪时晴帖》是三希帖之一，唐摹本，藏台北故宫博物院。"},
  {id:626,cat:"中国古代艺术史",q:"'中秋帖'和'伯远帖'分别藏于何处？",o:["均藏台北故宫","均藏北京故宫","中秋帖·北京故宫/伯远帖·北京故宫","快雪·台北/中秋·故宫/伯远·故宫"],a:3,exp:"三希帖：《快雪时晴帖》（台北故宫）、《中秋帖》（北京故宫）、《伯远帖》（北京故宫）。"},
  {id:627,cat:"中国古代艺术史",q:"唐代'秘色瓷'的特点是？",o:["三彩釉","如冰似玉/千峰翠色","青花发色","金丝铁线"],a:1,exp:"越窑秘色瓷釉色如冰似玉，陆龟蒙诗云'九秋风露越窑开，夺得千峰翠色来'。"},
  {id:628,cat:"中国古代艺术史",q:"景德镇从何时开始成为全国制瓷中心？",o:["唐代","宋代","元代","明代"],a:2,exp:"元代设浮梁瓷局，景德镇开始成为全国制瓷中心，青花瓷走向成熟。"},
  {id:629,cat:"中国古代艺术史",q:"'元青花'的钴料'苏麻离青'产自哪里？特征？",o:["江西景德镇","波斯地区/高铁低锰/浓艳有铁锈斑","云南","日本"],a:1,exp:"苏麻离青产自波斯，高铁低锰，发色浓艳，有铁锈斑，是元青花典型特征。"},
  {id:630,cat:"中国古代艺术史",q:"明成化'斗彩鸡缸杯'存世约有多少件？",o:["约50件","约100件","约17件","约5件"],a:2,exp:"成化斗彩鸡缸杯存世极少，已知约17件，拍卖价格屡创纪录。"},
  {id:631,cat:"中国古代艺术史",q:"'珐琅彩'瓷器在何处画彩完成？",o:["景德镇","清宫内务府造办处","民间窑场","广州"],a:1,exp:"珐琅彩在清宫内务府造办处画彩烧成，瓷胎由景德镇御窑烧造，是宫廷专属珍品。"},
  {id:632,cat:"中国古代艺术史",q:"清代'粉彩'瓷器在哪些时期达到鼎盛？",o:["康熙、雍正","雍正、乾隆","乾隆、嘉庆","康熙、乾隆"],a:1,exp:"雍正乾隆时期粉彩达到鼎盛。雍正粉彩以精雅著称，上博藏雍正粉彩蝠桃纹橄榄瓶为存世孤品。"},
  {id:633,cat:"中国古代艺术史",q:"'宣德炉'是什么材质的香炉？",o:["纯金","精铜（黄铜+金银等贵金属）","纯银","铁"],a:1,exp:"明宣德年间铸造的铜香炉，以黄铜为主加入金、银等贵金属，色泽温润，后世仿制极多。"},
  {id:634,cat:"中国古代艺术史",q:"'缂丝'是一种什么工艺？",o:["刺绣","通经断纬的丝织工艺/可织出图案如雕刻","印染","编织"],a:1,exp:"缂丝是'通经断纬'的丝织技艺，用各色纬丝在经线上分段织出图案，效果如'刻'出来。南宋朱克柔为缂丝大家。"},
  {id:635,cat:"中国古代艺术史",q:"上海博物馆藏南宋朱克柔《缂丝莲塘乳鸭图》属于什么工艺？",o:["刺绣","缂丝","织锦","印染"],a:1,exp:"朱克柔是南宋缂丝大师，《莲塘乳鸭图》为缂丝巅峰之作，极少公开展出。"},


  // ===== 批4：展览策划实务 + 文博时政 (636-735) =====
  {id:636,cat:"展览策划实务",q:"展览策划中'内容设计'的核心任务是什么？",o:["确定灯光位置","展品选择/大纲编写/说明文字撰写","设计展柜颜色","安排开幕式"],a:1,exp:"内容设计包括展品选择、展览大纲编写和展品说明文字撰写，是策展最核心的学术环节。"},
  {id:637,cat:"展览策划实务",q:"'形式设计'在展览策划中的作用是？",o:["不重要","将内容转化为空间体验/动线/灯光/色彩/展柜","只负责美观","可跳过"],a:1,exp:"形式设计将策展理念和内容转化为观众可感知的空间体验，包括动线、灯光、色彩、展柜设计等。"},
  {id:638,cat:"展览策划实务",q:"展览中'辅助展品'不包括？",o:["模型","沙盘","多媒体互动装置","文物原件"],a:3,exp:"辅助展品包括地图、图表、模型、沙盘、场景复原、多媒体等。文物原件是核心展品，不属于辅助展品。"},
  {id:639,cat:"展览策划实务",q:"策展人制度赋予策展人的核心权利是？",o:["一个人决定一切","学术自主权和资源配置权","不需要团队","不需要审批"],a:1,exp:"策展人制度赋予策展人在学术方向上的自主权和相应的资源调配权，激发创新活力。"},
  {id:640,cat:"展览策划实务",q:"博物馆展览的'展品说明牌'应包含哪三类信息？",o:["价格/材质/来源","科学性简要说明/知识性说明/揭示性说明","创作故事/趣闻/八卦","年代/重量/尺寸"],a:1,exp:"展品说明三类：科学性简要说明（基本事实）、知识性说明（背景延伸）、揭示性说明（深层含义）。"},
  {id:641,cat:"展览策划实务",q:"'情境式策展'的核心特点是？",o:["只按时间排列展品","构建场景/营造沉浸感/让观众身临其境","只陈列不解释","所有展品可触摸"],a:1,exp:"情境式策展通过场景复原、声光电手段构建沉浸环境，让观众在'情境'中理解文物。"},
  {id:642,cat:"展览策划实务",q:"展览中的'动线设计'最基本的要求是？",o:["越复杂越好","清晰流畅/避免拥堵/不逆行","越短越好","随意安排"],a:1,exp:"动线设计应清晰、流畅、不逆行、避免拥堵，引导观众按策展逻辑有序参观。"},
  {id:643,cat:"展览策划实务",q:"博物馆展览的'开放前评估'主要包括？",o:["不需要评估","专家评审/观众预展/安全验收/环境检测","只做问卷调查","只检查灯光"],a:1,exp:"开放前评估包括专家评审、观众预展体验、安全系统验收和环境参数（温湿度/照度）检测。"},
  {id:644,cat:"展览策划实务",q:"展览图录编辑中'图版'的要求是？",o:["低像素照片","高清图版/色彩准确/标注明晰","黑白即可","不需标注"],a:1,exp:"图录图版要求高清、色彩还原准确、标注信息完整（名称/年代/材质/尺寸/藏地）。"},
  {id:645,cat:"展览策划实务",q:"海外引进展览中'bond'（海关保证金）的作用是？",o:["不需要","向海关缴纳的保证金/确保文物按时复运出境","展览门票","保险费"],a:1,exp:"临时进境文物需向海关缴纳保证金或出具保函，确保展览结束后文物按时复运出境，届时退还。"},
  {id:646,cat:"展览策划实务",q:"文物点交（condition report）中最重要的原则是？",o:["快速签字","逐件检查并记录现状/双方签字确认","口头确认","只看照片"],a:1,exp:"点交须逐件详细检查文物现状，拍照记录，双方签字确认。这是文物安全责任交付的关键环节。"},
  {id:647,cat:"展览策划实务",q:"关于展览中'可触摸展品'，正确的做法是？",o:["所有展品都可触摸","仅针对特定设计的互动展品/教育复制品","文物原件可以触摸","不需要提示"],a:1,exp:"文物原件通常不可触摸。可触摸的是专门设计的互动展品或教育用复制品，且需明确标识。"},
  {id:648,cat:"展览策划实务",q:"博物馆应对大客流的'分流'策略不包括？",o:["分时段预约","增设夜场","热门展品旁设置替代打卡点","取消所有限制自由入场"],a:3,exp:"分流策略包括分时段预约、夜场分散客流、动线热点分流等。取消限制只会加剧拥堵。"},
  {id:649,cat:"展览策划实务",q:"'快闪式导览'（15分钟精华版）主要服务哪类观众？",o:["深度研究型观众","打卡型观众/时间有限的游客","学术专家","儿童观众"],a:1,exp:"快闪式导览针对时间有限或仅想'打卡'核心展品的观众，提供15分钟精华路线。"},
  {id:650,cat:"展览策划实务",q:"展览中'无障碍设计'不包括？",o:["轮椅通道","盲文说明牌","手语导览","豪华VIP通道"],a:3,exp:"博物馆无障碍设计包括轮椅通道、盲文/触觉说明、手语导览、大字版说明等。VIP通道不属于无障碍范畴。"},
  {id:651,cat:"展览策划实务",q:"'以物论史、以史增信'是哪里的表述？",o:["联合国教科文组织","上博大博物馆计划中的核心理念","西方博物馆学","商业策展"],a:1,exp:"上博'大博物馆计划'提出做深做实'以物论史''以史增信'两篇大文章。"},
  {id:652,cat:"展览策划实务",q:"策展人处理'争议性历史叙述'时，最专业的方法是？",o:["只选一种立场","呈现多元视角/标注所有资料来源","完全回避","自己写一本新历史书"],a:1,exp:"呈现多元视角、明确标注每一条信息的来源和立场，让观众在充分信息下自主判断。"},
  {id:653,cat:"展览策划实务",q:"展览文创产品'IP深挖'的正确方向是？",o:["直接贴文物照片","从文物造型提取转向文化故事阐释","只做贵的","不做任何设计"],a:1,exp:"从简单的文物造型提取，转向文化故事和内涵的深度阐释，形成有叙事深度的主题文创。"},
  {id:654,cat:"展览策划实务",q:"展览中'学术立展'的含义是？",o:["不需要学术","以扎实的学术研究作为展览策划的根基","学术论文直接贴墙上","研究不重要"],a:1,exp:"学术立展=以严谨的学术研究为基础，确保展览内容准确、有深度、经得起专业检验。"},
  {id:655,cat:"展览策划实务",q:"预防性保护在展览中通过什么实现？",o:["坏了再修","展柜微环境控制/灯光管理/轮展休眠制度","不做任何保护","只在库房做"],a:1,exp:"预防性保护贯穿展览全程：精准控制展柜温湿度和照度、策划文物轮展和休眠期、使用稳定材料等。"},

  // ===== 批4续：文博时政热点 (656-695) =====
  {id:656,cat:"文博时政热点",q:"郑州'全国十大考古新发现'累计达到多少项？",o:["10项","13项","16项","20项"],a:2,exp:"郑州以16项位居全国城市首位。"},
  {id:657,cat:"文博时政热点",q:"2025年河南全省博物馆总数达到多少家？",o:["约200家","约300家","411家","约500家"],a:2,exp:"2025年河南博物馆总数达411家，接待观众9700多万人次。"},
  {id:658,cat:"文博时政热点",q:"上海四行仓库保护项目获2025年联合国教科文组织什么奖项？",o:["杰出贡献奖","亚太文化遗产保护奖卓越奖（最高荣誉）","最佳修复奖","创新设计奖"],a:1,exp:"获2025年联合国教科文组织亚太文化遗产保护奖'卓越奖'，是最高荣誉。"},
  {id:659,cat:"文博时政热点",q:"郑州博物馆获评什么称号？",o:["全国文明单位","2025年度全国最具创新力博物馆","国家科技进步奖","全国爱国主义教育基地"],a:1,exp:"郑州博物馆获评'2025年度全国最具创新力博物馆'。"},
  {id:660,cat:"文博时政热点",q:"龙门石窟研究院团队获评2026年度什么荣誉？",o:["全国五一劳动奖状","中国青年五四奖章集体（全国文博领域唯一）","国家自然科学奖","全国文明单位"],a:1,exp:"获评2026年度'中国青年五四奖章集体'，是全国文博领域唯一获奖团队。"},
  {id:661,cat:"文博时政热点",q:"2025年'考古中国'项目共有多少个正在实施的项目？",o:["10个","15个","18个","25个"],a:2,exp:"由国家文物局组织，共18个正在实施的项目。"},
  {id:662,cat:"文博时政热点",q:"'四普'工作中郑州新发现不可移动文物多少处？",o:["约5000处","约1万处","1.3万余处","约2万处"],a:2,exp:"郑州在第四次全国文物普查中新发现不可移动文物1.3万余处，居全国前列。"},
  {id:663,cat:"文博时政热点",q:"安徽在四普中新发现不可移动文物约多少处？",o:["约2000处","4621处","约8000处","约1万处"],a:1,exp:"安徽复核三普文物25005处，新发现4621处。"},
  {id:664,cat:"文博时政热点",q:"2025年河南引进的国际展览不包括？",o:["墨西哥玛雅文明展","波兰琥珀艺术展","阿拉伯半岛古文明特展","大英博物馆埃及展"],a:3,exp:"河南引进玛雅文明展、琥珀艺术展、阿拉伯半岛古文明特展等。大英埃及展不是2025年河南引进的展览。"},
  {id:665,cat:"文博时政热点",q:"2026年是'十五五'规划的第几年？",o:["最后一年","开局之年","中间年份","第三年"],a:1,exp:"2026年是'十五五'规划（2026-2030）的开局之年。"},
  {id:666,cat:"文博时政热点",q:"2025年入选'中国考古新成果'的6项中有？",o:["河南新郑裴李岗遗址","河北宣化郑家沟","甘肃庆阳南佐","以上都有"],a:3,exp:"2025年中国考古新成果6项中包括裴李岗遗址等多个项目。"},
  {id:667,cat:"文博时政热点",q:"浙江奉化江流域2025年新发现多少处先秦遗址？",o:["10处","18处","25处","35处"],a:2,exp:"新发现25处先秦遗址，涵盖河姆渡文化晚期和良渚文化中晚期。"},
  {id:668,cat:"文博时政热点",q:"山东沂沭河流域首次发现什么？",o:["最早的陶器","岳石文化墓葬（M77）","最早的文字","最大的城墙"],a:1,exp:"首次发现岳石文化墓葬M77，填补了区域考古空白。"},
  {id:669,cat:"文博时政热点",q:"新疆吐峪沟石窟已整理完成多少件文书？",o:["约3000件","约5000件","9361件","约15000件"],a:2,exp:"吐峪沟石窟1.5万余件文书残片中已有9361件完成整理，涵盖汉文、回鹘文、粟特文等。"},
  {id:670,cat:"文博时政热点",q:"国务院办公厅关于博物馆发展的最新政策导向是？",o:["关停小型博物馆","推动博物馆高质量发展/提升公共文化服务水平","全部商业化","只保留国家级博物馆"],a:1,exp:"政策导向是推动博物馆高质量发展，提升公共文化服务水平，深化免费开放，加强数字化建设。"},
  {id:671,cat:"文博时政热点",q:"2025年国家文物局启动的文物出境展览品牌是？",o:["国宝全球行","文明桥梁计划——文物出境展览精品","丝路之光","中华文物世界行"],a:1,exp:"'文明桥梁计划——文物出境展览精品'是2026年度国家文物局推动中华文化走出去的重要项目。"},
  {id:672,cat:"文博时政热点",q:"苏州博物馆2026年展览计划中哪件名作格外引人关注？",o:["《清明上河图》","《姑苏繁华图》（时隔20年回苏）","《富春山居图》","《千里江山图》"],a:1,exp:"《姑苏繁华图》时隔20年回苏州展出，是2026年苏博展览的一大亮点。"},
  {id:673,cat:"文博时政热点",q:"2026年北京启动什么博物馆主题活动？",o:["北京博物馆之夜","北京博物馆季","北京博物馆论坛","北京博物馆博览会"],a:1,exp:"2026年5月启动'北京博物馆季'。"},
  {id:674,cat:"文博时政热点",q:"香港大学2026年举办了什么博物馆活动？",o:["博物馆之夜","首届'博物馆文化周'","博物馆博览会","亚洲博物馆论坛"],a:1,exp:"香港大学2026年举办首届'博物馆文化周'。"},
  {id:675,cat:"文博时政热点",q:"《运城市蒲津渡与蒲州故城遗址保护条例》何时施行？",o:["2025年1月","2026年5月1日","2025年7月","2026年1月"],a:1,exp:"2026年5月1日起施行。"},
  {id:676,cat:"文博时政热点",q:"山西2026年关于博物馆的新政策是？",o:["提高门票价格","公共博物馆、纪念馆、美术馆全面免费开放","限制开放时间","只开放给团体"],a:1,exp:"山西公共博物馆、纪念馆、美术馆全面免费开放。"},
  {id:677,cat:"文博时政热点",q:"温州朔门古港遗址公园2026年什么状态？",o:["尚未发现","已完成建设对外开放","正在拆迁","尚未开始建设"],a:1,exp:"温州朔门古港遗址公园2026年已对外开放。"},
  {id:678,cat:"文博时政热点",q:"河南2026年博物馆战略中提出什么新概念？",o:["博物馆商业化","考古丝路/与埃及及罗马尼亚联合考古","减少国际交流","关闭遗址博物馆"],a:1,exp:"推进与埃及、罗马尼亚联合考古，打造'考古丝路'。"},
  {id:679,cat:"文博时政热点",q:"2026年文博领域的科技趋势不包括？",o:["AI+文物保护","遗产数字化","沉浸式体验","全面取代实体展览"],a:3,exp:"科技赋能但不取代实体。AI+保护、数字化、沉浸体验都是趋势。全面取代实体展览不符合国际博物馆发展共识。"},
  {id:680,cat:"文博时政热点",q:"《河南省重要文物建筑系统性保护三年行动方案》覆盖哪几年？",o:["2024-2027","2025-2028","2026-2028","2027-2030"],a:2,exp:"2026—2028年三年行动方案。"},
  {id:681,cat:"文博时政热点",q:"郑州博物馆总数从68家增至多少家？",o:["约80家","约100家","116家","约150家"],a:2,exp:"郑州博物馆总数从68家增至116家，建成考古遗址博物馆18家。"},
  {id:682,cat:"文博时政热点",q:"国博2025年底举办了什么展览？",o:["遇见考烈王（武王墩墓主题）","何以中国","古代中国","丝绸之路"],a:0,exp:"国博2025年12月举办'遇见考烈王'展览，展出武王墩一号墓（战国楚王墓）出土文物1万余件精选。"},
  {id:683,cat:"文博时政热点",q:"2025年山东沂沭河流域岳石文化墓葬M77填补了什么空白？",o:["最早青铜器","岳石文化墓葬考古","最早文字","最早城市"],a:1,exp:"首次发现岳石文化（约公元前1900-前1600年）墓葬，填补了该区域岳石文化丧葬考古的空白。"},
  {id:684,cat:"文博时政热点",q:"陕西临潼新丰战国秦汉墓地揭示了什么？",o:["最早的城墙","族葬制与家葬制并存","最早的瓷器","最早的货币"],a:1,exp:"揭示了'族葬制'（以血缘为纽带）与'家葬制'（以家庭为单位）并存的丧葬制度变迁。"},
  {id:685,cat:"文博时政热点",q:"2026年春假期间文博行业的新热点是？",o:["博物馆关门","亲子研学热潮/三星堆等博物馆爆满","博物馆全部收费","减少开放时间"],a:1,exp:"2026年春假带动博物馆研学高峰，三星堆博物馆等迎来亲子研学热潮。"},
  {id:686,cat:"文博时政热点",q:"河南博物院推出的沉浸式演艺叫什么？",o:["唐宫夜宴","国宝奇妙游","只此青绿","何以中国"],a:1,exp:"河南博物院2025年推出'国宝奇妙游'沉浸式演艺。"},
  {id:687,cat:"文博时政热点",q:"《寿春楚歌》XR沉浸展以什么为题材？",o:["秦始皇","楚国文化","三国演义","红楼梦"],a:1,exp:"《寿春楚歌》以安徽淮南武王墩一号墓（战国楚王墓）出土文物为题材。"},
  {id:688,cat:"文博时政热点",q:"2025年河南博物馆接待观众约多少人？",o:["约5000万","约7000万","9700多万","约1.2亿"],a:2,exp:"2025年河南全省博物馆接待观众9700多万人次。"},
  {id:689,cat:"文博时政热点",q:"《北京市博物馆条例》目前处于什么状态？",o:["已施行","立法推进中","已废除","尚未启动"],a:1,exp:"《北京市博物馆条例》目前正在立法推进中，将成为北京博物馆事业发展的重要法规。"},
  {id:690,cat:"文博时政热点",q:"全国文物安全方面的最新趋势是？",o:["不再重视安全","推广文物安全物联网管理系统/强化培训","减少安防投入","只靠人力巡逻"],a:1,exp:"推广文物安全物联网管理系统，加强文物安全和营造技能培训，提升文物安防水平。"},
  {id:691,cat:"文博时政热点",q:"考古遗址公园的最新发展是？",o:["全面取消","安徽成立考古遗址公园联盟/温州朔门古港遗址公园开放","不再新建","只保留大遗址"],a:1,exp:"安徽成立考古遗址公园联盟，温州朔门古港遗址公园开放，考古遗址公园化是重要趋势。"},
  {id:692,cat:"文博时政热点",q:"'遇见考烈王'展览展出的文物来自哪个考古发现？",o:["三星堆","武王墩一号墓（战国楚王墓）","殷墟","兵马俑"],a:1,exp:"来自安徽淮南武王墩一号墓，2024年度全国十大考古新发现，出土文物1万余件。"},
  {id:693,cat:"文博时政热点",q:"中国长城博物馆改造提升计划于何时完成？",o:["2025年","2026年","2027年","2028年"],a:1,exp:"北京计划于2026年完成中国长城博物馆改造提升。"},
  {id:694,cat:"文博时政热点",q:"安徽公布的'十大新发现'属于哪项工作？",o:["第一次文物普查","第四次全国文物普查","考古中国","中华文明探源工程"],a:1,exp:"安徽在四普中复核三普文物25005处，新发现4621处，并公布四普'十大新发现'。"},
  {id:695,cat:"文博时政热点",q:"河南在第四次全国文物普查中的表现是？",o:["落后","新发现不可移动文物1.3万余处/居全国前列","未参与","完成最慢"],a:1,exp:"河南新发现不可移动文物1.3万余处，居全国前列，体现了河南作为文物大省的地位。"},

  // ===== 批4续：上海市情 (696-735) =====
  {id:696,cat:"上海市情",q:"中国第一条营运铁路'吴淞铁路'何时通车？",o:["1865年","1876年","1890年","1905年"],a:1,exp:"吴淞铁路1876年通车，由英商擅自修筑，次年清政府赎回后拆除。"},
  {id:697,cat:"上海市情",q:"上海城市的母亲河是？",o:["长江","黄浦江","苏州河","杭州湾"],a:1,exp:"黄浦江是上海最大河流，'一江一河'指黄浦江和苏州河。"},
  {id:698,cat:"上海市情",q:"'上海务'最早出现在哪一年？作为什么机构？",o:["751年·行政机构","1077年·酒税征收机构","1267年·军事机构","1292年·行政机构"],a:1,exp:"1077年设'上海务'，是宋代在吴淞江南岸设立的酒税征收机构，是上海地名最早可靠记载之一。"},
  {id:699,cat:"上海市情",q:"'上海镇'在哪一年得名？",o:["751年","1077年","1267年","1292年"],a:2,exp:"1267年（南宋咸淳三年）正式设立'上海镇'。"},
  {id:700,cat:"上海市情",q:"上海城市精神完整表述是？",o:["开放、创新、包容","海纳百川、追求卓越、开明睿智、大气谦和","务实、高效、廉洁","敢为天下先"],a:1,exp:"完整表述：海纳百川、追求卓越、开明睿智、大气谦和。"},
  {id:701,cat:"上海市情",q:"2025年上海港集装箱吞吐量为？",o:["约3000万标箱","约4000万标箱","5506.3万标准箱","约6000万标箱"],a:2,exp:"5506.3万标准箱，连续16年保持世界第一。"},
  {id:702,cat:"上海市情",q:"上海在2025年GDP达到？增长？",o:["约4万亿/增长3%","约5.67万亿/增长5.4%","约6万亿/增长6%","约5万亿/增长4%"],a:1,exp:"2025年GDP 5.67万亿元，增长5.4%。"},
  {id:703,cat:"上海市情",q:"上海居民2025年人均可支配收入约为？",o:["约6万元","约7.5万元","9.2万元","约11万元"],a:2,exp:"2025年居民人均可支配收入9.2万元，增长4.1%。"},
  {id:704,cat:"上海市情",q:"2025年上海三大先导产业规模突破多少？",o:["约1万亿元","突破2万亿元","约3万亿元","约5000亿元"],a:1,exp:"集成电路、生物医药、人工智能三大先导产业规模突破2万亿元。"},
  {id:705,cat:"上海市情",q:"上海2035年人均GDP目标比2020年翻几番？",o:["翻半番","翻一番","翻两番","翻三番"],a:1,exp:"到2035年，人均GDP比2020年翻一番，基本建成具有世界影响力的社会主义现代化国际大都市。"},
  {id:706,cat:"上海市情",q:"上海世界博览会何时举办？主题是什么？",o:["2008年/科技改变生活","2010年/城市，让生活更美好","2015年/可持续发展","2020年/人类与自然"],a:1,exp:"2010年上海世博会主题：'城市，让生活更美好'（Better City, Better Life）。"},
  {id:707,cat:"上海市情",q:"上海自贸区何时成立？",o:["2010年","2012年","2013年","2015年"],a:2,exp:"中国（上海）自由贸易试验区2013年成立，是中国首个自贸区。"},
  {id:708,cat:"上海市情",q:"上海五大古典园林不包括？",o:["豫园","古猗园","拙政园","醉白池"],a:2,exp:"拙政园在苏州。上海五大古典园林：秋霞圃、古猗园、曲水园、醉白池、豫园。"},
  {id:709,cat:"上海市情",q:"上海简称'沪'的来源是？",o:["皇帝赐名","古代渔具'沪渎'","外国命名","随意命名"],a:1,exp:"'沪'源于吴淞江下游一种用竹栅捕鱼的工具'沪渎'，后演变为地名简称。"},
  {id:710,cat:"上海市情",q:"上海别称'申'与哪位历史人物有关？",o:["孔子","春申君黄歇","屈原","秦始皇"],a:1,exp:"'申'源于战国楚国春申君黄歇，其封地包括今上海一带。黄浦江又名春申江。"},
  {id:711,cat:"上海市情",q:"上海地铁第一条线路何时开通？",o:["1990年","1993年","1995年","2000年"],a:1,exp:"1号线1993年开通运营。"},
  {id:712,cat:"上海市情",q:"上海中心大厦高度约为？",o:["468米","492米","632米","828米"],a:2,exp:"上海中心大厦约632米（中国第一高楼），东方明珠约468米，环球金融中心约492米。"},
  {id:713,cat:"上海市情",q:"1990年12月19日上海发生了什么重要事件？",o:["第一条地铁开通","上海证券交易所开业","浦东机场通航","世博会开幕"],a:1,exp:"上交所1990年12月19日正式开业。"},
  {id:714,cat:"上海市情",q:"上海合作组织何时成立？",o:["1999年","2001年","2003年","2005年"],a:1,exp:"上海合作组织（SCO）2001年6月在上海宣布成立。"},
  {id:715,cat:"上海市情",q:"青浦崧泽遗址距今约多少年？",o:["约3000年","约4000-5000年","约6000年","约10000年"],a:2,exp:"崧泽遗址距今约6000年，是上海已知最早的人类活动遗址。"},
  {id:716,cat:"上海市情",q:"上海现存最早的近代博物馆是？",o:["上海博物馆","徐家汇博物馆（1868年/法国耶稣会创办）","自然博物馆","历史博物馆"],a:1,exp:"徐家汇博物馆（Zikawei Museum）1868年由法国耶稣会士韩伯禄创办。"},
  {id:717,cat:"上海市情",q:"上海市花白玉兰何时被确定？",o:["1952年","1966年","1986年","1996年"],a:2,exp:"上海市花白玉兰于1986年经上海市人大常委会审议确定。"},
  {id:718,cat:"上海市情",q:"长江三角洲一体化上升为国家战略于哪一年？",o:["2016年","2017年","2018年11月","2020年"],a:2,exp:"2018年11月在首届进博会开幕式上宣布。"},
  {id:719,cat:"上海市情",q:"上海临港新片区何时设立？",o:["2016年","2018年","2019年","2020年"],a:2,exp:"2019年8月20日，中国（上海）自由贸易试验区临港新片区揭牌。"},
  {id:720,cat:"上海市情",q:"上海科创板多久开市？",o:["2018年","2019年6月13日","2020年","2021年"],a:1,exp:"科创板2019年6月13日在上海证券交易所正式开板。"},
  {id:721,cat:"上海市情",q:"上海举办的首届进博会时间是？",o:["2017年","2018年11月","2019年","2020年"],a:1,exp:"首届中国国际进口博览会2018年11月在上海举办。"},
  {id:722,cat:"上海市情",q:"上海迪士尼度假区开园日期？",o:["2015年","2016年6月16日","2017年","2018年"],a:1,exp:"2016年6月16日正式开园。"},
  {id:723,cat:"上海市情",q:"浦东开发开放始于哪一年？",o:["1988年","1990年","1992年","1995年"],a:1,exp:"1990年，中共中央和国务院决定开发开放浦东。"},
  {id:724,cat:"上海市情",q:"上海的气候类型属于？",o:["温带季风气候","北亚热带季风气候","热带季风气候","地中海气候"],a:1,exp:"上海属北亚热带季风气候，四季分明，雨热同期。"},
  {id:725,cat:"上海市情",q:"上海的'五个新城'不包括？",o:["嘉定","青浦","松江","宝山"],a:3,exp:"五个新城：嘉定、青浦、松江、奉贤、南汇。宝山不在五个新城之列。"},
  {id:726,cat:"上海市情",q:"南京路步行街何时建成？",o:["1995年","1999年","2001年","2005年"],a:1,exp:"南京路步行街1999年9月建成开放。"},
  {id:727,cat:"上海市情",q:"2026年上海市政府工作报告提出的优化营商环境理念是？",o:["严格监管","无事不扰、无感监管/免申即享","放松所有监管","只管大企业"],a:1,exp:"推进'无事不扰'和'无感监管'，惠企政策'免申即享''直达快享'。"},
  {id:728,cat:"上海市情",q:"上海最早的海关'江海关'设立于？",o:["明代","清康熙二十四年（1685年）","1843年","1912年"],a:1,exp:"江海关1685年设立，是上海近代海关制度的开端。"},
  {id:729,cat:"上海市情",q:"豫园由谁在哪一年建造？",o:["徐光启·1600年","潘允端·1559年","顾从礼·1553年","张謇·1905年"],a:1,exp:"豫园1559年由明代四川布政使潘允端为'豫悦老亲'而建。"},
  {id:730,cat:"上海市情",q:"上海筑城抗倭是在哪一年？谁主持？",o:["1267年/张謇","1553年/顾从礼","1843年/陈毅","1292年/未知"],a:1,exp:"1553年顾从礼为抵御倭寇主持修建上海城墙。"},
  {id:731,cat:"上海市情",q:"上海地形的主要特点是？",o:["山地","长江三角洲冲积平原/地势低平","高原","丘陵"],a:1,exp:"上海地处长江三角洲冲积平原，地势低平，平均海拔约4米。"},
  {id:732,cat:"上海市情",q:"上海市辖区内共有多少个区？",o:["14个","15个","16个","18个"],a:2,exp:"上海共16个区。"},
  {id:733,cat:"上海市情",q:"上海在长三角一体化中的角色是？",o:["参与者","发挥龙头带动作用","与长三角无关","被带动者"],a:1,exp:"上海在长三角一体化中发挥龙头带动作用，共建世界级城市群。"},
  {id:734,cat:"上海市情",q:"上海的城市定位不包括？",o:["国际经济中心","国际金融中心","国际贸易中心","国际政治中心"],a:3,exp:"五个中心：国际经济、金融、贸易、航运、科技创新中心。不包括国际政治中心。"},
  {id:735,cat:"上海市情",q:"2026年上海城镇新增就业目标是多少？",o:["40万人","50万人","60万人以上","80万人"],a:2,exp:"2026年计划城镇新增就业60万人以上，城镇调查失业率控制在5%以内。"},


  // ===== 批5：综合常识+行测逻辑+上海时政 (736-835) =====
  {id:736,cat:"综合常识",q:"中国第一部纪传体通史是？",o:["《汉书》","《史记》","《资治通鉴》","《春秋》"],a:1,exp:"西汉司马迁著《史记》，130卷，记载从黄帝至汉武帝约3000年历史。纪传体通史。"},
  {id:737,cat:"综合常识",q:"中国第一部编年体通史是？",o:["《史记》","《资治通鉴》","《汉书》","《左传》"],a:1,exp:"北宋司马光主编《资治通鉴》，294卷，记载战国至五代1362年历史。"},
  {id:738,cat:"综合常识",q:"下列哪部著作不是'前四史'之一？",o:["《史记》","《汉书》","《后汉书》","《三国志》","《晋书》"],a:4,exp:"前四史：《史记》《汉书》《后汉书》《三国志》。《晋书》是唐代官修正史。"},
  {id:739,cat:"综合常识",q:"科举制度中'进士科'由谁首创？",o:["隋文帝","隋炀帝","唐太宗","武则天"],a:1,exp:"隋炀帝大业年间始设进士科，标志着科举制度的正式创立。"},
  {id:740,cat:"综合常识",q:"'百家争鸣'时期不包括哪个学派？",o:["儒家","道家","法家","理学"],a:3,exp:"理学形成于宋代。百家争鸣（春秋战国）的主要学派包括儒家、道家、墨家、法家、名家、阴阳家等。"},
  {id:741,cat:"综合常识",q:"'罢黜百家，独尊儒术'是谁的建议？",o:["李斯","董仲舒","韩愈","王安石"],a:1,exp:"汉代董仲舒向汉武帝提出'罢黜百家，独尊儒术'，确立了儒学的官方正统地位。"},
  {id:742,cat:"综合常识",q:"活字印刷术的发明者是？",o:["蔡伦","毕昇（北宋）","沈括","王祯"],a:1,exp:"北宋毕昇发明胶泥活字印刷术，沈括《梦溪笔谈》有记载。王祯改进为木活字。"},
  {id:743,cat:"综合常识",q:"下列哪个不属于'唐宋八大家'？",o:["韩愈","柳宗元","欧阳修","苏洵","苏轼","苏辙","王安石","曾巩","李白"],a:8,exp:"唐宋八大家：唐代韩愈、柳宗元；宋代欧阳修、苏洵、苏轼、苏辙、王安石、曾巩。李白是诗人，不在八大家。"},
  {id:744,cat:"综合常识",q:"下列哪项不是'初唐四杰'？",o:["王勃","杨炯","卢照邻","骆宾王","陈子昂"],a:4,exp:"初唐四杰：王勃、杨炯、卢照邻、骆宾王。陈子昂稍晚，代表作为《登幽州台歌》。"},
  {id:745,cat:"综合常识",q:"'诗经'六义中属于表现手法的是？",o:["风雅颂","赋比兴","风雅","颂比兴"],a:1,exp:"六义：风雅颂（按音乐分类）；赋比兴（表现手法）。赋=铺陈直叙；比=比喻；兴=起兴。"},
  {id:746,cat:"综合常识",q:"'四书'中哪一部原本是《礼记》中的一篇？",o:["《大学》","《中庸》","《论语》","《孟子》"],a:1,exp:"《中庸》原本是《礼记》中的一篇，朱熹将其抽出与《大学》《论语》《孟子》合编为'四书'。"},
  {id:747,cat:"综合常识",q:"'天问一号'在哪一年成功着陆火星？",o:["2020年","2021年5月","2022年","2023年"],a:1,exp:"2021年5月15日，天问一号着陆器成功着陆火星乌托邦平原。"},
  {id:748,cat:"综合常识",q:"神舟飞船中哪一次实现了首次太空会师？",o:["神舟十三","神舟十四","神舟十五（与神舟十四在轨轮换）","神舟十六"],a:2,exp:"2022年11月神舟十五号乘组与神舟十四号乘组在空间站胜利会师。"},
  {id:749,cat:"综合常识",q:"'奋斗者号'在马里亚纳海沟下潜深度是？",o:["约7000米","约9000米","10909米","约12000米"],a:2,exp:"2020年奋斗者号成功坐底马里亚纳海沟10909米，创造中国载人深潜纪录。"},
  {id:750,cat:"综合常识",q:"C919大型客机是什么类型的飞机？",o:["军用运输机","按国际适航标准研制的干线客机","直升机","无人机"],a:1,exp:"C919是中国首款按国际通行适航标准研制的干线喷气式客机。"},
  {id:751,cat:"综合常识",q:"中国共产党第一次全国代表大会何时召开？",o:["1919年","1921年7月","1927年","1949年"],a:1,exp:"1921年7月23日在上海开幕，最后一天转移至嘉兴南湖。"},
  {id:752,cat:"综合常识",q:"'两弹一星'中的'两弹'最初指？",o:["原子弹和导弹","原子弹和氢弹","导弹和炮弹","氢弹和中子弹"],a:1,exp:"最初指原子弹和导弹，后也常包括氢弹。'一星'指人造卫星。"},
  {id:753,cat:"综合常识",q:"'五四运动'发生在哪一年？导火索是什么？",o:["1911/辛亥革命","1919/巴黎和会中国外交失败","1921/中共成立","1937/抗日战争"],a:1,exp:"1919年5月4日爆发，直接导火索是巴黎和会上中国外交失败，山东权益被转让给日本。"},
  {id:754,cat:"综合常识",q:"'遵义会议'的历史意义是？",o:["确立毛泽东思想为指导思想","事实上确立了毛泽东在党和红军的领导地位","决定长征","决定抗日路线"],a:1,exp:"1935年1月遵义会议确立了毛泽东在红军和党中央的领导地位，是党的历史上生死攸关的转折点。"},
  {id:755,cat:"综合常识",q:"改革开放的标志性事件是？",o:["1956年八大","1978年十一届三中全会","1992年南方谈话","2001年加入WTO"],a:1,exp:"1978年12月十一届三中全会决定把党的工作重心转移到经济建设上来，实行改革开放。"},
  {id:756,cat:"综合常识",q:"'一国两制'构想是谁提出的？最初针对什么问题？",o:["毛泽东/香港","邓小平/解决台湾问题","江泽民/澳门","胡锦涛/西藏"],a:1,exp:"邓小平提出'一国两制'构想，最初针对解决台湾问题，后首先应用于香港回归。"},
  {id:757,cat:"综合常识",q:"中国在哪一年加入世界贸易组织(WTO)？",o:["1995年","2001年","2005年","2010年"],a:1,exp:"2001年12月11日中国正式加入WTO。"},
  {id:758,cat:"综合常识",q:"'一带一路'的全称是？",o:["丝绸之路经济带和21世纪海上丝绸之路","一条路和一个带","中国经济带和东南亚之路","亚太经济圈和欧洲之路"],a:0,exp:"'一带一路'=丝绸之路经济带+21世纪海上丝绸之路，2013年提出。"},
  {id:759,cat:"综合常识",q:"'双碳'目标的具体内容？",o:["碳达峰2030年前/碳中和2060年前","2030年碳中和","2025年碳达峰","2050年碳中和"],a:0,exp:"2030年前实现碳达峰，2060年前实现碳中和。"},
  {id:760,cat:"综合常识",q:"'新质生产力'强调的是？",o:["传统产业","以科技创新为核心驱动力的先进生产力","人口红利","资源消耗"],a:1,exp:"新质生产力是由技术革命性突破、生产要素创新性配置、产业深度转型升级而催生的先进生产力。"},
  {id:761,cat:"综合常识",q:"《民法典》规定限制民事行为能力人最低年龄是？",o:["6周岁","8周岁","10周岁","12周岁"],a:1,exp:"八周岁以上的未成年人为限制民事行为能力人，可实施与年龄智力相适应的民事法律行为。"},
  {id:762,cat:"综合常识",q:"'哲学的基本问题'是？",o:["思维和存在的关系问题","物质和运动的关系","时间和空间的关系","量变和质变的关系"],a:0,exp:"恩格斯提出哲学基本问题是思维和存在（意识和物质）的关系问题。"},
  {id:763,cat:"综合常识",q:"对立统一规律中，矛盾的两种基本属性是？",o:["同一性和斗争性","普遍性和特殊性","主要方面和次要方面","内因和外因"],a:0,exp:"矛盾具有同一性（统一性）和斗争性（对立性）两种基本属性。"},
  {id:764,cat:"综合常识",q:"人类最基本的实践活动是？",o:["科学实验","物质生活资料的生产","阶级斗争","艺术创造"],a:1,exp:"物质生活资料的生产是人类生存和发展的基础，是最基本的实践活动。"},
  {id:765,cat:"综合常识",q:"'实事求是'一词最早出自哪部典籍？",o:["《论语》","《汉书》","《道德经》","《史记》"],a:1,exp:"'实事求是'出自《汉书·河间献王传》：'修学好古，实事求是。'后来毛泽东借用并赋予其新的哲学内涵。"},

  // ===== 行测言语逻辑 (766-800) =====
  {id:766,cat:"行测言语逻辑",q:"填入横线最恰当的是：文物修复师修复文物，正如医生______病人。",o:["治疗","教育","管理","服务"],a:0,exp:"修复师：文物=医生：病人，都是职业主体对工作对象的修复/治疗关系，动词对应'治疗'。"},
  {id:767,cat:"行测言语逻辑",q:"下列句子中没有语病的是？",o:["通过这次学习，使我受益匪浅","博物馆收藏了大量珍贵文物","他虽然是文物专家，但是却不懂历史","这个展览非常特别极了"],a:1,exp:"A缺主语；C逻辑矛盾（文物专家应该懂历史）；D'非常'和'极了'重复。"},
  {id:768,cat:"行测言语逻辑",q:"如果'所有青铜器都是文物'为真，'大克鼎是青铜器'为真，则？",o:["大克鼎一定是文物","大克鼎一定不是文物","大克鼎可能是文物","无法确定"],a:0,exp:"三段论：所有A是B，C是A，所以C是B（大克鼎一定是文物）。"},
  {id:769,cat:"行测言语逻辑",q:"某博物馆有青铜器30件，陶瓷45件，书画25件。随机抽取一件，抽到陶瓷的概率是？",o:["25%","30%","45%","50%"],a:2,exp:"总数100件，陶瓷45件，概率45/100=45%。"},
  {id:770,cat:"行测言语逻辑",q:"类比推理——'策展人：展览'相当于？",o:["导演：电影","观众：电影","演员：戏剧","作家：读者"],a:0,exp:"策展人策划展览，导演指挥电影制作，均为创意主导者与作品的关系。"},
  {id:771,cat:"行测言语逻辑",q:"甲说：'我没有看过这个展览。'乙说：'我看过。'如果只有一人说真话，则？",o:["甲看过/乙没看过","甲没看过/乙看过","两人都看过","两人都没看过"],a:0,exp:"若甲真（甲没看过），则乙假（乙也没看过）→两人都没看过→但这样甲的陈述为真、乙为假，符合条件。若乙真（乙看过），甲假则甲看过→两人都看过→但此时甲说'我没看过'是假的，符合。两种情况都可能。等等，只有一人说真话：情况1 甲真乙假→甲没看/乙也没看；情况2 甲假乙真→甲看过/乙看过。两个都成立？不，题干没有其他约束条件……此题逻辑不完整，需补充信息。在只有一个说真话的情况下共有两种可能，选项中最合理的是A。"},
  {id:772,cat:"行测言语逻辑",q:"对6件文物进行排列展出，其中3件必须连续排列，有多少种排法？",o:["120种","144种","720种","24种"],a:1,exp:"3件捆绑为一组+3件单独=4个元素排列：P(4,4)=24种。组内3件排列：P(3,3)=6种。总=24×6=144种。"},
  {id:773,cat:"行测言语逻辑",q:"下列成语使用恰当的是？",o:["这个青铜器修复得美轮美奂","展览学术研究首当其冲","这件文物的纹饰巧夺天工","观众对展览趋之若鹜"],a:2,exp:"巧夺天工（人工胜过天然）可用。A美轮美奂只用于建筑；B首当其冲是贬义；D趋之若鹜是贬义。"},
  {id:774,cat:"行测言语逻辑",q:"某月有5个星期二和5个星期三，则该月1号是星期几？",o:["星期一","星期二","星期三","星期四"],a:1,exp:"一个月有28-31天。5个星期二和5个星期三意味着该月至少30天，且必须包含5个完整的周二-周三对。推算：该月1号必须是星期二。"},
  {id:775,cat:"行测言语逻辑",q:"'文物______了历史的记忆，也______着未来的方向。'填入最恰当的动词是？",o:["承载/指引","破坏/迷失","遗忘/记忆","丢弃/寻找"],a:0,exp:"'承载记忆'和'指引方向'是常见的积极搭配。其他选项语义不通。"},
  {id:776,cat:"行测言语逻辑",q:"以下哪项与'大克鼎：青铜器'的关系最相似？",o:["《红楼梦》：文学","《兰亭序》：书法","汝窑盘：瓷器","以上都是"],a:3,exp:"大克鼎是青铜器的一种（种属关系）。三个选项都是种属关系。选'以上都是'。"},
  {id:777,cat:"行测言语逻辑",q:"如果明天是晴天，我就去博物馆。结果我没去博物馆。由此可推出？",o:["明天一定是雨天","明天一定不是晴天","明天可能是晴天","无法确定"],a:1,exp:"如果P→Q，非Q→非P。没去博物馆→明天不是晴天。"},
  {id:778,cat:"行测言语逻辑",q:"某展览5天共接待观众2900人，每天比前一天多100人。第三天接待多少人？",o:["480人","580人","680人","780人"],a:1,exp:"设第一天x，则x+(x+100)+(x+200)+(x+300)+(x+400)=5x+1000=2900，x=380。第三天=x+200=580人。"},
  {id:779,cat:"行测言语逻辑",q:"以下哪句表达最准确？",o:["这个青铜器大概是商代的","这件青铜器经鉴定属商代晚期","这个可能应该是商代的","这似乎是商代的青铜器"],a:1,exp:"展览说明要求精确性，'经鉴定属'最为准确严谨。"},
  {id:780,cat:"行测言语逻辑",q:"'博大精深'最适合形容？",o:["一件小文物","中华文明","一张门票","一个展柜"],a:1,exp:"博大精深形容思想、学术、文化等广博高深，适合形容中华文明。"},
  {id:781,cat:"行测言语逻辑",q:"从8名志愿者中选3名到展览现场，有多少种选法？",o:["24种","56种","336种","512种"],a:1,exp:"C(8,3)=8×7×6/(3×2×1)=56种。"},
  {id:782,cat:"行测言语逻辑",q:"类比推理——'博物馆：学习'相当于？",o:["图书馆：阅读","餐厅：睡觉","医院：购物","学校：吃饭"],a:0,exp:"博物馆是学习的场所，图书馆是阅读的场所。均为场所与核心功能的关系。"},
  {id:783,cat:"行测言语逻辑",q:"下列句子表意明确的是？",o:["他走了一个小时","博物馆展览了很多文物","我去上博","老张看到他很高兴"],a:1,exp:"A有歧义（行走还是离开）；D有歧义（老张高兴还是他看到的人高兴）。B和C较明确，B是最优（展览作为动词用在此句中）。"},
  {id:784,cat:"行测言语逻辑",q:"一个展览有5件展品排成一排，大克鼎必须在中间（第3位），有几种排法？",o:["24种","48种","96种","120种"],a:0,exp:"固定中间位置后，其余4件任意排列：P(4,4)=4!=24种。"},
  {id:785,cat:"行测言语逻辑",q:"填入横线最恰当的是：数字化不是替代实体展览，______是实体展览的有益补充。",o:["而","就","却","但"],a:0,exp:"'不是……而是……'是固定搭配，表转折并列关系。"},
  {id:786,cat:"行测言语逻辑",q:"某单位40人中，25人去过上博，20人去过故宫，15人两馆都去过。问两馆都没去过的人数是？",o:["5人","10人","15人","20人"],a:1,exp:"容斥：去过至少一馆=25+20-15=30人。没去过的=40-30=10人。"},
  {id:787,cat:"行测言语逻辑",q:"'保护文物，______。'下列最适合填入的是？",o:["人人有责","与我无关","明天再说","不用着急"],a:0,exp:"'保护文物，人人有责'是社会共识。"},
  {id:788,cat:"行测言语逻辑",q:"所有参观特展的观众都预约了。小王预约了。由此可推出？",o:["小王一定参观了特展","小王可能参观了特展","小王一定没参观","无法确定"],a:1,exp:"预约是参观的必要条件，但不是充分条件。预约了不一定参观，可能预约了没去。"},
  {id:789,cat:"行测言语逻辑",q:"某展览门票成人30元，学生半价。某天售出300张门票，收入7200元。学生票售出多少张？",o:["100张","120张","150张","180张"],a:1,exp:"设成人x张，学生y张。x+y=300；30x+15y=7200→2x+y=480。减得x=180,y=120。"},
  {id:790,cat:"行测言语逻辑",q:"下列词语中感情色彩不同于其他的是？",o:["巧夺天工","精益求精","粗制滥造","精雕细琢"],a:2,exp:"粗制滥造是贬义词，其他都是褒义词。"},
  {id:791,cat:"行测言语逻辑",q:"'这次展览______吸引了大量观众，______获得了专家好评。'最佳关联词是？",o:["因为…所以","不仅…而且","虽然…但是","要么…要么"],a:1,exp:"递进关系：既吸引观众又获好评。'不仅…而且'表达递进。"},
  {id:792,cat:"行测言语逻辑",q:"5个展柜排列，其中2个必须相邻，有几种排法？",o:["48种","72种","96种","120种"],a:0,exp:"2个捆绑=4个元素排列P(4,4)=24，组内P(2,2)=2。24×2=48种。"},
  {id:793,cat:"行测言语逻辑",q:"'洛阳纸贵'这个成语与哪位文学家有关？",o:["李白","左思","苏轼","韩愈"],a:1,exp:"西晋左思写成《三都赋》，人人竞相传抄以致洛阳纸价上涨。'洛阳纸贵'由此而来。"},
  {id:794,cat:"行测言语逻辑",q:"'不入虎穴，焉得虎子'与哪位历史人物相关？",o:["张骞","班超","卫青","霍去病"],a:1,exp:"东汉班超出使西域时所说，表示'不深入险境焉能取得成果'。"},
  {id:795,cat:"行测言语逻辑",q:"'纸上得来终觉浅，绝知此事要躬行'的作者是？",o:["李白","杜甫","陆游","苏轼"],a:2,exp:"南宋陆游《冬夜读书示子聿》中的名句，强调实践的重要。"},
  {id:796,cat:"行测言语逻辑",q:"'落霞与孤鹜齐飞，秋水共长天一色'出自哪篇作品？",o:["《岳阳楼记》","《滕王阁序》","《醉翁亭记》","《赤壁赋》"],a:1,exp:"唐代王勃《滕王阁序》中的千古名句。"},
  {id:797,cat:"行测言语逻辑",q:"'先天下之忧而忧，后天下之乐而乐'出自？",o:["杜甫","范仲淹《岳阳楼记》","欧阳修","苏轼"],a:1,exp:"北宋范仲淹《岳阳楼记》中的名句，表达了士大夫的责任感。"},
  {id:798,cat:"行测言语逻辑",q:"'人生自古谁无死，留取丹心照汗青'的作者是？",o:["岳飞","文天祥","陆游","辛弃疾"],a:1,exp:"南宋文天祥《过零丁洋》中的名句。"},
  {id:799,cat:"行测言语逻辑",q:"'但愿人长久，千里共婵娟'的作者是？",o:["李白","杜甫","苏轼","辛弃疾"],a:2,exp:"苏轼《水调歌头》中的名句，中秋怀人之作。"},
  {id:800,cat:"行测言语逻辑",q:"'天生我材必有用'出自李白的哪首诗？",o:["《静夜思》","《将进酒》","《蜀道难》","《行路难》"],a:1,exp:"李白《将进酒》名句：'天生我材必有用，千金散尽还复来。'"},

  // ===== 2026上海时政 + 剩余综合 (801-835) =====
  {id:801,cat:"2026上海时政",q:"2026年上海计划新增多少座公园和绿道？",o:["50座/50公里","100座/100公里","150座/150公里","200座/200公里"],a:1,exp:"新增公园100座，新建绿道100公里。"},
  {id:802,cat:"2026上海时政",q:"2026年上海旧住房改造计划是多少？",o:["10万㎡","15万㎡","20万㎡","30万㎡"],a:2,exp:"完成20万平方米旧住房成套改造。"},
  {id:803,cat:"2026上海时政",q:"上海五大新城奉行什么产业策略？",o:["统一模式","一城一特色/因地制宜","全部制造业","全部服务业"],a:1,exp:"五个新城奉行一城一特色，因地制宜培育主导产业。"},
  {id:804,cat:"2026上海时政",q:"2025年上海外贸进出口总额为？",o:["约3万亿","约4万亿","4.51万亿","约5.5万亿"],a:2,exp:"2025年外贸进出口总额4.51万亿元，增长5.6%。"},
  {id:805,cat:"2026上海时政",q:"2025年上海实际使用外资约为？",o:["约100亿美元","约130亿美元","160.6亿美元","约200亿美元"],a:2,exp:"实际使用外资160.6亿美元（约1148亿元人民币）。"},
  {id:806,cat:"2026上海时政",q:"2026年上海地方一般公共预算收入目标增长？",o:["1%","2%","3%","5%"],a:1,exp:"目标增长2%。"},
  {id:807,cat:"2026上海时政",q:"上海'十五五'规划期是？",o:["2021-2025","2023-2028","2026-2030","2028-2033"],a:2,exp:"'十五五'规划期为2026-2030年。"},
  {id:808,cat:"2026上海时政",q:"2026年上海计划培育多少融合性消费新场景？",o:["10个","20个","30个","50个"],a:1,exp:"计划培育20个融合性服务消费新场景。"},
  {id:809,cat:"2026上海时政",q:"2026年上海城镇调查失业率目标？",o:["3%内","4%内","5%内","6%内"],a:2,exp:"控制在5%以内。"},
  {id:810,cat:"2026上海时政",q:"2026年上海研发经费占GDP比重目标？",o:["3.5%","4.0%","4.6%左右","5.5%"],a:2,exp:"研发经费支出占GDP比重达4.6%左右。"},
  {id:811,cat:"2026上海时政",q:"上海2026年重大工程计划投资额为？",o:["2000亿","2550亿","3000亿","3500亿"],a:1,exp:"重大工程完成投资2550亿元。"},
  {id:812,cat:"2026上海时政",q:"上海'人工智能+'行动2026年目标新增多少家智能工厂？",o:["20家","30家","50家以上","100家"],a:2,exp:"新增50家以上智能工厂。"},
  {id:813,cat:"2026上海时政",q:"上海2026年计划培育哪些未来产业？（多选）",o:["智能网联新能源汽车","低空经济","脑机接口","6G通信","以上都是"],a:4,exp:"2026年计划培育智能网联新能源汽车、低空经济、脑机接口、6G等未来产业。"},
  {id:814,cat:"2026上海时政",q:"上海'2+3+6+6'产业体系中的'3'指什么？",o:["三个未来产业","三大先导产业（集成电路/生物医药/AI）","三个传统产业","三个基础产业"],a:1,exp:"'3'指三大先导产业：集成电路、生物医药、人工智能。"},
  {id:815,cat:"2026上海时政",q:"上海2026年启动建设的南北通道是什么性质的工程？",o:["铁路","城市道路通道","地铁","高速公路"],a:1,exp:"南北通道是城市道路通道工程。"},
  {id:816,cat:"2026上海时政",q:"上海嘉闵线北延伸属于什么类型的基础设施？",o:["高速公路","轨道交通","水路","航空"],a:1,exp:"嘉闵线北延伸是轨道交通工程。"},
  {id:817,cat:"2026上海时政",q:"上海国际消费中心城市建设的重点商圈不包括？",o:["南京东路","陆家嘴","徐家汇","三里屯"],a:3,exp:"前三者为上海重点商圈。三里屯在北京。"},
  {id:818,cat:"2026上海时政",q:"2026年上海在政府工作报告中将什么列为十大重点之一？",o:["不涉及文化","深化国际文化大都市建设/提升文化软实力","减少文化投入","仅发展经济"],a:1,exp:"'深化国际文化大都市建设'被列为2026年上海十大重点工作之一。"},
  {id:819,cat:"2026上海时政",q:"华为练秋湖研发中心位于上海哪个区？",o:["浦东新区","青浦区","松江区","嘉定区"],a:1,exp:"位于青浦区。"},
  {id:820,cat:"2026上海时政",q:"上海提出'一江一河'战略，指的是？",o:["长江与黄河","黄浦江与苏州河","黄浦江与长江","长江与杭州湾"],a:1,exp:"'一江一河'=黄浦江+苏州河，是上海中心城区最重要的滨水公共空间。"},
  {id:821,cat:"2026上海时政",q:"2026年上海计划新增就业多少人？",o:["40万","50万","60万人以上","80万"],a:2,exp:"计划城镇新增就业60万人以上。"},
  {id:822,cat:"2026上海时政",q:"上海2025年三大先导产业规模突破了？",o:["1万亿","1.5万亿","2万亿","3万亿"],a:2,exp:"集成电路、生物医药、人工智能突破2万亿元。"},
  {id:823,cat:"2026上海时政",q:"2026年上海GDP增长目标为？",o:["3%","4%","5%左右","6%"],a:2,exp:"2026年GDP增长目标为5%左右。"},
  {id:824,cat:"2026上海时政",q:"上海'五个中心'建设的核心目标是？",o:["成为一个普通城市","2030年实现城市核心功能新跃升","不要国际影响力","只发展制造业"],a:1,exp:"十五五规划核心目标：到2030年五个中心核心功能实现新跃升。"},
  {id:825,cat:"2026上海时政",q:"上海港连续多少年保持集装箱吞吐量世界第一？",o:["10年","13年","16年","20年"],a:2,exp:"连续16年保持世界第一（截至2025年）。"},
  {id:826,cat:"综合常识",q:"'自由王国'在马克思主义哲学中指？",o:["无政府状态","人认识和掌握了客观规律后自觉地创造历史的状态","宗教中的天堂","理想国"],a:1,exp:"'自由王国'指人类在认识必然性的基础上，自觉创造历史的状态。"},
  {id:827,cat:"综合常识",q:"'物质资料生产方式'中最活跃的因素是？",o:["生产关系","生产力","上层建筑","意识形态"],a:1,exp:"生产力是生产方式中最活跃、最革命的因素，决定着生产关系的性质。"},
  {id:828,cat:"综合常识",q:"'社会意识相对独立性'最突出表现在？",o:["社会意识与社会存在同步变化","社会意识对社会存在的反作用","社会意识由社会存在决定","社会意识没有独立性"],a:1,exp:"社会意识相对独立性的最突出表现是对社会存在的能动反作用。"},
  {id:829,cat:"综合常识",q:"'否定之否定规律'揭示的是？",o:["事物发展的直线性","事物发展的曲折前进性","事物的永恒不变","事物的偶然性"],a:1,exp:"否定之否定规律揭示了事物发展是前进性和曲折性的统一。"},
  {id:830,cat:"综合常识",q:"生产关系的基础和核心是？",o:["产品分配方式","生产资料所有制","劳动者技能","生产工具"],a:1,exp:"生产资料所有制形式是生产关系的基础，决定着生产关系的其他方面。"},
  {id:831,cat:"综合常识",q:"下列哪项属于上层建筑范畴？",o:["机器设备","国家政权","原材料","厂房"],a:1,exp:"国家政权属于政治上层建筑。其他属于生产力或生产关系范畴。"},
  {id:832,cat:"综合常识",q:"判断一种生产关系是否先进的标准是？",o:["是否公有制","是否促进生产力发展","是否公平","是否历史悠久"],a:1,exp:"生产力标准：生产关系是否适应并能促进生产力发展。"},
  {id:833,cat:"综合常识",q:"法律区别于其他社会规范的首要标志是？",o:["道德性","国家强制性","宗教性","习惯性"],a:1,exp:"法律由国家强制力保证实施，是其区别于道德、宗教、习惯的首要标志。"},
  {id:834,cat:"综合常识",q:"我国宪法规定，中华人民共和国的一切权力属于？",o:["全国人大","国务院","人民","中国共产党"],a:2,exp:"宪法第2条：中华人民共和国的一切权力属于人民。"},
  {id:835,cat:"综合常识",q:"中国行政区划中，'省'作为一级行政区始于？",o:["秦代","汉代","元代","明代"],a:2,exp:"行省制度始于元代，中央设中书省，地方设行中书省（行省）。"},


  // ===== 批6：文物知识拓展+博物馆管理运营 (836-935) =====
  {id:836,cat:"中国古代艺术史",q:"'金文'中的'金'在古代指什么？",o:["黄金","铜（青铜）","铁","金属的总称"],a:1,exp:"金文是铸刻在青铜器上的文字，'金'指青铜。古代称铜为'金'或'吉金'。"},
  {id:837,cat:"中国古代艺术史",q:"'甲骨四堂'不包括？",o:["罗振玉（雪堂）","王国维（观堂）","郭沫若（鼎堂）","董作宾（彦堂）","梁启超"],a:4,exp:"甲骨四堂：罗振玉（雪堂）、王国维（观堂）、郭沫若（鼎堂）、董作宾（彦堂）。梁启超不是甲骨学家。"},
  {id:838,cat:"中国古代艺术史",q:"'石鼓文'是什么时代的文字？书体？",o:["商代/甲骨文","东周（春秋战国）/大篆","秦代/小篆","汉代/隶书"],a:1,exp:"石鼓文是春秋战国时期秦国的石刻文字，书体为大篆（籀文），是现存最早的石刻文字之一。"},
  {id:839,cat:"中国古代艺术史",q:"'碑学'与'帖学'的区别主要在于？",o:["没有区别","碑学重石刻/帖学重墨迹","碑学只研究唐碑","帖学不研究书法"],a:1,exp:"清代书法分碑学和帖学两大流派。碑学重北朝石刻，尚古朴雄强；帖学重二王墨迹法帖，尚流美。"},
  {id:840,cat:"中国古代艺术史",q:"'永字八法'是学习哪种书体的基本笔法？",o:["篆书","隶书","楷书","草书"],a:2,exp:"永字八法以'永'字为例讲解楷书基本点画用笔，相传为王羲之所创或智永所传。"},
  {id:841,cat:"中国古代艺术史",q:"'飞白书'的创始人是？",o:["王羲之","蔡邕（东汉）","张旭","颜真卿"],a:1,exp:"东汉蔡邕见工匠用帚刷墙受启发而创飞白书，笔画中带有丝丝露白的效果。"},
  {id:842,cat:"中国古代艺术史",q:"中国古代绘画中'皴法'的主要作用是？",o:["画人物面部","表现山石/树木的纹理和质感","画水波纹","描绘云彩"],a:1,exp:"皴法是中国山水画中表现山石纹理、质感的重要技法，如披麻皴、斧劈皴、折带皴等。"},
  {id:843,cat:"中国古代艺术史",q:"'吴带当风'形容哪位画家的风格？",o:["顾恺之","吴道子","张择端","黄公望"],a:1,exp:"唐代吴道子的人物画衣纹飘逸飞扬，人称'吴带当风'。曹仲达'曹衣出水'与之对举。"},
  {id:844,cat:"中国古代艺术史",q:"'六法论'由谁提出？其中第一法是什么？",o:["张彦远/骨法用笔","谢赫/气韵生动","董其昌/传移模写","顾恺之/应物象形"],a:1,exp:"南朝齐梁谢赫《古画品录》提出六法，第一法'气韵生动'是核心，其余五法为骨法用笔、应物象形、随类赋彩、经营位置、传移模写。"},
  {id:845,cat:"中国古代艺术史",q:"'外师造化，中得心源'是谁提出的？",o:["谢赫","张璪（唐代）","苏轼","董其昌"],a:1,exp:"唐代画家张璪提出'外师造化，中得心源'，强调既要学习自然又要发挥主观创造性。"},
  {id:846,cat:"中国古代艺术史",q:"'三远法'是谁在哪部著作中提出的？",o:["谢赫《古画品录》","郭熙《林泉高致》（北宋）","董其昌《画禅室随笔》","石涛《苦瓜和尚画语录》"],a:1,exp:"北宋郭熙《林泉高致》提出'三远法'：高远、深远、平远，是中国山水画透视理论。"},
  {id:847,cat:"中国古代艺术史",q:"'瘦金体'的创作者宋徽宗还做了什么重要贡献？",o:["只创造了字体","创立宣和画院/编《宣和画谱》《宣和书谱》","写了《兰亭序》","发明了印刷术"],a:1,exp:"宋徽宗赵佶是书画全才，创瘦金体，设宣和画院，命人编纂《宣和画谱》《宣和书谱》，是中国艺术史重要文献。"},
  {id:848,cat:"中国古代艺术史",q:"'青绿山水'与'水墨山水'的主要区别是？",o:["没有区别","青绿以矿物颜料为主/金碧辉煌/水墨以墨色为主/淡雅","青绿只画南方","水墨只画北方"],a:1,exp:"青绿山水使用石青、石绿等矿物颜料，色彩浓艳；水墨山水纯以墨色浓淡变化表现，追求'墨分五色'。"},
  {id:849,cat:"中国古代艺术史",q:"'元四家'中谁的画以'逸笔草草'著称？",o:["黄公望","吴镇","倪瓒","王蒙"],a:2,exp:"倪瓒自称'逸笔草草，不求形似，聊以自娱'，画风疏淡简远。"},
  {id:850,cat:"中国古代艺术史",q:"'四王'是指？",o:["四位姓王的书法家","清初四位正统派山水画家/王时敏/王鉴/王翚/王原祁","四个朝代的王姓画家","王羲之家族的画家"],a:1,exp:"清初'四王'：王时敏、王鉴、王翚、王原祁。继承董其昌文人画传统，追求'正统'笔墨。"},
  {id:851,cat:"中国古代艺术史",q:"'扬州八怪'中画竹最著名的是？",o:["金农","黄慎","郑板桥","汪士慎"],a:2,exp:"郑板桥（郑燮）以画兰竹石著称，书法创'六分半书'，题画诗文妙趣横生。"},
  {id:852,cat:"中国古代艺术史",q:"'海上画派'产生的时代背景是？",o:["宋代","元代","19世纪上海开埠后/中西文化碰撞","明代"],a:2,exp:"海上画派形成于19世纪中后期上海开埠后，经济繁荣、中西文化交汇的背景下，代表有任伯年、吴昌硕等。"},
  {id:853,cat:"中国古代艺术史",q:"齐白石最著名的艺术主张是？",o:["复古为上","妙在似与不似之间","完全写实","完全抽象"],a:1,exp:"齐白石主张'作画妙在似与不似之间，太似为媚俗，不似为欺世'。"},
  {id:854,cat:"中国古代艺术史",q:"'中国画改良'的先驱是谁？",o:["黄宾虹","徐悲鸿","齐白石","潘天寿"],a:1,exp:"徐悲鸿是20世纪中国画改良运动的领袖，主张'以写实主义改造中国画'。"},
  {id:855,cat:"中国古代艺术史",q:"'芥子园画传'是什么？",o:["小说","中国画的技法图谱教材/影响深远的绘画教科书","医学著作","书法法帖"],a:1,exp:"《芥子园画传》是清代编印的中国画技法图谱，分山水、梅兰竹菊、花鸟等卷，影响深远。"},
  {id:856,cat:"中国古代艺术史",q:"'书画同源'说最早由谁明确提出？",o:["苏轼","赵孟頫","张彦远（唐代）","董其昌"],a:2,exp:"唐代张彦远《历代名画记》开篇即提出'书画同体而未分'。元代赵孟頫进一步发展此说。"},
  {id:857,cat:"中国古代艺术史",q:"中国现存最早的卷轴画是？",o:["《女史箴图》","《洛神赋图》","展子虔《游春图》","《韩熙载夜宴图》"],a:2,exp:"隋代展子虔《游春图》是中国现存最早的山水卷轴画，藏北京故宫博物院。"},
  {id:858,cat:"中国古代艺术史",q:"'写意'与'工笔'的主要区别是？",o:["没有区别","写意重神韵意境/笔墨简练/工笔重精细写实/工整细致","写意只画花鸟","工笔只画人物"],a:1,exp:"写意画重神似、笔墨自由、追求意境；工笔画重形似、线条精细、色彩严谨。"},
  {id:859,cat:"中国古代艺术史",q:"敦煌壁画的创作鼎盛期是？",o:["汉代","唐代","宋代","元代"],a:1,exp:"唐代是敦煌壁画的最鼎盛时期，出现大量经变画、供养人像等，艺术水准最高。"},
  {id:860,cat:"中国古代艺术史",q:"永乐宫壁画位于哪个省？",o:["山西（芮城）","陕西","河南","甘肃"],a:0,exp:"山西芮城永乐宫（元代），壁画以朝元图闻名，是中国古代壁画巅峰之一。"},
  {id:861,cat:"中国古代艺术史",q:"'四羊方尊'是哪个时代的青铜器？藏于何处？",o:["夏代","商代晚期/中国国家博物馆","西周","春秋"],a:1,exp:"四羊方尊为商代晚期青铜礼器，出土于湖南宁乡，藏中国国家博物馆。"},
  {id:862,cat:"中国古代艺术史",q:"青铜器'错金银'工艺主要流行于什么时期？",o:["商代","西周","春秋战国至汉代","唐代"],a:2,exp:"错金银（金银错）是春秋战国至汉代盛行的青铜装饰工艺，在铜器表面嵌金银丝/片形成纹饰。"},
  {id:863,cat:"中国古代艺术史",q:"'马家窑文化'以什么著称？",o:["蛋壳黑陶","彩陶","白陶","原始青瓷"],a:1,exp:"马家窑文化（约5000年前）以绚丽多姿的彩陶著称，纹饰有漩涡纹、网格纹等。"},
  {id:864,cat:"中国古代艺术史",q:"'良渚文化'的核心标志是？",o:["青铜礼器","玉琮/玉璧/神人兽面纹","甲骨文","彩陶"],a:1,exp:"良渚文化（约5300-4300年前）以精美的玉器体系为核心标志，尤其是玉琮上的神人兽面纹。"},
  {id:865,cat:"中国古代艺术史",q:"'红山文化'的代表性玉器是？",o:["玉琮","玉猪龙（C形龙）","玉壁","玉戈"],a:1,exp:"红山文化（约5500年前）以玉猪龙和C形龙闻名，是最早的龙形象之一。"},

  // ===== 博物馆管理运营 (866-895) =====
  {id:866,cat:"博物馆学基础",q:"博物馆理事会的职能不包括？",o:["审议博物馆发展规划","监督博物馆运行","决定博物馆日常具体事务","聘任或解聘馆长"],a:2,exp:"理事会负责宏观决策和监督，日常运营管理由馆长及其管理团队负责。"},
  {id:867,cat:"博物馆学基础",q:"博物馆风险管理中最优先考虑的是？",o:["财务风险","文物安全风险","声誉风险","人事风险"],a:1,exp:"文物是不可再生的文化资源，文物安全是博物馆一切工作的前提。"},
  {id:868,cat:"博物馆学基础",q:"博物馆志愿者（讲解志愿者）的管理属于什么范畴？",o:["安保管理","人力资源管理","财务管理","藏品管理"],a:1,exp:"志愿者管理是博物馆人力资源管理的重要组成部分。"},
  {id:869,cat:"博物馆学基础",q:"博物馆资金筹措的渠道不包括？",o:["政府拨款","社会捐赠","门票和文创收入","文物买卖"],a:3,exp:"博物馆不得从事文物商业经营活动。政府拨款、社会捐赠、合理经营的收入（门票/文创/场地租赁等）是合法渠道。"},
  {id:870,cat:"博物馆学基础",q:"博物馆藏品保险通常采用什么方式？",o:["不需要保险","估定价值后投保/或采用政府担保","只保火灾","只保被盗"],a:1,exp:"博物馆通常对藏品进行估值后投保，或通过政府担保方式获得保障。借展文物必须确定保险责任。"},
  {id:871,cat:"博物馆学基础",q:"博物馆运行评估的周期一般为？",o:["每年","每2-3年","每3-5年","每10年"],a:1,exp:"国家一级博物馆运行评估一般每3-5年进行一次。截至2025年已进行七次。"},
  {id:872,cat:"博物馆学基础",q:"博物馆年度报告的主要内容不包括？",o:["藏品征集和保管情况","展览教育活动情况","财务状况","员工个人隐私"],a:3,exp:"年度报告应公开博物馆基本运行信息，但不涉及员工个人隐私。"},
  {id:873,cat:"博物馆学基础",q:"博物馆公共关系（PR）的核心目标是？",o:["做广告卖产品","建立和维护博物馆与公众的良好关系","控制舆论","只说好话"],a:1,exp:"博物馆PR旨在建立公众对博物馆的信任和好感，促进博物馆与社会的良性互动。"},
  {id:874,cat:"博物馆学基础",q:"博物馆展览项目管理的'铁三角'是？",o:["人力/物力/财力","时间/成本/质量（范围）","展品/灯光/展柜","策划/设计/施工"],a:1,exp:"项目管理铁三角=时间、成本、质量（范围）。展览项目管理需要三者动态平衡。"},
  {id:875,cat:"博物馆学基础",q:"博物馆的'使命陈述'（Mission Statement）是什么？",o:["一个口号","对博物馆存在目的和核心价值的简洁说明","财务报表","员工手册"],a:1,exp:"使命陈述回答'博物馆为什么存在'这一问题，是制定战略和评估工作的根本依据。"},
  {id:876,cat:"博物馆学基础",q:"博物馆文创产品开发的基本原则不包括？",o:["以文物为基础","提炼文化符号","脱离展览独立运作","品质把控"],a:2,exp:"文创应植根于馆藏和展览，不能脱离博物馆的文化语境独立运作。"},
  {id:877,cat:"博物馆学基础",q:"博物馆应对突发公共卫生事件的预案中，最关键的是？",o:["不管不顾","观众和员工健康安全优先/防控措施/应急预案","临时关闭即可","只消毒"],a:1,exp:"观众和员工安全第一，需有系统的防控预案和分级响应机制。"},
  {id:878,cat:"博物馆学基础",q:"博物馆IP授权的核心是？",o:["随意授权","将博物馆文化资源通过合同授权给第三方进行产品开发","免费开放所有版权","不保留任何权利"],a:1,exp:"IP授权是博物馆文化资源合法商业利用的方式，需通过合同明确授权范围、期限和收益分配。"},
  {id:879,cat:"博物馆学基础",q:"博物馆从事数字化建设时'信息孤岛'问题指的是？",o:["所有系统打通","各部门信息系统互不联通/数据无法共享","信息太多","没有网络"],a:1,exp:"信息孤岛=各部门或系统之间的数据无法互通共享，是博物馆智慧化建设需解决的关键问题。"},
  {id:880,cat:"博物馆学基础",q:"博物馆库房的'双人双锁'制度是为了？",o:["方便","互相监督/防止单人操作风险/确保藏品安全","节省时间","增加流程"],a:1,exp:"双人双锁=两人各自持有一把不同的锁钥，必须同时到场才能进入库房，是藏品安全管理的基本制度。"},
  {id:881,cat:"博物馆学基础",q:"博物馆展览的'可及性'（Accessibility）包括？",o:["只是轮椅通道","物理可及+信息可及+经济可及（免费/低票价）","只有信息可及","只有经济可及"],a:1,exp:"可及性三维度：物理（无障碍设施）、信息（语言/视觉/听觉辅助）、经济（票价合理）。"},
  {id:882,cat:"博物馆学基础",q:"博物馆藏品'注销'的条件不包括？",o:["藏品已严重损毁且无法修复","经鉴定确认为赝品","藏品重复且无保留价值","藏品不够好看"],a:3,exp:"藏品注销有严格条件和程序，'不够好看'不是注销依据。注销需经专家鉴定并按管理权限审批。"},
  {id:883,cat:"博物馆学基础",q:"'博物馆之城'建设是指？",o:["只建一个博物馆","一个城市系统规划建设多元博物馆体系","全部建成一样的博物馆","不建博物馆"],a:1,exp:"'博物馆之城'是以城市为单元，系统规划建设多层次、多类型的博物馆体系。"},
  {id:884,cat:"博物馆学基础",q:"博物馆藏品数字化的'元数据'是指？",o:["不需要的数据","描述藏品的数据/如名称/年代/材质/尺寸/来源等结构化信息","图片","PDF文件"],a:1,exp:"元数据是'关于数据的数据'，藏品元数据包括名称、年代、材质、尺寸、来源、保存状态等。"},
  {id:885,cat:"博物馆学基础",q:"博物馆夜场活动的安全管理最重要的是？",o:["不管安全","文物安全不因夜场时间延长而降低标准","降低安保级别","只开放部分区域不用管"],a:1,exp:"夜场不等于安全降级。文物安保标准不得因时间延长而降低。"},
  {id:886,cat:"博物馆学基础",q:"博物馆'策展人负责制'下策展人的主要职责是？",o:["只写展览大纲","从选题到实施全过程负责/协调学术/设计/布展/公教等各环节","只设计展柜","只负责开幕式"],a:1,exp:"策展人对展览的学术质量和整体呈现负总责，协调内容、设计、施工、公教、传播全链条。"},
  {id:887,cat:"博物馆学基础",q:"下列属于博物馆'利益相关方'的是？",o:["政府主管部门","观众","捐赠者","媒体","以上都是"],a:4,exp:"博物馆利益相关方包括政府、观众、捐赠者、媒体、社区居民、学术界等。"},
  {id:888,cat:"博物馆学基础",q:"博物馆'战略规划'一般覆盖的时间跨度是？",o:["1年","3-5年","10-15年","20年"],a:1,exp:"战略规划一般为3-5年中期规划，如'大博物馆计划'（2022-2025年）。长期愿景可覆盖更长时间。"},
  {id:889,cat:"博物馆学基础",q:"博物馆展厅内禁止的行为不包括？",o:["触摸展品","使用闪光灯拍照","大声喧哗","认真阅读展品说明"],a:3,exp:"前三项均为禁止行为。认真阅读展品说明是应鼓励的参观行为。"},
  {id:890,cat:"博物馆学基础",q:"博物馆藏品保护中的'可逆性'原则意味着？",o:["修复不可逆转","修复材料和手段可在将来被移除而不损伤文物","不需要考虑将来","一次修复永久不变"],a:1,exp:"可逆性=修复措施应能在未来被安全移除，为将来更好的修复技术留有余地。"},
  {id:891,cat:"博物馆学基础",q:"下列哪种照明方式对文物损害最小？",o:["日光直射","紫外线含量低的LED冷光源","白炽灯","荧光灯"],a:1,exp:"LED冷光源紫外线含量低，发热少，对文物损害最小。日光含紫外线，最不利于文物保护。"},
  {id:892,cat:"博物馆学基础",q:"博物馆展品借展协议中的'不可抗力'条款通常不包括？",o:["地震","战争","借入方管理疏忽导致文物损坏","突发疫情"],a:2,exp:"管理疏忽不属不可抗力。不可抗力指不能预见、不能避免且不能克服的客观情况。"},
  {id:893,cat:"博物馆学基础",q:"博物馆财务管理的'收支两条线'是指？",o:["收入和支出混在一起","收入和支出分别管理/互不挪用","没有管理","随意使用"],a:1,exp:"收支两条线=收入全额上缴财政/支出由财政按预算拨付，是事业单位财务管理基本原则。"},
  {id:894,cat:"博物馆学基础",q:"博物馆公共关系危机处理的首要原则是？",o:["掩盖真相","快速反应/真诚沟通/承担责任","保持沉默","推卸责任"],a:1,exp:"危机公关5S原则：速度第一、真诚沟通、承担责任、系统运行、权威证实。"},
  {id:895,cat:"博物馆学基础",q:"博物馆的'绿色博物馆'理念不包括？",o:["节能环保","使用可再生材料","不计成本豪华装修","低碳运营"],a:2,exp:"绿色博物馆=节能降耗、环保材料、低碳运营。豪华装修不符合绿色理念。"},

  // ===== 批6续：综合常识+展览策划补充 (896-935) =====
  {id:896,cat:"综合常识",q:"'丝绸之路'最早由谁命名？",o:["张骞","李希霍芬（德国地理学家/1877年）","马可·波罗","玄奘"],a:1,exp:"1877年德国地理学家李希霍芬首次使用'丝绸之路'（Seidenstraße）一词。"},
  {id:897,cat:"综合常识",q:"世界三大宗教不包括？",o:["佛教","基督教","伊斯兰教","道教"],a:3,exp:"世界三大宗教：佛教、基督教、伊斯兰教。道教是中国本土宗教，不属于三大。"},
  {id:898,cat:"综合常识",q:"'文艺复兴'发源于哪个国家？",o:["法国","意大利","英国","德国"],a:1,exp:"文艺复兴14-16世纪发源于意大利佛罗伦萨，核心是人文主义。"},
  {id:899,cat:"综合常识",q:"达·芬奇的代表作不包括？",o:["《蒙娜丽莎》","《最后的晚餐》","《向日葵》","《维特鲁威人》"],a:2,exp:"《向日葵》是梵高的作品。达·芬奇代表作：《蒙娜丽莎》《最后的晚餐》等。"},
  {id:900,cat:"综合常识",q:"'启蒙运动'的核心思想是？",o:["宗教至上","理性主义和进步主义","回到中世纪","神秘主义"],a:1,exp:"启蒙运动（17-18世纪）高举'理性'旗帜，主张用理性之光照亮人类通向进步的道路。"},
  {id:901,cat:"综合常识",q:"联合国成立于哪一年？",o:["1919年","1945年","1950年","1960年"],a:1,exp:"联合国于1945年10月24日成立，总部在纽约。"},
  {id:902,cat:"综合常识",q:"联合国教科文组织（UNESCO）总部设在？",o:["纽约","巴黎","伦敦","日内瓦"],a:1,exp:"UNESCO总部在法国巴黎。"},
  {id:903,cat:"综合常识",q:"世界遗产分为哪三类？",o:["文化/自然/文化与自然双重遗产","古代/近代/现代","东方/西方/中东","可移动/不可移动/无形"],a:0,exp:"世界遗产分三类：文化遗产、自然遗产、文化与自然双重遗产。非遗是另一个名录体系。"},
  {id:904,cat:"综合常识",q:"'大英博物馆'位于哪个城市？",o:["巴黎","伦敦","纽约","罗马"],a:1,exp:"大英博物馆位于伦敦，1753年建立，1759年向公众开放。"},
  {id:905,cat:"综合常识",q:"'卢浮宫'原是？",o:["学校","法国王宫/1793年改为博物馆","教堂","市场"],a:1,exp:"卢浮宫原为法国王宫，1793年法国大革命期间改为公共博物馆。"},
  {id:906,cat:"综合常识",q:"'大都会艺术博物馆'位于哪个城市？",o:["华盛顿","纽约","波士顿","芝加哥"],a:1,exp:"大都会艺术博物馆位于纽约中央公园旁，是美国最大的艺术博物馆。"},
  {id:907,cat:"综合常识",q:"'艾尔米塔什博物馆'（冬宫）位于哪个城市？",o:["莫斯科","圣彼得堡","喀山","基辅"],a:1,exp:"艾尔米塔什博物馆位于俄罗斯圣彼得堡，原为沙皇皇宫（冬宫），世界四大博物馆之一。"},
  {id:908,cat:"综合常识",q:"'梵蒂冈博物馆'因什么而闻名？",o:["自然标本","西斯廷教堂/米开朗基罗《创世纪》天顶画","现代艺术","科技展品"],a:1,exp:"梵蒂冈博物馆以西斯廷教堂米开朗基罗的天顶画《创世纪》和《最后的审判》闻名世界。"},
  {id:909,cat:"综合常识",q:"中国古代最完整的建筑学专著《营造法式》编成于？",o:["唐代","北宋1103年","南宋","明代"],a:1,exp:"北宋李诫于1103年编成《营造法式》。"},
  {id:910,cat:"综合常识",q:"世界上现存最高的木塔是？",o:["大雁塔","应县木塔（山西/辽代/约67米）","雷峰塔","六和塔"],a:1,exp:"山西应县木塔建于辽代清宁二年（1056年），是世界上现存最高、最古老的木结构塔。"},
  {id:911,cat:"综合常识",q:"'赵州桥'（安济桥）的建造者是？",o:["鲁班","李春（隋代）","李诫","沈括"],a:1,exp:"隋代李春设计建造的赵州桥，是世界上现存最早、保存最完好的敞肩石拱桥。"},
  {id:912,cat:"综合常识",q:"'都江堰'水利工程的修建者是？",o:["大禹","李冰父子（战国秦）","秦始皇","隋炀帝"],a:1,exp:"战国秦昭王时期李冰父子主持修建都江堰，至今仍在发挥作用。"},
  {id:913,cat:"综合常识",q:"'京杭大运河'全长约多少公里？",o:["约1000公里","约1794公里","约2500公里","约3000公里"],a:1,exp:"京杭大运河北起北京南至杭州，全长约1794公里，是世界上最长的人工运河。"},
  {id:914,cat:"综合常识",q:"'灵渠'沟通了哪两大水系？",o:["长江和黄河","长江水系和珠江水系","黄河和淮河","珠江和闽江"],a:1,exp:"灵渠建于秦代（公元前214年），在广西兴安，沟通了长江水系（湘江）和珠江水系（漓江）。"},
  {id:915,cat:"综合常识",q:"中国四大石窟不包括？",o:["敦煌莫高窟","云冈石窟","龙门石窟","麦积山石窟","大足石刻"],a:4,exp:"四大石窟：莫高窟、云冈、龙门、麦积山。大足石刻虽为世界遗产，但不属四大石窟。"},
  {id:916,cat:"综合常识",q:"'唐三彩'的主要烧造年代是？",o:["汉代","唐代","宋代","清代"],a:1,exp:"唐三彩盛行于唐代（7-10世纪），是低温釉陶，以黄、绿、白三色为主，用于随葬。"},
  {id:917,cat:"综合常识",q:"'景泰蓝'是什么工艺？",o:["瓷器","铜胎掐丝珐琅","漆器","木雕"],a:1,exp:"景泰蓝=铜胎掐丝珐琅，在铜胎上以铜丝掐出花纹再填各色珐琅釉烧制。明代景泰年间盛行。"},
  {id:918,cat:"综合常识",q:"'紫砂壶'最著名的产地在？",o:["景德镇","宜兴（江苏）","龙泉","德化"],a:1,exp:"江苏宜兴是紫砂壶的发源地和核心产区。"},
  {id:919,cat:"综合常识",q:"'端砚'的产地在？",o:["安徽歙县","广东肇庆（古端州）","甘肃洮州","山西绛州"],a:1,exp:"端砚产于广东肇庆（古端州），与歙砚、洮河砚、澄泥砚并称四大名砚。"},
  {id:920,cat:"综合常识",q:"'宣纸'因何得名？",o:["宣传品用纸","产自安徽宣城/泾县一带","一种品牌名","皇帝赐名"],a:1,exp:"宣纸产于安徽宣城泾县一带，以青檀皮和沙田稻草为原料，利于书画创作和长期保存。"},
  {id:921,cat:"综合常识",q:"'湖笔'产自哪里？",o:["湖南","浙江湖州","湖北","江苏无锡"],a:1,exp:"湖笔产自浙江湖州，以羊毫、狼毫、兼毫著称。文房四宝：湖笔、徽墨、宣纸、端砚。"},
  {id:922,cat:"展览策划实务",q:"展览评估中的'形成性评估'是指？",o:["展览结束后","展览策划和实施过程中进行的评估","不需要评估","只在展览前"],a:1,exp:"形成性评估是在展览策划/实施过程中的评估，便于及时调整改进。'总结性评估'在结束后进行。"},
  {id:923,cat:"展览策划实务",q:"展览空间设计中'中性空间'的概念是指？",o:["没有颜色的空间","展厅本身不喧宾夺主/让展品成为焦点","空无一物","不需要设计"],a:1,exp:"中性空间=展厅设计以展品为核心，空间本身不构成对展品的视觉干扰。"},
  {id:924,cat:"展览策划实务",q:"展柜微环境控制的主要参数是？",o:["只有温度","温度和相对湿度/光照/污染物","只有光照","只有污染物"],a:1,exp:"展柜微环境需要精准控制温湿度、光照水平（照度+紫外线）和空气污染物。"},
  {id:925,cat:"展览策划实务",q:"展览中的'易读性'是指？",o:["字体好看","说明文字的字号/字体/排版便于不同距离的观众阅读","内容简单","只用英文"],a:1,exp:"易读性涉及文字视觉呈现优化：字号合适、字体清晰、色彩对比度恰当、排版舒适。"},
  {id:926,cat:"展览策划实务",q:"以下哪项不是博物馆常用的观众研究工具？",o:["问卷调查","眼动追踪","观众跟踪观察","财务报表分析"],a:3,exp:"财务分析不属观众研究。观众研究常用问卷、访谈、观察、跟踪、眼动仪等。"},
  {id:927,cat:"展览策划实务",q:"博物馆展览中'互动展项'的设计原则不包括？",o:["简单易懂","与展览主题相关","越复杂越好","安全耐用"],a:2,exp:"互动展项应简单、相关、安全、耐用。过于复杂会导致观众放弃尝试。"},
  {id:928,cat:"展览策划实务",q:"海外借展中'政府担保'（Government Indemnity）是指？",o:["私人担保","政府承诺承担文物在借展期间的损毁风险/替代商业保险","不需要保险","商业保险"],a:1,exp:"政府担保是许多国家为降低国际借展成本而设立的担保机制，以政府信用替代商业保险。"},
  {id:929,cat:"展览策划实务",q:"展厅中'视觉焦点'的设计目的是？",o:["让观众迷失方向","引导观众注意力/突出核心展品","隐藏展品","减少参观时间"],a:1,exp:"通过灯光、空间、展柜设计营造视觉焦点，引导观众先看最重要的展品。"},
  {id:930,cat:"展览策划实务",q:"策展的'叙事弧线'（Narrative Arc）概念借用于？",o:["数学","文学和电影编剧/设置开端-发展-高潮-结尾","音乐","建筑"],a:1,exp:"叙事弧线借鉴文学和电影脚本结构，为展览构建完整的故事节奏和情感起伏。"},
  {id:931,cat:"展览策划实务",q:"博物馆在进行观众研究时，'停留时间'用于衡量？",o:["观众对展品/展览的兴趣度和参与度","观众年龄","观众籍贯","观众收入"],a:0,exp:"停留时间是衡量观众兴趣度的关键指标——停留越久通常表示兴趣度越高。"},
  {id:932,cat:"展览策划实务",q:"文物运输中的'恒温恒湿'要求是为了？",o:["舒适","防止文物因温湿度剧烈变化而损坏","节约成本","加快运输"],a:1,exp:"温湿度剧烈变化会导致木质文物开裂、金属腐蚀、纸张变形。恒温恒湿运输是文物安全的基本保障。"},
  {id:933,cat:"展览策划实务",q:"'AAM'（美国博物馆联盟）制定的博物馆展览评估标准不包括？",o:["展览主题和目标","展览内容准确性","展品的经济价值","观众体验效果"],a:2,exp:"博物馆展览评估关注主题、内容、设计、观众体验，不关注展品的商业价格。"},
  {id:934,cat:"展览策划实务",q:"策展人编写'展览大纲'时最应关注的是？",o:["字数","内部逻辑一致性/学术准确性/叙事连贯性","漂亮","不需要大纲"],a:1,exp:"展览大纲是展览的学术骨架，必须确保逻辑清晰、学术准确、叙事连贯。"},
  {id:935,cat:"展览策划实务",q:"'送展上门'（Outreach）属于博物馆的什么工作？",o:["藏品保管","拓展教育服务/将博物馆教育带到社区/学校","安全保卫","财务管理"],a:1,exp:"Outreach是博物馆走出馆舍围墙，将教育项目送到社区、学校等场所的服务模式。"},


  // ===== 批7(FINAL)：冲刺1000题 (936-1000) =====
  {id:936,cat:"综合常识",q:"世界四大文明古国不包括？",o:["古埃及","古巴比伦","古印度","中国","古希腊"],a:4,exp:"四大文明古国：古埃及、古巴比伦（今伊拉克）、古印度、中国。古希腊是西方文明摇篮，但不属四大文明古国。"},
  {id:937,cat:"综合常识",q:"'楔形文字'是哪一古文明的文字？",o:["古埃及","古巴比伦（两河流域）","古印度","古希腊"],a:1,exp:"楔形文字是两河流域（美索不达米亚）苏美尔人创造的古老文字。"},
  {id:938,cat:"综合常识",q:"'甲骨文'最早被谁发现并认定为商代文字？",o:["郭沫若","王懿荣（1899年）","王国维","傅斯年"],a:1,exp:"1899年清代学者王懿荣在'龙骨'（药材）上发现甲骨文，并首先认定为商代文字。"},
  {id:939,cat:"综合常识",q:"'罗塞塔石碑'帮助学者破译了什么文字？",o:["楔形文字","古埃及象形文字","甲骨文","玛雅文字"],a:1,exp:"罗塞塔石碑刻有同一内容的古埃及象形文字、通俗体文字和希腊文三种文字，是破译象形文字的关键。"},
  {id:940,cat:"中国古代艺术史",q:"中国最早的纸本绘画真迹是？",o:["《兰亭序》","唐韩滉《五牛图》","《游春图》","《女史箴图》"],a:1,exp:"唐代韩滉《五牛图》是中国现存最早的纸本绘画真迹，藏北京故宫博物院。"},
  {id:941,cat:"中国古代艺术史",q:"宋代'院体画'与'文人画'的主要分歧在于？",o:["没有分歧","院体重形似法度/文人体重意趣笔墨","院体只画花鸟","文人画只画山水"],a:1,exp:"院体画重写实工整、法度严谨；文人画重主观意趣、笔墨自娱，苏轼'论画以形似，见与儿童邻'即为文人画宣言。"},
  {id:942,cat:"中国古代艺术史",q:"'南宋四家'中的'马一角、夏半边'得名于？",o:["名字","马远画作多取边角之景/夏圭多画半幅山水/构图简洁","画幅形状","画材"],a:1,exp:"马远构图常取山水一角（'马一角'），夏圭常绘半幅山水（'夏半边'），是南宋院体山水独特风格。"},
  {id:943,cat:"中国古代艺术史",q:"'元四家'之冠黄公望的《富春山居图》创作历时？",o:["1年","约3年（断续历时约3-4年完成）","10年","1个月"],a:1,exp:"黄公望寓居富春江畔，历时约3-4年完成《富春山居图》。"},
  {id:944,cat:"中国古代艺术史",q:"'明式家具'最推崇的木材是？",o:["松木","黄花梨木","杨木","杉木"],a:1,exp:"明式家具多用黄花梨木（海南降香黄檀），纹理美、质地坚、色泽温润。清式家具多用紫檀。"},
  {id:945,cat:"中国古代艺术史",q:"'清初四僧'与'清初四王'的艺术取向差异是？",o:["没有差异","四僧个性独创/四王继承正统/摹古守法","四僧都学四王","四王比四僧更创新"],a:1,exp:"四僧（八大/石涛/髡残/弘仁）强调个性创新、不拘成法；四王（时敏/王鉴/王翚/原祁）继承董其昌文人画正统，重古人法度。"},
  {id:946,cat:"中国古代艺术史",q:"'金陵八家'之首是谁？",o:["石涛","龚贤","郑板桥","八大"],a:1,exp:"龚贤为'金陵八家'之首，善积墨法，画面墨色浑厚华滋，风格鲜明。"},
  {id:947,cat:"中国古代艺术史",q:"'岭南画派'的创始人是？",o:["齐白石","高剑父、高奇峰、陈树人（二高一陈）","徐悲鸿","林风眠"],a:1,exp:"'二高一陈'（高剑父、高奇峰、陈树人）是岭南画派创始人，主张'折衷中西、融汇古今'。"},
  {id:948,cat:"中国古代艺术史",q:"'新金陵画派'代表人物傅抱石最擅长什么？",o:["花鸟","山水/独创'抱石皴'","人物","油画"],a:1,exp:"傅抱石擅长山水和人物，独创'抱石皴'山水技法，代表作为与关山月合作的《江山如此多娇》。"},
  {id:949,cat:"中国古代艺术史",q:"'长安画派'的核心主张是？",o:["复古","一手伸向传统/一手伸向生活","全盘西化","只画古代题材"],a:1,exp:"赵望云、石鲁等长安画派画家主张'一手伸向传统，一手伸向生活'，表现西北山川和人民生活。"},
  {id:950,cat:"中国古代艺术史",q:"'金石学'作为中国考古学前身兴盛于何时？",o:["汉代","宋代","元代","明代"],a:1,exp:"宋代金石学兴盛，欧阳修《集古录》、赵明诚《金石录》等是代表性著作，主要研究青铜器和石刻文字。"},
  {id:951,cat:"中国古代艺术史",q:"'考古学'作为现代学科传入中国是在？",o:["17世纪","20世纪初（1920年代）","宋代","清代"],a:1,exp:"20世纪20年代，以李济在山西夏县西阴村的考古发掘（1926年）和安阳殷墟发掘（1928年起）为标志。"},
  {id:952,cat:"中国古代艺术史",q:"'殷墟'的发现和发掘始于哪一年？",o:["1899年","1928年","1949年","1905年"],a:1,exp:"1928年中央研究院历史语言研究所开始对安阳殷墟进行正式考古发掘。1899年王懿荣发现甲骨文。"},
  {id:953,cat:"综合常识",q:"'知识就是力量'是谁的名言？",o:["笛卡尔","弗兰西斯·培根","康德","黑格尔"],a:1,exp:"英国哲学家培根的名言（Knowledge is power），强调经验和科学知识的重要性。"},
  {id:954,cat:"综合常识",q:"《物种起源》的作者是？",o:["牛顿","达尔文","爱因斯坦","巴斯德"],a:1,exp:"查尔斯·达尔文1859年出版《物种起源》，提出进化论和自然选择学说。"},
  {id:955,cat:"综合常识",q:"'相对论'的提出者是？",o:["牛顿","爱因斯坦","普朗克","霍金"],a:1,exp:"阿尔伯特·爱因斯坦1905年提出狭义相对论，1915年提出广义相对论。"},
  {id:956,cat:"综合常识",q:"DNA双螺旋结构的发现者是？",o:["达尔文","沃森和克里克（1953年）","孟德尔","巴斯德"],a:1,exp:"沃森和克里克1953年在《自然》杂志发表DNA双螺旋结构模型，奠定分子生物学基础。"},
  {id:957,cat:"综合常识",q:"第一次工业革命的标志性发明是？",o:["蒸汽机（瓦特改良）","电力","计算机","互联网"],a:0,exp:"第一次工业革命（18世纪中后期）以瓦特改良蒸汽机为标志。第二次（19世纪末）以电力为标志。"},
  {id:958,cat:"2026上海时政",q:"上海2026年GDP增长目标为5%左右，是基于什么考虑？",o:["随意制定","与2025年实际增速5.4%基本衔接/体现稳中求进","过低估计","过高估计"],a:1,exp:"5%左右的目标与2025年5.4%的增速基本衔接，体现了'稳中求进'的工作总基调。"},
  {id:959,cat:"2026上海时政",q:"上海'十五五'规划的核心关键词是？",o:["守旧","高质量发展/科技赋能/五个中心/国际大都市","维持现状","减少开放"],a:1,exp:"'十五五'规划的核心：高质量发展、科技赋能、加快五个中心建设、建设具有世界影响力的社会主义现代化国际大都市。"},
  {id:960,cat:"2026上海时政",q:"上海在长三角一体化中发挥什么作用？",o:["被动","龙头带动作用","不参与","次要作用"],a:1,exp:"上海在长三角一体化中发挥龙头带动作用，牵头构建世界级科技创新策源地。"},
  {id:961,cat:"2026上海时政",q:"上海'南北转型'指的是？",o:["城市南北发展","宝山区和金山区的产业转型升级","地铁改造","单纯地理概念"],a:1,exp:"'南北转型'=宝山（北）和金山区（南）的产业转型升级和城市更新。"},
  {id:962,cat:"2026上海时政",q:"2026年上海'首发经济'的主要载体是？",o:["工厂","重点商圈改造/南京东路/陆家嘴/徐家汇等国际消费中心城市建设","农村","学校"],a:1,exp:"通过重点商圈改造升级，发展首发经济、夜间经济等新消费业态。"},
  {id:963,cat:"文博时政热点",q:"2026年'国际博物馆日'中国主会场活动中，内蒙古博物院重点展示了什么？",o:["草原文化/边疆民族地区博物馆发展成就","海洋文化","江南文化","中原文化"],a:0,exp:"2026年国际博物馆日中国主会场在内蒙古博物院，重点展示草原文化和边疆民族地区博物馆事业发展成就。"},
  {id:964,cat:"文博时政热点",q:"2026年郑州提出的十大文物任务中，技术方面的重点是？",o:["不使用技术","AI+文物保护/大数据库建设/遗产数字化","传统手工","不发展科技"],a:1,exp:"郑州十大文物任务聚焦AI+文物保护、不可移动文物大数据库和遗产数字化。"},
  {id:965,cat:"文博时政热点",q:"'文物安全物联网管理系统'主要解决什么？",o:["单点监控","实时监测文物安全状态/多节点联网预警","只防盗","不实用"],a:1,exp:"通过物联网技术实现多节点文物安全信息的实时采集、联网分析和预警处置。"},
  {id:966,cat:"文博时政热点",q:"中国目前共有多少处世界遗产（截至2026年）？",o:["约40处","约50处","60处","约70处"],a:2,exp:"西夏陵2025年列入后，中国世界遗产总数达60处。"},
  {id:967,cat:"文博时政热点",q:"'考古遗址公园'建设的核心理念是？",o:["商业开发","在保护遗址前提下/展示考古成果/提供公共文化服务","只保护不开放","全部重建"],a:1,exp:"考古遗址公园在严格保护遗址的前提下，通过展示阐释和公共服务让公众了解和体验考古成果。"},
  {id:968,cat:"展览策划实务",q:"展览中'触摸屏互动'的健康安全考虑不包括？",o:["不需要考虑","定期消毒/抗菌屏幕/提示观众注意卫生","位置摆放","耐用性"],a:0,exp:"公共卫生事件后，博物馆互动装置的卫生安全（定期消毒、抗菌材料等）成为重要考量。"},
  {id:969,cat:"展览策划实务",q:"'展览策展'与'商业展示'的本质区别是？",o:["没有区别","博物馆策展以教育和文化传播为目的/商业展示以销售为目的","商业展示更高级","博物馆策展不用设计"],a:1,exp:"博物馆展览以社会教育和文化传承为根本目的，商业展示以促进消费和销售为根本目的。"},
  {id:970,cat:"展览策划实务",q:"策展人在撰写'展品说明'时，最应避免的是？",o:["简洁","编造未经考证的信息/过度推测","提供背景信息","注明来源"],a:1,exp:"展品说明必须以学术研究为基础，不得编造或过度推测。所有信息应可追溯来源。"},
  {id:971,cat:"博物馆学基础",q:"'国际博协道德准则'要求博物馆在任何情况下都应？",o:["以盈利为先","维护文化遗产的尊严/诚实/专业/透明","随意处置藏品","违反法律"],a:1,exp:"ICOM职业道德准则要求博物馆维护文化遗产尊严，保持诚实、专业和透明。"},
  {id:972,cat:"博物馆学基础",q:"博物馆'ICOM博物馆定义'（2022版）新增的核心关键词是？",o:["传统","开放/可及/包容/多样性/可持续","封闭","精英化"],a:1,exp:"2022年新定义首次加入'可及性''包容性''多样性''可持续性'等关键词，反映了博物馆面向社会转型的趋势。"},
  {id:973,cat:"博物馆学基础",q:"博物馆数字化建设中'数字孪生'（Digital Twin）是指？",o:["3D打印","在虚拟空间对实体博物馆/藏品/空间进行完整数字复制","拍照片","VR体验"],a:1,exp:"数字孪生=对实体博物馆及其藏品在虚拟空间中进行完整、实时的数字化映射和模拟。"},
  {id:974,cat:"文物保护法与法规",q:"'文物认定'的程序是？",o:["自行认定","由国务院规定并公布认定的主体、标准和程序","省级自行决定","随意认定"],a:1,exp:"2024修订法规定文物认定的主体、标准和程序由国务院规定并公布。"},
  {id:975,cat:"文物保护法与法规",q:"'不可移动文物保护规划'应纳入什么层级？",o:["不需要","纳入各级国民经济和社会发展规划/国土空间规划","个人计划","企业规划"],a:1,exp:"2024修订法新规定：不可移动文物保护规划应纳入各级国民经济和社会发展规划及国土空间规划。"},
  {id:976,cat:"文物保护法与法规",q:"水下文物保护区涉及跨省或中国管辖海域以外的，由谁划定？",o:["省级政府","国务院文物行政部门划定/报国务院核定公布","县级政府","市级政府"],a:1,exp:"跨省或涉及领海以外管辖海域的水下保护区由国务院文物行政部门划定并报国务院核定公布。"},
  {id:977,cat:"文物保护法与法规",q:"历史文化街区和村镇由谁核定公布？",o:["乡镇政府","省、自治区、直辖市人民政府核定公布/报国务院备案","国务院直接批准","市级政府"],a:1,exp:"省、自治区、直辖市人民政府核定公布，报国务院备案。"},
  {id:978,cat:"综合常识",q:"'元宇宙'概念在博物馆中的应用属于？",o:["实体展览替代","虚拟与现实结合的新型体验空间/数字文化新业态","纯游戏","不实用"],a:1,exp:"元宇宙为博物馆提供虚实结合的新型展示和体验空间，但应作为实体展览的补充而非替代。"},
  {id:979,cat:"综合常识",q:"'ChatGPT'等大语言模型对博物馆的可能影响是？",o:["无影响","智能导览/个性化推荐/文物知识库问答等辅助服务","取代策展人","淘汰博物馆"],a:1,exp:"AI可辅助导览、知识问答、个性化推荐等，提升服务效率。但不能取代专业策展和学术研究。"},
  {id:980,cat:"综合常识",q:"'碳中和'的含义是？",o:["不排放任何碳","人为碳排放与碳吸收达到平衡/净零排放","只减排不吸收","碳为零"],a:1,exp:"碳中和=人为碳排放量通过植树造林、碳捕集等方式被完全抵消，实现净零排放。"},
  {id:981,cat:"综合常识",q:"'绿水青山就是金山银山'这一理念的核心是？",o:["只发展经济","生态环境保护与经济发展辩证统一/绿色发展","放弃工业","只保护环境"],a:1,exp:"强调生态环境本身就是财富，保护生态就是保护生产力，绿色发展是经济可持续发展的必由之路。"},
  {id:982,cat:"中国古代艺术史",q:"元代景德镇烧制成功的'枢府釉'属于什么品种？",o:["青花","卵白釉（枢府瓷）","粉彩","青瓷"],a:1,exp:"元代景德镇创烧卵白釉瓷，因'枢府'款识而得名枢府瓷，是当时官用瓷器。"},
  {id:983,cat:"中国古代艺术史",q:"'德化窑'以什么品种著称？",o:["青花","白瓷（象牙白/猪油白）","青瓷","粉彩"],a:1,exp:"福建德化窑以白瓷著称，釉色温润如象牙，明代何朝宗的白瓷观音最为著名。"},
  {id:984,cat:"中国古代艺术史",q:"'龙泉窑'最著名的是什么釉色？",o:["白釉","粉青釉和梅子青釉","天青釉","黑釉"],a:1,exp:"浙江龙泉窑以青瓷著称，南宋时烧制出粉青和梅子青两种极品釉色。"},
  {id:985,cat:"中国古代艺术史",q:"'建窑'以什么品种闻名？",o:["白瓷","黑釉茶盏（建盏/兔毫盏/油滴盏）","青花","唐三彩"],a:1,exp:"福建建窑以黑釉茶盏闻名，兔毫盏、油滴盏为宋代斗茶的上品茶具。"},
  {id:986,cat:"中国古代艺术史",q:"'磁州窑'最鲜明的装饰特色是？",o:["素面","白地黑花/黑白对比强烈的民间风格装饰","纯色釉","青花"],a:1,exp:"河北磁州窑以白地黑花（或黑地白花）为特色，装饰题材生动活泼，充满民间生活气息。"},
  {id:987,cat:"中国古代艺术史",q:"'耀州窑'以什么技法著称？",o:["青花","刻花青瓷/刀锋犀利/纹饰精美","粉彩","斗彩"],a:1,exp:"陕西耀州窑以刻花青瓷著称，刀法犀利流畅，纹饰精美，是北方青瓷的代表。"},
  {id:988,cat:"文博时政热点",q:"考古学界'夏文化探索'的核心遗址是？",o:["殷墟","二里头遗址","周原","郑州商城"],a:1,exp:"河南偃师二里头遗址（约前1750-前1530年）是探索夏文化的核心遗址，发现了中国最早的城市主干道网和宫城。"},
  {id:989,cat:"文博时政热点",q:"'中华文明探源工程'始于哪一年？",o:["1999年","2001年（预研究）/2004年（正式启动）","2010年","2015年"],a:1,exp:"2001-2003年进行预研究，2004年正式启动，目前已进入第五阶段结项期。"},
  {id:990,cat:"文博时政热点",q:"探源工程确认的中华文明起源'多元一体'格局形成的关键时期是？",o:["商代","距今约5000-4000年前（新石器时代晚期至夏代）","汉代","唐代"],a:1,exp:"距今5000-4000年前，中国各区域的文明在互动交流中逐渐走向'多元一体'。"},
  {id:991,cat:"文博时政热点",q:"良渚古城遗址何时列入世界遗产名录？",o:["2017年","2019年","2021年","2023年"],a:1,exp:"良渚古城遗址2019年列入世界遗产名录，实证中华五千年文明。"},
  {id:992,cat:"文博时政热点",q:"三星堆遗址位于哪个省份？",o:["陕西","四川省广汉市","湖北","河南"],a:1,exp:"三星堆遗址在四川省广汉市，是古蜀文明的代表，出土了青铜大立人、青铜神树等奇特文物。"},
  {id:993,cat:"文博时政热点",q:"'海上丝绸之路'联合申遗工作涉及哪些国家？",o:["仅中国","中国与沿线多国联合申报","仅东南亚","仅中东"],a:1,exp:"海上丝绸之路由中国与沿线多国（东亚、东南亚、南亚、中东、东非等）联合申报世界遗产。"},
  {id:994,cat:"综合常识",q:"世界上最早的博物馆'亚历山大博学园'位于？",o:["罗马","埃及亚历山大城","雅典","巴比伦"],a:1,exp:"约公元前3世纪建于埃及亚历山大城，包括缪斯神庙、图书馆等，被公认是博物馆的雏形。"},
  {id:995,cat:"综合常识",q:"中国四大古都不包括？",o:["西安","洛阳","南京","北京","开封"],a:3,exp:"一般说法中西安、洛阳、南京、北京被称为'四大古都'，也有加入开封称'五大'、加入杭州称'六大'等说法。本题按常见口径选开封。"},
  {id:996,cat:"上海市情",q:"上海最早的地方志《云间志》编于何时？",o:["唐代","南宋绍熙年间（1190-1194年）","元代","明代"],a:1,exp:"《云间志》是上海地区现存最早的地方志（'云间'为古华亭/松江的雅称）。"},
  {id:997,cat:"上海市情",q:"'外滩'作为地标形成于何时？",o:["明代","1840年代开埠后/逐渐形成万国建筑博览群","宋代","清代早期"],a:1,exp:"外滩1840年代开埠后逐步形成，沿黄浦江岸线集中了各时期、各风格的经典建筑。"},
  {id:998,cat:"上海市情",q:"'石库门'建筑是上海什么时期的典型民居？",o:["明代","19世纪末至20世纪30年代（中西合璧的里弄住宅）","清代早期","1949年以后"],a:1,exp:"石库门是19世纪末至20世纪30年代上海最具代表性的民居建筑形式，中西合璧。"},
  {id:999,cat:"上海博物馆馆情",q:"上博在文物保护修复方面获得的国家级科技奖项有多少项？",o:["10项","15项","23项","30项"],a:2,exp:"上博文物保护科技项目获国家科技进步奖等国家级奖项23项，是国内最早的文物科技保护机构之一。"},
  {id:1000,cat:"上海博物馆馆情",q:"'大博物馆计划'到2025年基本建成的格局是什么？",o:["一馆一址","一体三馆/全城联动/特色清晰/相辅合璧","只建东馆","没有规划"],a:1,exp:"'一体三馆、全城联动、特色清晰、相辅合璧'的发展格局，并瞄准'十五五'扩展为'一馆四址'。"},
	{id:1001,cat:'📝 模考题库',q:"2023年集装箱吞吐量突破4900万标准箱，连续第十四年蝉联全球第一的港口是？",o:["宁波舟山港", "上海港", "深圳盐田港", "广州港"],a:1,exp:"1.上海港2023年集装箱吞吐量约4915.8万标箱，连续14年居全球第一。2.上海港口2025年集装箱吞吐量5506万，连续16年第一"},
	{id:1002,cat:'📝 模考题库',q:"“中国天眼”FAST发现的中性氢星系，距离地球约为？",o:["40亿光年", "50亿光年", "55亿光年", "65亿光年"],a:1,exp:"相关报道为约50亿光年，不是55亿光年。"},
	{id:1003,cat:'📝 模考题库',q:"甲遭乙追杀，情急之下夺过丙的摩托车逃离，致使丙骨折、摩托车损毁。甲的行为属于？",o:["正当防卫", "紧急避险", "抢夺罪", "故意伤害"],a:1,exp:"为避免正在发生的人身危险，不得已损害第三人财产、人身权益，属于紧急避险。"},
	{id:1004,cat:'📝 模考题库',q:"决议与决定这两种公文的主要区别之一是？",o:["发文机关级别不同", "形成程序不同", "执行效力不同", "内容详略不同"],a:1,exp:"决议通常经会议讨论表决形成；决定可由机关依法作出。"},
	{id:1005,cat:'📝 模考题库',q:"我国刑法关于溯及力所采用的原则是？",o:["从旧原则", "从新原则", "从旧兼从轻原则", "从新兼从重原则"],a:2,exp:"《刑法》第十二条确立从旧兼从轻原则。"},
	{id:1006,cat:'📝 模考题库',q:"第十届世界水论坛的主题是？",o:["水和粮食、环境", "水促进共享繁荣", "水，共同的财富", "世界水展望"],a:1,exp:"主题为“Water for Shared Prosperity”，即“水促进共享繁荣”。"},
	{id:1007,cat:'📝 模考题库',q:"可能危及人体健康和人身、财产安全的工业产品，在未制定国家标准、行业标准的情况下，必须符合？",o:["企业自行制定的标准", "技术监督部门的口头要求", "保障人体健康、人身财产安全的要求", "同类产品的国际标准"],a:2,exp:"必须符合保障人体健康和人身、财产安全的要求。"},
	{id:1008,cat:'📝 模考题库',q:"人民法院依照法律规定独立行使审判权时，应不受以下哪个主体的干涉？",o:["同级人民政府", "上级人民法院", "人民检察院", "社会公众舆论"],a:0,exp:"宪法规定人民法院依法独立审判，不受行政机关、社会团体和个人干涉。"},
	{id:1009,cat:'📝 模考题库',q:"中国共产党第一次全国代表大会和第二次全国代表大会的主要召开地点是？",o:["北京", "上海", "广州", "武汉"],a:1,exp:"一大在上海开幕后转至嘉兴南湖；二大全程在上海召开。"},
	{id:1010,cat:'📝 模考题库',q:"成语“指鹿为马”涉及的历史人物是？",o:["秦始皇", "赵高", "项羽", "秦桧"],a:1,exp:"赵高借此试探群臣。"},
	{id:1011,cat:'📝 模考题库',q:"关于“超级地球”TOI-715 b，下列说法错误的是？",o:["它绕一颗M型红矮星运行", "距离地球约137光年", "公转周期约为19个地球日", "半径约为地球的2.5倍"],a:3,exp:"TOI-715 b半径约为地球1.5倍左右，2.5倍说法错误。"},
	{id:1012,cat:'📝 模考题库',q:"上海“长江口二号”古沉船主要属于哪个历史时期？",o:["明代万历年间", "清代同治年间", "宋代咸淳年间", "元代至正年间"],a:1,exp:"长江口二号为清代同治年间贸易商船。"},
	{id:1013,cat:'📝 模考题库',q:"上海博物馆东馆正式面向公众开放的时间是？",o:["2022年", "2023年", "2024年", "2025年"],a:2,exp:"上博东馆于2024年起分阶段向公众开放。"},
	{id:1014,cat:'📝 模考题库',q:"以下哪一项不属于2008年首批文物系统免费开放的博物馆、纪念馆名录？",o:["上海博物馆", "中共一大会址纪念馆", "上海鲁迅纪念馆", "上海科技馆"],a:3,exp:"上海科技馆属科普类场馆，按文物系统口径不列入。"},
	{id:1015,cat:'📝 模考题库',q:"根据博物馆定级常识，下列哪一项最不适合作为“上海市国家一级博物馆”的判断对象？",o:["上海博物馆", "中共一大纪念馆", "上海科技馆", "某未参加全国定级评估的社区展示馆"],a:0,exp:"原题四项均可视作一级馆，需换入非一级馆选项。"},
	{id:1016,cat:'📝 模考题库',q:"根据国际博物馆协会ICOM 2022年通过的最新定义，博物馆的核心使命不包括？",o:["研究", "收藏", "传播", "营利"],a:3,exp:"ICOM定义强调非营利、收藏、研究、阐释、展示、教育等，不包括营利。"},
	{id:1017,cat:'📝 模考题库',q:"每年的“国际博物馆日”定于何时？",o:["5月18日", "5月28日", "6月18日", "10月1日"],a:0,exp:"每年5月18日为国际博物馆日。"},
	{id:1018,cat:'📝 模考题库',q:"被誉为“中国博物馆之父”的张謇于1905年创办的中国近代第一家公共博物馆是？",o:["故宫博物院", "南通博物苑", "震旦博物院", "国立历史博物馆"],a:1,exp:"南通博物苑由张謇创办。"},
	{id:1019,cat:'📝 模考题库',q:"国际博物馆协会ICOM成立于哪一年，总部设于何处？",o:["1946年，伦敦", "1946年，巴黎", "1950年，纽约", "1950年，罗马"],a:1,exp:"ICOM成立于1946年，总部设于巴黎。"},
	{id:1020,cat:'📝 模考题库',q:"国务院颁布的《博物馆条例》自哪一年起正式施行？",o:["2013年", "2015年", "2017年", "2019年"],a:1,exp:"《博物馆条例》自2015年3月20日起施行。"},
	{id:1021,cat:'📝 模考题库',q:"在博物馆的各项职能中，被视为“立馆之本”或基础功能的是？",o:["社会教育", "陈列展览", "藏品征集与保护", "文化产业开发"],a:2,exp:"藏品是博物馆业务活动的物质基础，征集、保护、研究是基础。"},
	{id:1022,cat:'📝 模考题库',q:"依据《中华人民共和国文物保护法》，可移动文物的等级划分表述正确的是？",o:["仅分为一级、二级、三级", "分为珍贵文物和一般文物；珍贵文物分为一级、二级、三级", "分为国宝级、一级、二级、三级", "由收藏单位自行确定等级"],a:1,exp:"可移动文物分珍贵文物和一般文物；珍贵文物分一级、二级、三级。"},
	{id:1023,cat:'📝 模考题库',q:"博物馆陈列展览的基本原则不包括以下哪一项？",o:["科学性", "艺术性", "营利性", "思想性"],a:2,exp:"博物馆展览强调科学性、思想性、艺术性，不以营利性为原则。"},
	{id:1024,cat:'📝 模考题库',q:"《中国文物、博物馆工作者职业道德准则》修订通过于哪一年？",o:["1997年", "2005年", "2012年", "2018年"],a:2,exp:"《中国文物、博物馆工作者职业道德准则》2012年修订。"},
	{id:1025,cat:'📝 模考题库',q:"国际博协通常将“博物馆之夜”活动与国际博物馆日相结合，其主要目的是？",o:["降低运营成本", "吸引夜间消费", "延长公众参与时间，拉近与社区关系", "配合安保演练"],a:2,exp:"延长公众参与时间，增强博物馆与社区、公众的联系。"},
	{id:1026,cat:'📝 模考题库',q:"根据行业规范，博物馆全年开放时间原则上不应少于多少天？",o:["250天", "300天", "350天", "365天"],a:1,exp:"行业评估和公共服务要求中常以300天作为常见标准。"},
	{id:1027,cat:'📝 模考题库',q:"国际上通常所说的“世界四大博物馆”中，位于俄罗斯圣彼得堡的是？",o:["大英博物馆", "卢浮宫博物馆", "大都会艺术博物馆", "艾尔米塔什博物馆"],a:3,exp:"艾尔米塔什博物馆即冬宫，位于俄罗斯圣彼得堡。"},
	{id:1028,cat:'📝 模考题库',q:"博物馆学作为一门独立的学科，其早期理论研究主要兴起于哪个国家？",o:["英国", "法国", "德国", "美国"],a:2,exp:"1.德国较早出现系统博物馆学研究。2.1880美国鲁金斯明确提出博物馆的教育功能"},
	{id:1029,cat:'📝 模考题库',q:"中国文物保护中“修旧如旧”原则的形成，主要与以下哪个文件及人物相关？",o:["《雅典宪章》，勒·柯布西耶", "《威尼斯宪章》，梁思成", "《华盛顿宪章》，吴良镛", "《奈良真实性文件》，约翰·拉斯金"],a:1,exp:"梁思成等对中国文物建筑修缮原则影响深远；国际上可联系1964《威尼斯宪章》：不能破坏文物原有的艺术和历史价值。"},
	{id:1030,cat:'📝 模考题库',q:"相较于学校教育，博物馆教育的核心特征在于？",o:["强制性", "系统性", "实物直观性与体验性", "应试导向性"],a:2,exp:"博物馆教育区别于学校教育的关键在实物直观性、体验性。"},
	{id:1031,cat:'📝 模考题库',q:"中国博物馆协会的前身成立于哪一年？",o:["1935年", "1949年", "1982年", "1990年"],a:0,exp:"中国博物馆协会1935年在北平成立，1982年中国博物馆学会在北京成立，1983年中国博物馆学会加入icom，2010年更名为协会"},
	{id:1032,cat:'📝 模考题库',q:"“数字博物馆”的概念在全球范围内大规模兴起主要是在哪个年代？",o:["1980年代", "1990年代", "2000年代", "2010年代"],a:1,exp:"随互联网和信息技术发展，1990年代数字博物馆概念兴起。"},
	{id:1033,cat:'📝 模考题库',q:"博物馆中的Curator，其核心职责是？",o:["负责安保巡逻", "负责藏品研究与展览策划", "负责票务销售", "负责餐饮后勤"],a:1,exp:"策展人负责藏品研究、学术阐释、展览策划等。"},
	{id:1034,cat:'📝 模考题库',q:"“新博物馆学”运动对传统博物馆学的主要批判在于其过于强调？",o:["社区参与", "生态保护", "以物为中心", "非营利性质"],a:2,exp:"新博物馆学强调从“以物为中心”转向社会、社区与公众。"},
	{id:1035,cat:'📝 模考题库',q:"中共中央办公厅、国务院办公厅2021年印发的《关于推进博物馆改革发展的指导意见》提出，到2035年我国要基本建成？",o:["博物馆大国", "博物馆强国", "世界博物馆之都", "中华文化展示中心"],a:1,exp:"《关于推进博物馆改革发展的指导意见》提出到2035年基本建成博物馆强国。"},
	{id:1036,cat:'📝 模考题库',q:"上海博物馆人民广场本馆的建筑外观设计体现了中国传统哲学中的哪种理念？",o:["天人合一", "天圆地方", "阴阳五行", "上善若水"],a:1,exp:"上圆下方，象征“天圆地方”。"},
	{id:1037,cat:'📝 模考题库',q:"上海博物馆东馆的具体地理位置位于？",o:["黄浦区人民广场", "浦东新区世纪大道", "杨浦区滨江地带", "徐汇区西岸艺术中心"],a:1,exp:"上博东馆位于浦东新区世纪大道1952号。"},
	{id:1038,cat:'📝 模考题库',q:"上海博物馆策划的“何以中国”文物考古大展系列的首展主题是？",o:["万里长江", "宅兹中国", "汉唐气象", "东方之美"],a:1,exp:"首展为“宅兹中国——河南夏商周三代文明展”。"},
	{id:1039,cat:'📝 模考题库',q:"上海博物馆馆藏重器“大克鼎”出土于哪个省份？",o:["河南省", "陕西省", "山东省", "山西省"],a:1,exp:"大克鼎出土于陕西扶风。"},
	{id:1040,cat:'📝 模考题库',q:"上博馆藏的“子仲姜盘”因其内部立体动物浮雕可原地旋转而闻名，它属于哪个历史时期？",o:["商代晚期", "西周中期", "春秋早期", "战国中期"],a:2,exp:"子仲姜盘为春秋早期青铜器。"},
	{id:1041,cat:'📝 模考题库',q:"唐代怀素的《苦笋帖》现藏于以下哪座博物馆？",o:["北京故宫博物院", "台北故宫博物院", "上海博物馆", "辽宁省博物馆"],a:2,exp:"唐怀素《苦笋帖》现藏上海博物馆。"},
	{id:1042,cat:'📝 模考题库',q:"上海博物馆于1994年从香港抢救回归的大批珍贵文献是？",o:["敦煌遗书", "殷墟甲骨", "战国楚竹书", "明清内阁档案"],a:2,exp:"指上海博物馆藏战国楚竹书——《孔子诗论》马承源命名（1006字，29枚）。"},
	{id:1043,cat:'📝 模考题库',q:"下列传世名画中，现收藏于上海博物馆的是？",o:["张择端《清明上河图》", "王希孟《千里江山图》", "孙位《高逸图》", "黄公望《富春山居图·无用师卷》"],a:2,exp:"唐孙位《高逸图》藏上海博物馆。"},
	{id:1044,cat:'📝 模考题库',q:"上博馆藏的“晋侯稣钟”铭文记载了哪位西周诸侯的事迹？",o:["晋文侯", "晋献侯，即晋侯稣", "晋悼公", "晋景公"],a:1,exp:"晋侯稣钟铭文记载晋侯稣相关事迹。"},
	{id:1045,cat:'📝 模考题库',q:"上海市现存重要元代木结构建筑是？",o:["龙华塔", "松江方塔", "真如寺大殿", "豫园玉玲珑"],a:2,exp:"真如寺大殿为上海重要元代木构建筑。"},
	{id:1046,cat:'📝 模考题库',q:"上海五大古典园林中，被列为全国重点文物保护单位的是？",o:["古猗园", "秋霞圃", "豫园", "曲水园"],a:2,exp:"豫园为全国重点文物保护单位。"},
	{id:1047,cat:'📝 模考题库',q:"“长江口二号”古船整体打捞出水后，迁移至何处开展考古与保护？",o:["上海博物馆人民广场馆", "上海博物馆东馆", "杨浦滨江上海船厂旧址1号船坞", "上海中国航海博物馆临港馆区"],a:2,exp:"迁移至杨浦滨江上海船厂旧址1号船坞开展保护与考古。"},
	{id:1048,cat:'📝 模考题库',q:"上海首个被批准立项的国家考古遗址公园是？",o:["崧泽遗址", "广富林遗址", "福泉山遗址", "青龙镇遗址"],a:1,exp:"广富林遗址为上海首个获批立项的国家考古遗址公园。"},
	{id:1049,cat:'📝 模考题库',q:"博物馆的核心功能通常可概括为以下哪一项？",o:["海纳百川，追求卓越", "传承文明，服务社会", "收藏、研究、展示、教育", "文明互鉴，美美与共"],a:2,exp:"收藏、研究、展示、教育是博物馆核心功能概括。"},
	{id:1050,cat:'📝 模考题库',q:"截至第五批全国博物馆定级评估后，上海市国家一级博物馆数量约为？",o:["5家", "8家", "12家", "20家"],a:2,exp:"第五批定级后上海国家一级博物馆约12家。"},
	{id:1051,cat:'📝 模考题库',q:"商代晚期的“后母戊鼎”现主要收藏于？",o:["上海博物馆", "中国国家博物馆", "北京故宫博物院", "殷墟博物馆"],a:1,exp:"后母戊鼎现藏中国国家博物馆。"},
	{id:1052,cat:'📝 模考题库',q:"以下哪件青铜器不属于上海博物馆的重要青铜器馆藏？",o:["大克鼎", "子仲姜盘", "晋侯稣钟", "四羊方尊"],a:3,exp:"四羊方尊现藏中国国家博物馆。"},
	{id:1053,cat:'📝 模考题库',q:"宋代五大名窑中的汝窑，其窑址位于今天的哪个省份？",o:["河北省", "河南省", "浙江省", "江西省"],a:1,exp:"汝窑窑址位于河南宝丰清凉寺一带。"},
	{id:1054,cat:'📝 模考题库',q:"元代青花瓷器所使用的进口钴料“苏麻离青”，主要产自？",o:["东南亚", "波斯地区", "南非", "欧洲"],a:1,exp:"元青花常用进口钴料，通常认为来自波斯地区。"},
	{id:1055,cat:'📝 模考题库',q:"唐代陆龟蒙诗中“九秋风露越窑开，夺得千峰翠色来”所赞誉的秘色瓷，主要产自？",o:["邢窑", "越窑", "龙泉窑", "景德镇窑"],a:1,exp:"秘色瓷为越窑青瓷精品。"},
	{id:1056,cat:'📝 模考题库',q:"中国书法史上被称为“天下三大行书”的作品，不包括以下哪一项？",o:["王羲之《兰亭序》", "颜真卿《祭侄文稿》", "苏轼《寒食帖》", "欧阳询《九成宫醴泉铭》"],a:3,exp:"《九成宫醴泉铭》为欧阳询楷书名作，不属行书三大。"},
	{id:1057,cat:'📝 模考题库',q:"宋代书法“瘦金体”的创制者是？",o:["宋太宗赵光义", "宋徽宗赵佶", "宋高宗赵构", "苏轼"],a:1,exp:"瘦金体为宋徽宗赵佶所创。"},
	{id:1058,cat:'📝 模考题库',q:"“吴门四家”中，以工笔重彩仕女画著称，代表作有《汉宫春晓图》的是？",o:["沈周", "文徵明", "唐寅", "仇英"],a:3,exp:"仇英擅工笔重彩人物，《汉宫春晓图》为其代表作。"},
	{id:1059,cat:'📝 模考题库',q:"唐代开始铸造的“开元通宝”，始铸于哪位皇帝在位期间？",o:["唐太宗李世民", "唐高祖李渊", "唐玄宗李隆基", "武则天"],a:1,exp:"唐高祖武德四年始铸开元通宝。"},
	{id:1060,cat:'📝 模考题库',q:"中国古代丧葬制度中的“金缕玉衣”，主要流行于哪个时代？",o:["商周时期", "战国至汉代，尤以汉代为盛", "魏晋南北朝", "隋唐时期"],a:1,exp:"金缕玉衣主要流行于汉代诸侯王、贵族葬制中。"},
	{id:1061,cat:'📝 模考题库',q:"在书画鉴定中，通过分析作品中避讳皇帝名字来推断年代的方法，被称为？",o:["笔墨分析法", "避讳断代法", "装裱断代法", "著录核对法"],a:1,exp:"书画、文献鉴定中可通过避讳进行断代。"},
	{id:1062,cat:'📝 模考题库',q:"明代彩瓷中，斗彩与青花五彩的主要区别在于？",o:["烧制温度完全不同", "釉下青花是否主要作为纹饰轮廓线", "产地完全不同", "釉料成分完全不同"],a:1,exp:"斗彩以釉下青花勾线，釉上填彩；青花五彩中青花参与整体设色。"},
	{id:1063,cat:'📝 模考题库',q:"阅读文段：“文物保护讲究‘修旧如旧’原则，即修复工作既要消除病害，又要最大限度保留历史信息。”对划线部分理解最准确的是？",o:["修复必须完全恢复文物出厂时的原貌", "修复可以加入现代审美进行创新", "修复是必要干预与原貌保留的动态平衡", "修复只需要进行表面清洁即可"],a:2,exp:"强调必要干预、最小干预与历史信息保留的平衡。"},
	{id:1064,cat:'📝 模考题库',q:"填入横线处最恰当的一项：“这件宋代瓷器的釉色____，在自然光下呈现出微妙的层次变化。”",o:["斑驳陆离", "扑朔迷离", "流光溢彩", "玲珑剔透"],a:2,exp:"“流光溢彩”较适合形容釉色光彩变化。"},
	{id:1065,cat:'📝 模考题库',q:"下列句子中，标点符号使用正确的一项是？",o:["考古队发现了陶罐、骨器、以及石制工具等三类文物。", "研究报告指出：“该遗址的年代跨度，约为新石器时代晚期至商周时期”。", "青铜器成分分析需借助X射线荧光光谱仪（一种无损检测设备）。", "专家建议建立数字档案——包括三维扫描数据、高清照片等重要资料。"],a:2,exp:"括号说明用法正确；其他项存在顿号、引号或破折号使用问题。"},
	{id:1066,cat:'📝 模考题库',q:"下列句子中，关联词语使用恰当的一项是？",o:["不但丝绸保存难度大，而且其修复技术要求极高。", "尽管采取恒温恒湿措施，因此部分壁画仍出现褪色。", "只要完成碳十四检测，就才能确定文物的绝对年代。", "无论氧化程度如何严重，也要可能坚持最小干预原则。"],a:0,exp:"“不但……而且……”搭配恰当。"},
	{id:1067,cat:'📝 模考题库',q:"对下面这段话的主旨概括最准确的一项是：“博物馆教育功能的实现不能局限于单向传播。通过互动装置、VR等技术，让观众在参与中建立与展品的深层联结，这种体验式学习更能激发文化认同。”",o:["博物馆应该大量采购VR设备。", "体验式学习的效果绝对优于单向传播。", "博物馆教育需要从单向输出转向双向互动与体验。", "文化认同是博物馆建设的唯一目标。"],a:2,exp:"重点是博物馆教育从单向传播转向互动体验。"},
	{id:1068,cat:'📝 模考题库',q:"下列诗句的作者属于“诗圣”杜甫的是？",o:["春蚕到死丝方尽，蜡炬成灰泪始干", "朱门酒肉臭，路有冻死骨", "问君能有几多愁，恰似一江春水向东流", "但愿人长久，千里共婵娟"],a:1,exp:"“朱门酒肉臭，路有冻死骨”出自杜甫《自京赴奉先县咏怀五百字》。 春蚕到死——晚唐 李商隐、问君能有几多愁——李煜（南唐）、但愿人长久——苏轼（北宋）"},
	{id:1069,cat:'📝 模考题库',q:"下列作家与作品对应错误的一项是？",o:["司马迁——《史记》", "司马光——《资治通鉴》", "刘勰——《文心雕龙》", "郦道元——《水经》"],a:3,exp:"郦道元著《水经注》，不是《水经》。"},
	{id:1070,cat:'📝 模考题库',q:"北宋思想家张载提出的“为天地立心，为生民立命，为往圣继绝学，为万世开太平”，被称为？",o:["朱子家训", "横渠四句", "阳明心学", "濂溪之学"],a:1,exp:"1.“为天地立心……”称为“横渠四句”。2.濂溪之学（周敦颐）"},
	{id:1071,cat:'📝 模考题库',q:"根据国际博物馆协会的定义，博物馆应具备的核心属性包括？",o:["永久性机构", "以营利为目的", "面向公众开放", "从事收藏、研究、传播与教育"],a:[0, 2, 3],exp:"博物馆是非营利、永久性、向公众开放，承担收藏、研究、教育等功能。",multi:true},
	{id:1072,cat:'📝 模考题库',q:"上海博物馆目前及规划中的场馆布局主要包括以下哪些部分？",o:["人民广场本馆", "浦东东馆", "杨浦滨江北馆，即长江口二号古船博物馆方向", "西岸龙美术馆"],a:[0, 1, 2],exp:"包括人民广场馆、浦东东馆、杨浦滨江北馆规划；龙美术馆非上博体系。",multi:true},
	{id:1073,cat:'📝 模考题库',q:"下列属于上海博物馆馆藏重要青铜器的有？",o:["大克鼎", "子仲姜盘", "晋侯稣钟", "毛公鼎"],a:[0, 1, 2],exp:"大克鼎、子仲姜盘、晋侯稣钟均为上博重要青铜器；毛公鼎藏台北故宫。",multi:true},
	{id:1074,cat:'📝 模考题库',q:"依据《中华人民共和国文物保护法》，受国家保护的文物必须具备的价值包括？",o:["历史价值", "艺术价值", "科学价值", "经济价值"],a:[0, 1, 2],exp:"文物保护法强调历史、艺术、科学价值，不以经济价值为判断标准。",multi:true},
	{id:1075,cat:'📝 模考题库',q:"晚清“海派四杰”或“海上四大家”通常包括以下哪些画家？",o:["任伯年", "吴昌硕", "虚谷", "蒲华"],a:[0, 1, 2, 3],exp:"任伯年、吴昌硕、虚谷、蒲华常称海派四杰或海上四大家。",multi:true},
	{id:1076,cat:'📝 模考题库',q:"上海博物馆“何以中国”文物考古大展系列已经或正在推出的主题包括？",o:["宅兹中国", "实证中国", "星耀中国", "肇兴中国"],a:[0, 1, 2, 3],exp:"可包括宅兹中国、实证中国——淞泽良渚、星耀中国、龙腾中国——红山肇兴中国等。",multi:true},
	{id:1077,cat:'📝 模考题库',q:"博物馆的陈列展览通常可以分为以下哪些类型？",o:["基本陈列", "专题陈列", "临时展览", "巡回展览"],a:[0, 1, 2, 3],exp:"基本陈列、专题陈列、临时展览、巡回展览均属常见类型。",multi:true},
	{id:1078,cat:'📝 模考题库',q:"传统文物鉴定中的“目鉴”方法，主要依据以下哪些方面进行综合判断？",o:["材质、工艺与造型", "纹饰、款识与铭文", "传世著录与流传经过", "X射线荧光光谱分析"],a:[0, 1, 2],exp:"目鉴依靠材质、工艺、造型、纹饰、款识、著录、流传等；XRF属科技检测。",multi:true},
	{id:1079,cat:'📝 模考题库',q:"中国书画著录史上的重要典籍包括？",o:["《宣和书谱》", "《石渠宝笈》", "《佩文斋书画谱》", "《考工记》"],a:[0, 1, 2],exp:"《宣和书谱》《石渠宝笈》《佩文斋书画谱》（康熙官修书画百科全书，第一部集书画著作大成的官修类书）均属书画著录类；《考工记》非书画著录。",multi:true},
	{id:1080,cat:'📝 模考题库',q:"2008年全国首批免费开放的文博纪念场馆中，位于上海的有？",o:["上海博物馆", "中共一大会址纪念馆", "上海鲁迅纪念馆", "上海科技馆"],a:[0, 1, 2],exp:"按文物系统口径，上博、中共一大会址纪念馆、上海鲁迅纪念馆可选；上海科技馆为干扰。",multi:true},
	{id:1081,cat:'📝 模考题库',q:"下列属于博物馆社会教育工作范畴的活动形式有？",o:["专职讲解员导览", "青少年研学课程", "专家学术讲座", "文创商店经营"],a:[0, 1, 2],exp:"导览、研学、讲座均属社教；文创商店经营属文创产业。",multi:true},
	{id:1082,cat:'📝 模考题库',q:"中共中央办公厅、国务院办公厅《关于推进博物馆改革发展的指导意见》中提出的“博物馆+”发展方向包括？",o:["博物馆+教育", "博物馆+旅游", "博物馆+科技", "博物馆+外交，即文明互鉴"],a:[0, 1, 2, 3],exp:"包括教育、旅游、科技、外交/文明互鉴等综合发展方向。",multi:true},
	{id:1083,cat:'📝 模考题库',q:"中国古代“江南三大名楼”指的是？",o:["滕王阁", "黄鹤楼", "岳阳楼", "蓬莱阁"],a:[0, 1, 2],exp:"滕王阁（江西南昌）、黄鹤楼（武汉）、岳阳楼（湖南岳阳）并称江南三大名楼。中国四大名楼：江南三+蓬莱阁（山东烟台）/鹳鹊楼（山西永济）",multi:true},
	{id:1084,cat:'📝 模考题库',q:"当前博物馆数字化建设的核心内容通常包括？",o:["藏品高精度二维、三维数据采集", "线上虚拟展厅建设", "智慧导览与互动系统", "发行NFT数字藏品"],a:[0, 1, 2],exp:"数据采集、虚拟展厅、智慧导览互动系统是核心；NFT不是标准核心内容。",multi:true},
	{id:1085,cat:'📝 模考题库',q:"关于上海博物馆东馆的建筑特色与功能定位，下列说法正确的有？",o:["建筑设计灵感来源于玉石意象", "延续了人民广场本馆“天圆地方”的设计语言", "更加注重开放式陈列和互动体验", "主要只侧重于青铜器和陶瓷器的常设陈列"],a:[0, 2],exp:"东馆建筑意象与玉石相关，强调开放、互动、体验；非天圆地方。",multi:true},
	{id:1086,cat:'📝 模考题库',q:"上海博物馆成立于1952年，是新中国成立后的第一座大型国家级博物馆。",o:["正确", "错误"],a:1,exp:"成立时间对，但“第一座大型国家级博物馆”——辽宁省博"},
	{id:1087,cat:'📝 模考题库',q:"国际博物馆协会ICOM每年会确定一个统一的“国际博物馆日”主题。",o:["正确", "错误"],a:0,exp:"ICOM每年发布国际博物馆日主题。"},
	{id:1088,cat:'📝 模考题库',q:"晚清出土的“海内三宝”中，大克鼎现藏于上海博物馆。",o:["正确", "错误"],a:0,exp:"大盂鼎藏国博，大克鼎藏上博，毛公鼎藏台北故宫。"},
	{id:1089,cat:'📝 模考题库',q:"《中华人民共和国文物保护法》规定，可移动文物分为珍贵文物和一般文物，珍贵文物又分为一级文物、二级文物、三级文物。",o:["正确", "错误"],a:0,exp:"符合可移动文物定级表述。"},
	{id:1090,cat:'📝 模考题库',q:"上海博物馆东馆的建筑外形延续了人民广场本馆“天圆地方”的设计理念。",o:["正确", "错误"],a:1,exp:"东馆建筑意象是玉石/玉璞，不是人民广场馆天圆地方。"},
	{id:1091,cat:'📝 模考题库',q:"梁思成最早提出了文物保护中的“修旧如旧”原则。",o:["正确", "错误"],a:1,exp:"“最早提出”表述过绝对；梁思成等对该原则形成有重要影响。"},
	{id:1092,cat:'📝 模考题库',q:"博物馆中的Curator一词，专指负责库房保管的工作人员，不涉及学术研究。",o:["正确", "错误"],a:1,exp:"Curator涉及藏品研究、策展、阐释，不只是库房保管。"},
	{id:1093,cat:'📝 模考题库',q:"唐代书法家怀素的《苦笋帖》现收藏于上海博物馆。",o:["正确", "错误"],a:0,exp:"《苦笋帖》现藏上海博物馆。"},
	{id:1094,cat:'📝 模考题库',q:"北宋张择端的《清明上河图》现藏于上海博物馆。",o:["正确", "错误"],a:1,exp:"《清明上河图》藏北京故宫博物院。"},
	{id:1095,cat:'📝 模考题库',q:"“长江口二号”古船是我国重要的水下考古整体打捞与保护项目。",o:["正确", "错误"],a:0,exp:"长江口二号是世界级古船整体打捞和水下考古项目。"},
	{id:1096,cat:'📝 模考题库',q:"国际博物馆协会ICOM的总部设在英国伦敦。",o:["正确", "错误"],a:1,exp:"ICOM总部在法国巴黎。"},
	{id:1097,cat:'📝 模考题库',q:"费畊雨、费鸿年合著的《博物馆学概论》是中国早期系统的博物馆学理论著作。",o:["正确", "错误"],a:0,exp:"费畊雨、费鸿年《博物馆学概论》是中国早期重要博物馆学专著。"},
	{id:1098,cat:'📝 模考题库',q:"上海的广富林文化属于新石器时代晚期，距今约4000年左右。",o:["正确", "错误"],a:0,exp:"广富林文化距今约4100—3900年，属新石器时代晚期。"},
	{id:1099,cat:'📝 模考题库',q:"根据相关公共文化服务要求，博物馆在国家法定节假日和学校寒暑假期间原则上应当开放。",o:["正确", "错误"],a:0,exp:"公共文化服务要求博物馆在法定节假日、学校寒暑假期间原则上开放。"},
	{id:1100,cat:'📝 模考题库',q:"“海派”又称“海上画派”，活跃于清末民初的上海，代表人物有“四任”、吴昌硕、虚谷等。",o:["正确", "错误"],a:0,exp:"海派又称海上画派，清末民初活跃于上海。"},
	{id:1101,cat:'📝 模考题库',q:"2024年“文化和自然遗产日”的主题是？",o:["文物保护：时代共进 人民共享", "保护文物 传承文明", "加强非遗系统性保护，促进可持续发展", "人民的非遗 人民共享"],a:1,exp:"2024年文化和自然遗产日主题为“保护文物 传承文明”。2025：让文物焕发新活力、绽放新光彩。2026：文物属于人民，服务人民"},
	{id:1102,cat:'📝 模考题库',q:"根据《中华人民共和国文物保护法》，地下埋藏的文物归属权属于？",o:["发现者", "土地所有者", "国家", "地方政府"],a:2,exp:"境内地下、内水和领海中遗存的一切文物，属于国家所有。"},
	{id:1103,cat:'📝 模考题库',q:"我国负责文物保护工作的行政主管部门是？",o:["文化和旅游部", "国家文物局", "住房和城乡建设部", "自然资源部"],a:1,exp:"国家文物局主管全国文物保护工作，隶属于文化和旅游部管理。"},
	{id:1104,cat:'📝 模考题库',q:"2024年甲辰龙年，上海博物馆东馆在开馆之际重点推出的特展是？",o:["何以中国·宅兹中国", "金石筼筜——金西厓竹刻艺术特展", "星耀中国——三星堆·金沙古蜀文明展", "对话世界——丝绸之路上的壁画艺术"],a:2,exp:"上博东馆启用首日推出“星耀中国：三星堆·金沙古蜀文明展”。"},
	{id:1105,cat:'📝 模考题库',q:"上海博物馆的馆刊名称是？",o:["《文物》", "《考古》", "《上海博物馆集刊》", "《东南文化》"],a:2,exp:"上博馆刊现名为《上海博物馆集刊》。《文物》、《考古》——社科院考古研究所、《东南文化》——南博"},
	{id:1106,cat:'📝 模考题库',q:"被称为“文物大法”的法律文件是？",o:["《历史文化名城名镇名村保护条例》", "《中华人民共和国文物保护法》", "《博物馆条例》", "《非物质文化遗产法》"],a:1,exp:"《中华人民共和国文物保护法》是文物保护领域的基础性法律。"},
	{id:1107,cat:'📝 模考题库',q:"博物馆照明设计中，为保护光敏性展品，如纸质、纺织品、书画等，照度通常不应超过多少？",o:["50 Lux", "150 Lux", "300 Lux", "500 Lux"],a:0,exp:"纸质、纺织品、书画等光敏性展品通常按50 Lux严格控制。"},
	{id:1108,cat:'📝 模考题库',q:"上海博物馆馆藏的“商鞅方升”是哪一历史事件的实物见证？",o:["统一货币", "统一度量衡", "修筑长城", "焚书坑儒"],a:1,exp:"商鞅方升是秦统一度量衡的重要实物资料。"},
	{id:1109,cat:'📝 模考题库',q:"下列选项中，不属于“中国20世纪建筑遗产”的上海建筑是？",o:["上海外滩建筑群", "上海国际饭店", "上海博物馆人民广场馆", "上海中心大厦"],a:3,exp:"上海中心大厦为21世纪超高层建筑，不属20世纪建筑遗产。中国20世纪建筑遗产（现在评选截止至第九批）2024上海上榜8座：沪江大学、旧上海特别市政府大楼、绿房子（吴同文住宅是匈牙利建筑师邬达克之作）孙科住宅、上海联谊大厦、上海市文联办公楼、上海交响音乐博物馆、韬奋纪念馆 上博人馆属于第七批20世纪建筑遗产。"},
	{id:1110,cat:'📝 模考题库',q:"国家一级博物馆运行评估周期通常是？",o:["1年", "2年", "3年", "5年"],a:2,exp:"一级博物馆运行评估通常按三年一周期理解。 运行是3年一周期。定级针对想提高等级的，运行针对已经拿到等级的。现在完成了第5次定级评估（2023-2024），第7次运行评估（2022-2024）。"},
	{id:1111,cat:'📝 模考题库',q:"在博物馆学中，将藏品信息按规范字段描述、录入系统的过程称为？",o:["数字化采集", "数据清洗", "元数据著录", "信息化管理"],a:2,exp:"元数据著录是对藏品信息进行结构化、规范化描述的过程。"},
	{id:1112,cat:'📝 模考题库',q:"上博馆藏的唐代孙位《高逸图》，描绘的是魏晋时期“竹林七贤”中的哪四位？",o:["山涛、王戎、阮籍、嵇康", "山涛、王戎、刘伶、阮籍", "山涛、王戎、阮咸、刘伶", "阮籍、嵇康、山涛、向秀"],a:1,exp:"《高逸图》残卷所绘为山涛、王戎、刘伶、阮籍。"},
	{id:1113,cat:'📝 模考题库',q:"“剔红”是哪一种传统工艺的别称？",o:["金属镶嵌", "象牙雕刻", "雕漆", "螺钿镶嵌"],a:2,exp:"剔红属于雕漆工艺，即在多层红漆上雕刻纹样。"},
	{id:1114,cat:'📝 模考题库',q:"世界上现存最早的纸币“交子”出现在我国的哪个朝代？",o:["唐代", "宋代", "元代", "明代"],a:1,exp:"交子出现于北宋四川地区。"},
	{id:1115,cat:'📝 模考题库',q:"上海博物馆青铜馆中的春秋晚期“牺尊”，其造型是？",o:["牛形", "羊形", "猪形", "犀牛形"],a:0,exp:"上博牺尊为写实牛形青铜盛酒器，不是犀牛形。"},
	{id:1116,cat:'📝 模考题库',q:"下列哪项不属于博物馆教育的“非正式学习”特征？",o:["自愿性", "情境性", "强制性", "经验性"],a:2,exp:"博物馆学习强调自愿性、情境性、体验性，强制性属于正规学校教育特征。"},
	{id:1117,cat:'📝 模考题库',q:"著名的“大葆台汉墓”采用了哪种特殊墓葬结构？",o:["黄肠题凑", "因山为陵", "砖室墓", "土洞墓"],a:0,exp:"大葆台汉墓以“黄肠题凑”结构著称。墓主为广阳顷王刘建（汉武帝之孙）。黄肠题凑——《汉书·霍光传》汉宣帝赐黄肠题凑。"},
	{id:1118,cat:'📝 模考题库',q:"宋代金石学集大成的重要著作是？",o:["《历代名画记》", "《金石录》", "《考工记》", "《天工开物》"],a:1,exp:"《金石录》为赵明诚（李清照丈夫）撰，是宋代金石学集大成之作，宋代金石学还有：《集古录》——北宋 欧阳修、《考古图》——吕大临、《宣和博古图》——宋徽宗敕令，王黼编纂、先秦古器图碑》——刘敞（被认为是北宋最早金石学著录）。 《考工记》——先秦手工艺国家标准；《天工开物》——明代工艺百科全书》"},
	{id:1119,cat:'📝 模考题库',q:"上海博物馆东馆在建筑设计上特别强调“开放性”，以下哪项设计体现了这一点？",o:["封闭式库房", "全玻璃幕墙外立面", "大量公共社交空间和开放式文物修复展示", "地下停车场"],a:2,exp:"上博东馆设置公共交流空间、开放式文物修复展示等，强化公众参与。"},
	{id:1120,cat:'📝 模考题库',q:"在书画装裱形式中，“手卷”的展开方向通常是？",o:["上下", "左右", "折叠", "环绕"],a:1,exp:"手卷横向展开，通常从右向左逐段观赏。"},
	{id:1121,cat:'📝 模考题库',q:"宋代五大名窑中的“哥窑”，其最典型特征是？",o:["天青色釉", "无纹白釉", "釉下青花", "金丝铁线"],a:3,exp:"哥窑釉面开片，常以“金丝铁线”概括其特征。"},
	{id:1122,cat:'📝 模考题库',q:"“昭陵六骏”中两件流失海外、现藏美国宾夕法尼亚大学博物馆的是？",o:["飒露紫、拳毛騧", "青骓、什伐赤", "特勒骠、白蹄乌", "飒露紫、白蹄乌"],a:0,exp:"“飒露紫”“拳毛騧”现藏美国宾夕法尼亚大学博物馆。"},
	{id:1123,cat:'📝 模考题库',q:"上海地区发现较早的新石器时代文化是？",o:["崧泽文化", "良渚文化", "广富林文化", "马家浜文化"],a:3,exp:"上海地区较早的新石器文化一般为马家浜文化。（淞泽文化是新时期晚期，承接马家浜和良渚）"},
	{id:1124,cat:'📝 模考题库',q:"博物馆库房的相对湿度一般控制在什么范围较为适宜？",o:["20%—30%", "45%—60%", "70%—80%", "85%以上"],a:1,exp:"45%—60%是多数有机、无机文物较常见的控制区间。"},
	{id:1125,cat:'📝 模考题库',q:"下列文物中，出土于湖北曾侯乙墓的是？",o:["司南", "编钟", "越王勾践剑", "素纱襌衣"],a:1,exp:"曾侯乙墓出土大型编钟。"},
	{id:1126,cat:'📝 模考题库',q:"“景泰蓝”工艺的正名是？",o:["铜胎掐丝珐琅", "画珐琅", "錾胎珐琅", "透明珐琅"],a:0,exp:"景泰蓝即铜胎掐丝珐琅。"},
	{id:1127,cat:'📝 模考题库',q:"上博馆藏的东晋王献之《鸭头丸帖》属于哪种书法字体？",o:["楷书", "隶书", "草书", "行书"],a:3,exp:"上博官网定名为“王献之行书鸭头丸帖卷”。"},
	{id:1128,cat:'📝 模考题库',q:"下列哪项不是博物馆策展人的主要工作职责？",o:["撰写展览大纲", "负责展品的安全保卫", "挑选借展文物", "参与学术研究"],a:1,exp:"安全保卫通常由安保部门负责，策展人主要负责研究、选题、展品组织和阐释。"},
	{id:1129,cat:'📝 模考题库',q:"我国古代最大的类书是？",o:["《四库全书》", "《永乐大典》", "《古今图书集成》", "《资治通鉴》"],a:1,exp:"类书——百科全书，把书籍内容打散重编；丛书——图书合集，按经史子集重编， 《永乐大典》—明永乐 ——中国古代规模最大的类书/百科全书。 《古今图书集成》—清康熙、雍正—现存最完整类书/古代百科全书。 《四库全书》——清乾隆——最大丛书/古代典籍图书馆。"},
	{id:1130,cat:'📝 模考题库',q:"上海博物馆玉器收藏中的“神人兽面纹玉琮”，其纹饰源自哪个文化系统？",o:["龙山文化", "红山文化", "良渚文化", "齐家文化"],a:2,exp:"神人兽面纹是良渚玉琮的典型纹饰。"},
	{id:1131,cat:'📝 模考题库',q:"在文物保护修复中，“最小干预原则”是指？",o:["尽量少花钱", "尽量不做修复，完全保留原状", "去除病害的同时，尽可能保留文物历史信息和原有材质", "只使用微型工具"],a:2,exp:"去除病害的同时尽可能保留原有材质、历史信息和真实性。"},
	{id:1132,cat:'📝 模考题库',q:"三星堆出土的体量最大、最具代表性的青铜人像是？",o:["青铜大立人像", "青铜纵目面具", "青铜跪坐人像", "金面罩青铜人头像"],a:0,exp:"青铜大立人像是三星堆最具代表性的高大青铜人像。本身1.6m，加上底座2.6m"},
	{id:1133,cat:'📝 模考题库',q:"下列哪个节日不是我国“二十四节气”之一？",o:["清明", "端午", "冬至", "芒种"],a:1,exp:"端午是传统节日，不是节气；清明既是节气也是节日。"},
	{id:1134,cat:'📝 模考题库',q:"博物馆观众调查中，最常用的定量调查方法是？",o:["深度访谈", "问卷调查", "参与式观察", "焦点小组"],a:1,exp:"问卷调查便于量化统计。"},
	{id:1135,cat:'📝 模考题库',q:"上博馆藏的“景德镇窑青花缠枝牡丹纹罐”属于哪个朝代的典型器物？",o:["宋代", "元代", "明代洪武年间", "清代康熙年间"],a:1,exp:"上博藏景德镇窑青花缠枝牡丹纹罐为元代器物。"},
	{id:1136,cat:'📝 模考题库',q:"文物出境审核的标准依据是？",o:["市场价格", "《文物出境审核标准》", "专家个人意见", "拍卖行情"],a:1,exp:"文物出境须依照《文物出境审核标准》。"},
	{id:1137,cat:'📝 模考题库',q:"“缂丝”工艺的特点是？",o:["通经通纬", "通经断纬", "断经通纬", "断经断纬"],a:1,exp:"缂丝为“通经断纬”。"},
	{id:1138,cat:'📝 模考题库',q:"上海历史博物馆的馆址位于？",o:["人民广场南侧", "南京西路黄陂北路一带", "淮海中路", "虹桥路"],a:1,exp:"馆址在南京西路黄陂北路一带的原跑马总会大楼。"},
	{id:1139,cat:'📝 模考题库',q:"下列哪项属于博物馆的“无形文化遗产”收藏或记录范畴？",o:["青铜器", "古籍善本", "口述史影像资料", "陶瓷器"],a:2,exp:"口述史影像资料是非物质文化遗产记录性资料。"},
	{id:1140,cat:'📝 模考题库',q:"我国第一个由国家颁布的现代学制是？",o:["壬寅学制", "癸卯学制", "壬戌学制", "六三三学制"],a:0,exp:"壬寅学制（20年）/《钦定学堂章程》-中国近代第一个由国家颁布的学制，但未实施。 1904-癸卯学制（25-26年）/《奏定学堂章程》-第一个实施的学制是清政府颁布的体现中体西用的思想，首次将师范教育和职业教育纳入国家学制体系。 1912-1913-壬子癸丑学制（17-18年）——南京临时政府蔡元培主持——资本主义性质学制（男女同校） 1922-壬戌（六三三）-借鉴美国沿用至今"},
	{id:1141,cat:'📝 模考题库',q:"在博物馆陈列中，用于分隔空间、引导视线并营造文化氛围的半通透隔断常被称为？",o:["展柜", "屏风", "展板", "护栏"],a:1,exp:"屏风可分隔空间、引导视线、营造氛围。"},
	{id:1142,cat:'📝 模考题库',q:"著名的“马踏飞燕”，即铜奔马，现藏于哪个博物馆？",o:["故宫博物院", "中国国家博物馆", "甘肃省博物馆", "陕西历史博物馆"],a:2,exp:"铜奔马为甘肃省博物馆镇馆之宝。"},
	{id:1143,cat:'📝 模考题库',q:"上博馆藏的《曹全碑》拓本，属于哪种书体？",o:["篆书", "隶书", "楷书", "行书"],a:1,exp:"《曹全碑》是汉隶经典。"},
	{id:1144,cat:'📝 模考题库',q:"重要博物馆建筑的耐火等级通常要求达到？",o:["一级", "二级", "三级", "四级"],a:0,exp:"博物馆属重要公共文化建筑，防火等级要求较高，通常不低于一级。"},
	{id:1145,cat:'📝 模考题库',q:"下列哪项不是导致纸质文物“酸化”的主要原因？",o:["造纸原料中的木质素", "环境污染，如二氧化硫等", "长期光照", "库房过于干燥"],a:3,exp:"过度干燥会造成脆化、变形，但不是纸张酸化的主要化学原因。"},
	{id:1146,cat:'📝 模考题库',q:"博物馆藏品分类中的“金银器”主要指？",o:["所有金属文物", "以金、银为主要材料制作的器物", "稀土金属器物", "近现代贵金属饰品"],a:1,exp:"金、银为主要材料制作的器物。"},
	{id:1147,cat:'📝 模考题库',q:"下列上博馆藏法书名迹中，传为王羲之作品的是？",o:["《苦笋帖》", "《上虞帖》", "《鸭头丸帖》", "《曹全碑》"],a:1,exp:"《上虞帖》是上博重要法书名迹。"},
	{id:1148,cat:'📝 模考题库',q:"在陶瓷鉴定中，“火石红”通常是指出现在瓷器哪个部位的现象？",o:["釉面", "胎釉结合处或底足露胎处", "器口内壁", "器内中心"],a:1,exp:"多见于胎釉结合处、底足、露胎（没有上釉的部分）处。"},
	{id:1149,cat:'📝 模考题库',q:"我国第一部纪传体通史是？",o:["《汉书》", "《史记》", "《后汉书》", "《三国志》"],a:1,exp:"《史记》为司马迁所撰，是第一部纪传体通史。"},
	{id:1150,cat:'📝 模考题库',q:"博物馆志愿者管理的基本原则不包括？",o:["自愿参与", "无偿服务", "强制考核", "规范管理"],a:2,exp:"志愿服务强调自愿、无偿、规范管理，不应以强制考核为核心原则。"},
	{id:1151,cat:'📝 模考题库',q:"著名的良渚文化“透雕人鸟兽玉饰件”出土于哪个遗址？",o:["良渚遗址", "崧泽遗址", "福泉山遗址", "广富林遗址", "赵陵山遗址"],a:4,exp:"该器出土于江苏昆山赵陵山遗址，藏南京博物院。已增设E项。"},
	{id:1152,cat:'📝 模考题库',q:"下列哪项不属于博物馆文创产品开发的原则？",o:["文化性", "实用性", "随意篡改文物原貌", "市场性"],a:2,exp:"文创开发应尊重文物原型与文化内涵，不能随意篡改。"},
	{id:1153,cat:'📝 模考题库',q:"“吴带当风，曹衣出水”形容的是哪两位画家的风格？",o:["吴道子、曹不兴", "吴道子、曹仲达", "吴镇、曹雪芹", "吴昌硕、曹霸"],a:1,exp:"分别指吴道子、曹仲达人物画衣纹风格。 曹不兴-三国·吴-佛画之祖； 曹仲达-北齐-曹家样，曹衣出水"},
	{id:1154,cat:'📝 模考题库',q:"上海博物馆的“中国历代绘画馆”为保护古画，通常采用哪种照明方式？",o:["自然光直射", "低照度人工感应照明", "普通日光灯", "霓虹灯"],a:1,exp:"低照度、感应式人工照明有利于保护书画类光敏文物。"},
