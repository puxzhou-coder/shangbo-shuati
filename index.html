	{id:1155,cat:'📝 模考题库',q:"文物藏品“总登记账”是博物馆的永久档案，其管理要求是？",o:["可以随意涂改", "应永久保存，不得随意涂改、销毁", "仅保存电子版即可", "每隔十年更换一次"],a:1,exp:"总登记账是永久档案，不得随意涂改、销毁。"},
	{id:1156,cat:'📝 模考题库',q:"下列画家中，不属于“元四家”的是？",o:["黄公望", "王蒙", "倪瓒", "赵孟頫"],a:3,exp:"元四家为黄公望、王蒙、倪瓒、吴镇；赵孟頫是重要先导。"},
	{id:1157,cat:'📝 模考题库',q:"博物馆举办临时展览的展期一般不超过？",o:["1个月", "3个月", "6个月", "12个月"],a:2,exp:"临时展览通常不宜过长，一般以不超过6个月为常见管理口径。"},
	{id:1158,cat:'📝 模考题库',q:"上博馆藏的“景德镇窑粉彩蝠桃纹瓶”是清代哪个时期的代表作品？",o:["顺治", "雍正", "乾隆", "嘉庆"],a:1,exp:"上博藏粉彩蝠桃纹瓶为雍正时期代表作。"},
	{id:1159,cat:'📝 模考题库',q:"在文物保护中，“原生性保护”主要针对的是？",o:["馆藏文物", "不可移动文物，如遗址、古建筑", "数字文物", "流动展览"],a:1,exp:"原生性保护强调在原址保护不可移动文物。"},
	{id:1160,cat:'📝 模考题库',q:"下列哪项不是衡量博物馆观众服务质量的核心标准？",o:["存包服务", "讲解服务", "餐饮价格", "无障碍设施"],a:2,exp:"餐饮价格属于经营服务问题，不是博物馆公共服务核心指标。"},
	{id:1161,cat:'📝 模考题库',q:"上海博物馆藏《淳化阁帖》最善本是如何入藏的？",o:["张伯驹捐赠", "吴湖帆捐赠", "从美国抢救回归", "考古发掘出土"],a:2,exp:"上博于2003年从美国抢救回归《淳化阁帖》最善本，并非吴湖帆捐献。 善本是版本质量高、文献价值高、存世较珍贵的古籍。 珍本重在“珍贵”，善本重在“版本优良”。 很多善本也是珍本，但珍本不一定都是善本。 旧本通常指年代较早的版本，但不一定达到善本标准。比如明清旧刻本、旧抄本，都可称旧本。"},
	{id:1162,cat:'📝 模考题库',q:"“青花五彩”瓷器的烧造鼎盛期是在明代哪个时期？",o:["永乐、宣德", "成化", "嘉靖、万历", "崇祯"],a:2,exp:"明嘉靖、万历时期青花五彩色彩浓艳，进入鼎盛。"},
	{id:1163,cat:'📝 模考题库',q:"博物馆在进行文物摄影时，为了保护文物，通常禁止使用？",o:["三脚架", "闪光灯", "长焦镜头", "黑白模式"],a:1,exp:"闪光灯强光可能损害光敏性文物。"},
	{id:1164,cat:'📝 模考题库',q:"《博物馆条例》规定，博物馆应当自取得登记证书之日起多长时间内向社会开放？",o:["3个月", "6个月", "1年", "2年"],a:1,exp:"《博物馆条例》规定应自取得登记证书之日起6个月内开放。"},
	{id:1165,cat:'📝 模考题库',q:"上博馆藏“商鞅方升”上刻有“廿六年，皇帝尽并兼天下诸侯”字样，这里的“皇帝”指的是？",o:["秦孝公", "秦惠文王", "秦始皇", "秦二世"],a:2,exp:"一器两铭，前证商鞅变法，后证秦始皇统一度量衡。外壁先刻有秦孝公十八年“大良造鞅”铭，“大良造鞅”即商鞅，二百多年后又加刻秦始皇诏书。 第一段：十八年，齐遣卿大夫众来聘。冬十二月乙酉，大良造鞅，爰积十六尊五分尊壹为升 第二段：“廿六年”指秦王政二十六年，即秦始皇统一六国之年。 秦孝公——商鞅➡秦始皇"},
	{id:1166,cat:'📝 模考题库',q:"下列哪种材质的文物对湿度变化最为敏感，容易受潮变形或霉变？",o:["石器", "金属器", "纸质和纺织品", "陶瓷器"],a:2,exp:"纸质、纺织品为有机质文物，易霉变、变形。"},
	{id:1167,cat:'📝 模考题库',q:"“文房四宝”中，产于安徽泾县的是？",o:["湖笔", "徽墨", "宣纸", "端砚"],a:2,exp:"宣纸产于安徽泾县一带。徽墨——安徽徽州（黄山）"},
	{id:1168,cat:'📝 模考题库',q:"上海博物馆东馆“中国古代青铜文明”常设展重点展示了哪一地区的青铜文化？",o:["巴蜀文化", "中原文化", "吴越文化", "北方草原文化"],a:1,exp:"上博青铜收藏以中原青铜文明为核心。"},
	{id:1169,cat:'📝 模考题库',q:"在博物馆观众行为分析中，观众停留时间较长、聚集较多的区域通常称为？",o:["热点区域", "冷点区域", "休息区", "入口区"],a:0,exp:"热点区域指观众聚集、停留较久的区域。"},
	{id:1170,cat:'📝 模考题库',q:"下列哪项不属于博物馆的核心社会功能？",o:["文化传承", "审美教育", "商品交易", "公共教育"],a:2,exp:"商品交易不是博物馆核心社会功能。"},
	{id:1171,cat:'📝 模考题库',q:"博物馆藏品征集的主要途径包括？",o:["考古发掘", "接受捐赠", "有偿购买", "调拨交换"],a:[0, 1, 2, 3],exp:"考古发掘、捐赠、购买、调拨交换均为常见合法途径。",multi:true},
	{id:1172,cat:'📝 模考题库',q:"以下哪些属于上海博物馆的特色收藏门类？",o:["青铜器", "陶瓷器", "书画", "甲骨竹简", "家具"],a:[0, 1, 2, 3, 4],exp:"上博以青铜、陶瓷、书画、甲骨竹简、家具等见长。",multi:true},
	{id:1173,cat:'📝 模考题库',q:"影响博物馆微环境质量的主要因素有？",o:["温度", "湿度", "光照", "空气污染", "有害生物"],a:[0, 1, 2, 3, 4],exp:"温湿度、光照、污染物、有害生物均影响保存环境。",multi:true},
	{id:1174,cat:'📝 模考题库',q:"以下哪些属于博物馆的智慧化建设内容？",o:["AI智能导览", "藏品三维数据库", "客流大数据分析", "单纯的传统消防报警系统", "线上云展览"],a:[0, 1, 2, 4],exp:"AI导览、三维数据库、客流分析、云展览均属于智慧化；消防报警属基础安全系统。",multi:true},
	{id:1175,cat:'📝 模考题库',q:"文物鉴定的基本方法包括？",o:["传统目鉴", "科学仪器检测", "文献考证", "市场询价", "占卜预测"],a:[0, 1, 2],exp:"目鉴、科技检测、文献考证是基本方法；市场询价、占卜不是鉴定方法。",multi:true},
	{id:1176,cat:'📝 模考题库',q:"以下哪些属于上海的历史文化风貌区？",o:["外滩历史文化风貌区", "衡山路—复兴路历史文化风貌区", "老城厢历史文化风貌区", "虹桥路历史文化风貌区", "人民广场历史文化风貌区"],a:[0, 1, 2, 3, 4],exp:"外滩、衡复、老城厢、虹桥路、人民广场均属上海中心城历史文化风貌区。",multi:true},
	{id:1177,cat:'📝 模考题库',q:"博物馆陈列艺术设计包含哪些方面？",o:["空间布局设计", "色彩基调设计", "灯光照明设计", "展品组合设计", "导览标识设计"],a:[0, 1, 2, 3, 4],exp:"空间、色彩、灯光、展品组合、导览标识均属陈列设计。",multi:true},
	{id:1178,cat:'📝 模考题库',q:"以下哪些属于国家级非物质文化遗产？",o:["昆曲", "古琴艺术", "端午节", "海派剪纸", "上海本帮菜肴传统烹饪技艺"],a:[0, 1, 2, 3, 4],exp:"昆曲、古琴、端午节、海派剪纸、本帮菜肴传统烹饪技艺（2014）均属国家级非遗。",multi:true},
	{id:1179,cat:'📝 模考题库',q:"博物馆安全保卫工作的“四防”通常可包括？",o:["人防", "物防", "技防", "犬防", "占防"],a:[0, 1, 2, 3],exp:"在博物馆安防语境中常见说法为人防、物防、技防、犬防；若地方文件采用“联防”，需看具体口径。",multi:true},
	{id:1180,cat:'📝 模考题库',q:"以下哪些著作是宋代关于金石学的重要成果？",o:["欧阳修《集古录》", "赵明诚《金石录》", "薛尚功《历代钟鼎彝器款识法帖》", "吕大临《考古图》", "张彦远《历代名画记》"],a:[0, 1, 2, 3],exp:"欧阳修《集古录》、赵明诚《金石录》、薛尚功《历代钟鼎彝器款识法帖》、吕大临《考古图》均相关；《历代名画记》是画史。",multi:true},
	{id:1181,cat:'📝 模考题库',q:"上海博物馆东馆的功能定位包括？",o:["中国古代艺术展示", "文物科技保护", "学术研究交流", "公众社会教育", "大型商业演出"],a:[0, 1, 2, 3],exp:"东馆承担中国古代艺术展示、文保科技、学术交流、社会教育等功能。",multi:true},
	{id:1182,cat:'📝 模考题库',q:"下列哪些属于书画作伪的常见手法？",o:["摹拓", "临写", "拼凑", "添款改款", "做旧"],a:[0, 1, 2, 3, 4],exp:"摹、临、拼凑、添款改款、做旧均为常见作伪方式。",multi:true},
	{id:1183,cat:'📝 模考题库',q:"博物馆教育活动的对象包括？",o:["学龄前儿童", "中小学生", "大学生及研究人员", "社区居民", "外国游客"],a:[0, 1, 2, 3, 4],exp:"博物馆教育面向全龄、全社会公众。",multi:true},
	{id:1184,cat:'📝 模考题库',q:"关于博物馆理事会制度，下列说法正确的有？",o:["是社会力量参与博物馆治理的重要形式", "负责审议博物馆章程和发展战略", "负责博物馆日常行政管理工作", "通常由政府代表、社会人士、专家等组成", "可作为博物馆的决策或咨询机构"],a:[0, 1, 3, 4],exp:"理事会参与治理、审议战略和章程，可为决策或咨询机构；日常行政管理由馆长及行政系统负责。",multi:true},
	{id:1185,cat:'📝 模考题库',q:"以下哪些属于“新博物馆学”关注的重点？",o:["社区博物馆", "生态博物馆", "以物为中心", "以人为中心", "批判性博物馆学"],a:[0, 1, 3, 4],exp:"新博物馆学关注社区、生态、公众和批判性反思，批判传统“以物为中心”。",multi:true},
	{id:1186,cat:'📝 模考题库',q:"博物馆的藏品总登记号一旦确定，即使文物损毁或注销，该号码也不能再次使用。",o:["正确", "错误"],a:0,exp:"总登记号具有唯一性和永久性，不应重复使用。"},
	{id:1187,cat:'📝 模考题库',q:"上海博物馆是首批国家一级博物馆之一。",o:["正确", "错误"],a:0,exp:"上海博物馆为首批国家一级博物馆之一（2008）。"},
	{id:1188,cat:'📝 模考题库',q:"“数字博物馆”就是简单地将实体博物馆的照片放到网上。",o:["正确", "错误"],a:1,exp:"数字博物馆包括数据采集、三维建模、知识组织、互动传播等，不只是图片上网。"},
	{id:1189,cat:'📝 模考题库',q:"所有进入博物馆的文物都需要经过严格修复处理。",o:["正确", "错误"],a:1,exp:"入藏需检查、登记、必要时消毒，但不一定都修复；稳定状态文物以预防性保护为主。"},
	{id:1190,cat:'📝 模考题库',q:"国际博协ICOM要求所有成员博物馆都必须向公众免费开放。",o:["正确", "错误"],a:1,exp:"ICOM强调公共性与可及性，但不强制所有博物馆免费。"},
	{id:1191,cat:'📝 模考题库',q:"上博馆藏的“晋侯稣钟”共有16枚，其中14枚现藏于上海博物馆，2枚藏于山西博物院。",o:["正确", "错误"],a:0,exp:"晋侯稣钟共16枚，14枚藏上博，另2枚藏山西博物院。"},
	{id:1192,cat:'📝 模考题库',q:"博物馆的库房温度越高，越有利于文物的长期保存。",o:["正确", "错误"],a:1,exp:"高温会加速材料老化，温湿度应稳定控制。"},
	{id:1193,cat:'📝 模考题库',q:"《富春山居图》的“无用师卷”现藏于台北故宫博物院，“剩山图”现藏于浙江省博物馆。",o:["正确", "错误"],a:0,exp:"该表述正确。"},
	{id:1194,cat:'📝 模考题库',q:"博物馆的“策展人”制度起源于美国。",o:["正确", "错误"],a:1,exp:"Curator概念和博物馆专业制度源流复杂，不能简单说“起源于美国”。制度雏形：德国"},
	{id:1195,cat:'📝 模考题库',q:"文物复制件可以在展览中替代原件展出，无需特别说明。",o:["正确", "错误"],a:1,exp:"复制品展出必须明确标注，不能误导观众。"},
	{id:1196,cat:'📝 模考题库',q:"上海博物馆的馆标Logo设计灵感来源于馆藏青铜器“大克鼎”的兽面纹。",o:["正确", "错误"],a:1,exp:"上博标识通常联系商鞅方升。"},
	{id:1197,cat:'📝 模考题库',q:"博物馆的公共服务区域不包括卫生间和休息座椅。",o:["正确", "错误"],a:1,exp:"卫生间、休息区、饮水处等均属于公共服务设施。"},
	{id:1198,cat:'📝 模考题库',q:"“预防性保护”是指通过控制环境来延缓文物老化，是现代文物保护的重要理念。",o:["正确", "错误"],a:0,exp:"预防性保护是现代文保核心理念之一。"},
	{id:1199,cat:'📝 模考题库',q:"上博东馆建成后增加了上海博物馆的展陈空间，使更多馆藏文物得以展示。",o:["正确", "错误"],a:0,exp:"东馆扩展了展陈空间，缓解馆藏展示不足问题。"},
	{id:1200,cat:'📝 模考题库',q:"博物馆的文创产品收入应当主要用于弥补行政办公经费不足。",o:["正确", "错误"],a:1,exp:"文创收入应主要用于博物馆事业发展，不应主要弥补行政办公经费。"},
	{id:1201,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，四川资阳濛溪河遗址群属于哪个时代？',o:["旧石器时代", "新石器时代", "夏商周", "秦汉"],a:0,exp:'四川资阳濛溪河遗址群属旧石器时代遗址。'},
	{id:1202,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，浙江仙居下汤遗址位于哪个省？',o:["江苏", "浙江", "福建", "江西"],a:1,exp:'浙江仙居下汤遗址由浙江省文物考古研究所发掘。'},
	{id:1203,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，甘肃临洮寺洼遗址的考古价值主要在于？',o:["汉代墓葬", "马家窑文化与早期青铜时代", "唐代佛教遗址", "西夏窑址"],a:1,exp:'甘肃临洮寺洼遗址对研究马家窑文化向青铜时代过渡具有关键价值。'},
	{id:1204,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，湖北黄陂盘龙城遗址主要是哪个时期的？',o:["旧石器时代", "新石器时代", "商代", "西汉"],a:2,exp:'盘龙城遗址是商代南方重要城邑，对研究商代南方青铜文明意义重大。'},
	{id:1205,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，陕西宝鸡周原遗址的核心发现不包括？',o:["大型宫室建筑基址", "甲骨文", "西周青铜器", "唐代壁画"],a:3,exp:'周原遗址为周人发祥地，以宫室、甲骨文(可辨认约275字)、青铜器著称。'},
	{id:1206,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，北京房山琉璃河遗址是哪个诸侯国的都城？',o:["齐国", "燕国", "鲁国", "晋国"],a:1,exp:'琉璃河遗址是西周燕国早期都城遗址。'},
	{id:1207,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，安徽淮南武王墩一号墓的墓主身份是？',o:["楚国贵族", "越国国君", "齐国大夫", "吴国将领"],a:0,exp:'武王墩一号墓为战国晚期楚国贵族大型墓葬。'},
	{id:1208,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，云南晋宁河泊所遗址的主要发现有？',o:["汉代封泥和简牍", "商代青铜器", "唐代佛经", "元代瓷器"],a:0,exp:'河泊所遗址出土西汉益州郡封泥和简牍，对汉代西南边疆治理研究意义重大。'},
	{id:1209,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，新疆喀什莫尔寺遗址属于什么类型？',o:["汉代烽燧", "唐代驿站", "佛教寺院遗址", "元代城墙"],a:2,exp:'莫尔寺遗址是新疆早期佛教寺院遗址，反映佛教丝绸之路传播。'},
	{id:1210,cat:'📝 十大考古发现',q:'2024年度全国十大考古新发现中，西藏康马玛不错遗址主要填补了什么空白？',o:["西域都护府", "史前高原腹地考古", "宋元时期", "明代边疆"],a:1,exp:'玛不错遗址填补了青藏高原腹地史前考古空白。'},
	{id:1211,cat:'📝 十大考古发现',q:'吉林长白山地区发现的旧石器时代遗址代表性工具是？',o:["玉器", "黑曜石石器", "青铜器", "铁器"],a:1,exp:'长白山遗址出土大量黑曜石打制石器，填补了东亚旧石器时代考古空白。'},
	{id:1212,cat:'📝 十大考古发现',q:'河南裴李岗遗址发现的新石器时代重要遗迹是？',o:["稻田", "红曲霉酿酒遗迹", "宫殿建筑", "青铜冶铸"],a:1,exp:'裴李岗发现了中原最早的酒——红曲霉酿酒遗迹，黍粟稻并存。'},
	{id:1213,cat:'📝 十大考古发现',q:'河北郑家沟遗址属于什么文化？',o:["仰韶文化", "龙山文化", "红山文化", "良渚文化"],a:2,exp:'河北郑家沟属红山文化，发掘高级墓葬、成熟玉礼器（玉龙、女神像等）。中华第一龙=红山文化碧玉C形龙/C形玉龙，1971年出土于内蒙古赤峰市翁牛特旗三星塔拉，现藏中国国家博物馆。'},
	{id:1214,cat:'📝 十大考古发现',q:'甘肃庆阳南佐遗址的主要建筑特色是？',o:["窑洞", "宫殿式建筑与中轴线", "干栏式建筑", "石砌城堡"],a:1,exp:'南佐遗址为仰韶文化晚期，发现年代最早、最清晰的都邑聚落中轴线。'},
	{id:1215,cat:'📝 十大考古发现',q:'山西昔阳钟村遗址属于什么时期？',o:["仰韶文化", "夏晚期", "商代早期", "秦汉时期"],a:1,exp:'钟村遗址为夏晚期等级最高贵族墓葬群，出土绿松石等奢侈品。'},
	{id:1216,cat:'📝 十大考古发现',q:'青岛琅琊台遗址与哪位历史人物相关？',o:["汉武帝", "秦始皇", "李世民", "乾隆帝"],a:1,exp:'琅琊台为秦始皇东巡核心节点，发现最完整秦代东巡行宫遗址。'},
	{id:1217,cat:'📝 十大考古发现',q:'绍兴越国都城和汉六朝会稽郡遗址的建筑特征是？',o:["单一中原风格", "单一南方风格", "干栏式+台基式并存", "全部石构建筑"],a:2,exp:'南方干栏式与中原台基式建筑并存，反映南北文化交融。'},
	{id:1218,cat:'📝 十大考古发现',q:'宁夏贺兰苏峪口瓷窑遗址的窑系属性是？',o:["宋代官窑", "西夏官窑体系", "唐代越窑", "元代枢府窑"],a:1,exp:'苏峪口瓷窑证实了西夏官窑体系，出土白瓷、青瓷、黑瓷等。'},
	{id:1219,cat:'📝 十大考古发现',q:'河南郑州商城遗址被确认为商代的哪座都城？',o:["殷墟", "毫都", "朝歌", "洛邑"],a:1,exp:'郑州商城被确认为商代早期都城——毫都，商汤所居之都。'},
	{id:1220,cat:'📝 十大考古发现',q:'陕西富平长春遗址的规模特点是？',o:["西周墓地中墓葬数量最多", "汉代最大墓葬群", "唐代最大窑址", "秦代最大宫殿"],a:0,exp:'长春遗址为迄今为止单个西周墓地中墓葬数量最多，规模仅次于曲村。'},
	{id:1244,cat:'📝 模考题库',q:"2024年“国际博物馆日”的中国主会场活动在哪个城市举办？",o:["西安", "沈阳", "福州", "成都"],a:0,exp:"2024-博物馆致力于教育和研究-陕西西安，陕西历史博物馆秦汉馆 2025-快速变化社会中的博物馆未来 -北京，北京大运河博物馆 2026-联结世界的桥梁-内蒙古呼和浩特，内蒙古博物院"},
	{id:1245,cat:'📝 模考题库',q:"全国重点文物保护单位中属于国家所有的纪念建筑物或者古建筑，如必须作其他用途，应当如何报批？",o:["由县级政府批准", "由省级文物行政部门批准", "由省、自治区、直辖市人民政府报国务院批准", "由使用单位自行决定"],a:2,exp:"由省、自治区、直辖市人民政府报国务院批准”。"},
	{id:1246,cat:'📝 模考题库',q:"上海博物馆藏元代景德镇窑青花缠枝牡丹纹罐的主题纹饰是？",o:["龙纹", "凤纹", "鬼谷子下山", "缠枝牡丹"],a:3,exp:"题干已经限定为“青花缠枝牡丹纹罐”，主题纹饰即缠枝牡丹。"},
	{id:1247,cat:'📝 模考题库',q:"铁质文物保存的相对湿度通常要求低于？",o:["75%", "65%", "45%", "35%"],a:2,exp:"铁质文物易锈蚀，一般要求相对湿度控制在45%以下。"},
	{id:1248,cat:'📝 模考题库',q:"良渚古城遗址列入《世界遗产名录》是哪一年？",o:["2015年", "2018年", "2019年", "2021年"],a:2,exp:"良渚古城遗址于2019年列入《世界遗产名录》。"},
	{id:1249,cat:'📝 模考题库',q:"下列哪项最不符合博物馆“新文创”运营的核心理念？",o:["IP授权", "粉丝经济", "机械复制文物原貌、缺乏转化", "跨界融合"],a:2,exp:"机械复制、缺乏转化"},
	{id:1250,cat:'📝 模考题库',q:"上海博物馆东馆“考古·上海”展中，“古港”部分重点依托哪个遗址成果？",o:["广富林遗址", "崧泽遗址", "青龙镇遗址", "福泉山遗址"],a:2,exp:"青龙镇遗址是唐宋时期上海重要港口遗址，为上海城市史和海上丝绸之路研究提供重要材料。 上博“考古·上海”2024年开展，三板块：1.文明之光-史前古国（综合上海多个地方的新石器时期遗址：崧泽、福泉山、广福林）2.江海通津-唐宋古港3.海上繁华-明清古城（依托上海中心城区的考古成果重现东南名邑，展览线索：三个名门望族：陆氏（陆家嘴）、潘氏（豫园）、顾氏（筑城御寇）"},
	{id:1251,cat:'📝 模考题库',q:"中国古代书画鉴定组“七人小组”的成员不包括？",o:["谢稚柳", "启功", "徐邦达", "张大千"],a:3,exp:"官方书画鉴定“七人小组”（1983-1991）：谢稚柳、启功、徐邦达、杨仁恺、刘九庵、傅熹年、谢辰生"},
	{id:1252,cat:'📝 模考题库',q:"我国第一部专门规范博物馆管理与发展的行政法规是？",o:["《文物保护法实施细则》", "《公共文化服务保障法》", "《博物馆条例》", "《非物质文化遗产法》"],a:2,exp:"《博物馆条例》是专门规范博物馆管理与发展的行政法规。"},
	{id:1253,cat:'📝 模考题库',q:"《博物馆条例》规定，博物馆取得登记证书后多久内应向公众开放？",o:["3个月", "6个月", "1年", "2年"],a:1,exp:"《博物馆条例》规定，博物馆应自取得登记证书之日起6个月内向公众开放。"},
	{id:1254,cat:'📝 模考题库',q:"西周青铜器遂公盨铭文最重要的是记载了什么传说？",o:["大禹治水", "武王伐纣", "周公摄政", "烽火戏诸侯"],a:0,exp:"遂公盨铭文涉及“大禹治水”，藏于北京保利艺术博物馆。铭文六次强调“德治” 铭文被称作两周金文之最"},
	{id:1255,cat:'📝 模考题库',q:"“糯米胎”通常形容哪个窑口瓷器的胎质？",o:["景德镇窑", "德化窑", "龙泉窑", "定窑"],a:1,exp:"德化窑白瓷胎质细腻温润，常有“糯米胎”之称。"},
	{id:1256,cat:'📝 模考题库',q:"博物馆观众研究中，用于记录观众行走路径和停留时间的方法是？",o:["问卷调查法", "跟踪观察法", "深度访谈法", "焦点小组法"],a:1,exp:"跟踪观察法可记录观众动线、停留时间、观看行为。"},
	{id:1257,cat:'📝 模考题库',q:"下列哪项不是导致青铜器产生粉状锈的主要原因？",o:["氯离子侵蚀", "潮湿环境", "酸性气体污染", "长期真空保存"],a:3,exp:"粉状锈与氯离子、水分、污染气体有关，真空保存不构成主要诱因。"},
	{id:1258,cat:'📝 模考题库',q:"生态博物馆概念最早起源于哪个国家？",o:["英国", "法国", "美国", "瑞典"],a:1,exp:"1971，生态博物馆概念起源于法国新博物馆学语境。由乔治·亨利·里维埃、雨果·戴瓦兰提出——强调人+自然+文化紧密共生"},
	{id:1259,cat:'📝 模考题库',q:"蝴蝶装主要流行于哪个朝代？",o:["唐代", "宋代", "明代", "清代"],a:1,exp:"蝴蝶装是宋代书籍装帧的重要形式。明中页—线装"},
	{id:1260,cat:'📝 模考题库',q:"博物馆照明中，紫外线含量一般要求低于多少微瓦/流明？",o:["10", "20", "50", "75"],a:3,exp:"常见博物馆照明控制口径为紫外线低于75μW/lm。"},
	{id:1261,cat:'📝 模考题库',q:"元代卵白釉瓷因常见“枢府”款，又常称为？",o:["枢府瓷", "祭蓝釉", "甜白釉", "霁红釉"],a:0,exp:"元代卵白釉瓷常见“枢府”字样，故称枢府瓷。"},
	{id:1262,cat:'📝 模考题库',q:"下列哪项不属于博物馆社会教育的终身学习体系？",o:["亲子手工坊", "专家学术讲座", "馆校合作课程", "文物拍卖会"],a:3,exp:"文物拍卖会属于商业活动，不属于博物馆社会教育。"},
	{id:1263,cat:'📝 模考题库',q:"博物馆库房空气质量监测通常不重点关注的是？",o:["甲醛", "TVOC", "臭氧", "氧气浓度"],a:3,exp:"甲醛、TVOC、臭氧等有害气体是重点监测对象，氧气浓度一般不是常规重点。"},
	{id:1264,cat:'📝 模考题库',q:"大英博物馆藏《亚尼的死者之书》属于哪个古代文明？",o:["古希腊", "古罗马", "古埃及", "两河流域"],a:2,exp:"《死者之书》属于古埃及丧葬文献。"},
	{id:1265,cat:'📝 模考题库',q:"上海博物馆拥有的国家级非遗代表性项目包括哪一项？",o:["古书画装裱修复技艺", "青铜器修复与复制技艺", "古籍修复技艺", "钟表修复技艺"],a:1,exp:"上博国家级非遗项目包括1.青铜器修复与复制技艺、古陶瓷修复技艺；2.古书画装裱修复和古籍修复为市级项目。"},
	{id:1266,cat:'📝 模考题库',q:"下列哪项不是策展“故事线”构建的关键要素？",o:["学术支撑", "叙事逻辑", "观众兴趣点", "预算最大化"],a:3,exp:"预算是展览约束条件，不是故事线本身的构建要素。"},
	{id:1267,cat:'📝 模考题库',q:"商鞅方升铭文“爰积十六寸五分寸壹为升”体现的计量特点是？",o:["以度审容", "以量测重", "以权衡长", "以数计地"],a:0,exp:"商鞅方升以长度单位推算容量，体现“以度审容”（用标准的长度单位测定容量大小）。上博说明其为商鞅统一度量衡所规定的标准量值“一升”。"},
	{id:1268,cat:'📝 模考题库',q:"汇丰银行铜狮铸造于哪一年？",o:["1865年", "1923年", "1949年", "1997年"],a:1,exp:"这个题属于上海城市史细节题，不算最高频。两只，一只叫Stephen（香港汇丰高管（吐，招财），一只叫 Stitt（上海分行高管（纳，守财）的名字）"},
	{id:1269,cat:'📝 模考题库',q:"下列哪项属于博物馆的无形资源？",o:["馆藏青铜器", "馆舍建筑", "品牌声誉", "安防设备"],a:2,exp:"品牌声誉不具有实体形态，属于无形资源。"},
	{id:1270,cat:'📝 模考题库',q:"唐寅《秋风纨扇图》表达的心境较接近？",o:["对爱情的渴望", "怀才不遇的悲凉", "田园生活向往", "神仙境界追求"],a:1,exp:"纨扇题材常借秋扇被弃寄托失意和怀才不遇之感。"},
	{id:1271,cat:'📝 模考题库',q:"将散落在一定区域内的文物线索系统调查、登记的工作称为？",o:["文物普查", "文物征集", "文物勘探", "文物执法"],a:0,exp:"文物普查重在摸清文物资源家底。"},
	{id:1272,cat:'📝 模考题库',q:"战国错金银鸟篆文壶中的鸟篆文属于哪种文字的美术化写法？",o:["甲骨文", "金文", "小篆", "隶书"],a:1,exp:"鸟篆（鸟虫书/鸟虫篆）-春秋战国时期流行于吴、越、楚等地区的一种美术化篆书，多见于青铜兵器、礼器铭文。其笔画常作鸟形、虫形装饰，兼具文字识读与装饰审美功能。 代表器物-越王勾践剑，剑身有8字鸟虫书铭文“越王鸠浅，自作用剑”，现藏湖北省博物馆，常被称为“天下第一剑”。 p.s中华第一剑——玉柄铁剑/西周晚期出土于河南三门峡虢国墓地（河南博物院）早期人工冶铁实物，改写中国冶铁史"},
	{id:1273,cat:'📝 模考题库',q:"讲解员语速属于影响观众体验的哪类因素？",o:["硬环境", "软服务", "建筑结构", "展柜设备"],a:1,exp:"讲解员语速属于服务因素，不属于硬件环境。"},
	{id:1274,cat:'📝 模考题库',q:"文物修复档案必须重点记录什么？",o:["修复人员午餐", "材料、工艺与步骤", "当天新闻", "观众评价"],a:1,exp:"修复档案核心是记录材料、工艺、步骤和前后状态。"},
	{id:1275,cat:'📝 模考题库',q:"数字人文在博物馆中的应用主要指？",o:["用电脑画画", "利用数字技术进行文史研究与阐释", "开发电子游戏", "制作普通海报"],a:1,exp:"数字人文强调数字技术与人文学术研究结合。"},
	{id:1276,cat:'📝 模考题库',q:"西夏文佛经《吉祥遍至口和本续》出土于哪里？",o:["敦煌莫高窟", "宁夏贺兰县宏佛塔", "宁夏贺兰县拜寺沟方塔", "三星堆"],a:2,exp:"1.藏传佛教孤本2.世界上最早木活字印本3.西夏是和宋同时期并立王朝"},
	{id:1277,cat:'📝 模考题库',q:"建窑兔毫盏主要适应宋代哪种风尚？",o:["斗茶", "饮酒", "插花", "焚香"],a:0,exp:"建窑黑釉盏适于观察茶沫，服务于宋代斗茶风尚。"},
	{id:1278,cat:'📝 模考题库',q:"秘色瓷主要产自哪个窑口？",o:["邢窑", "越窑", "长沙窑", "巩县窑"],a:1,exp:"秘色瓷是越窑青瓷中的精品。"},
	{id:1279,cat:'📝 模考题库',q:"突出重点展品常采用哪种照明方式？",o:["一般照明", "重点照明", "应急照明", "安全照明"],a:1,exp:"重点照明用于突出核心展品、引导观众视线。"},
	{id:1280,cat:'📝 模考题库',q:"掐丝珐琅中的“掐丝”通常指用什么材料掐成纹饰？",o:["铜丝", "银丝", "金丝", "铁丝"],a:0,exp:"掐丝珐琅多以细铜丝掐成纹样，再填珐琅釉料。"},
	{id:1281,cat:'📝 模考题库',q:"无障碍设计主要服务于哪类人群？",o:["老年人", "残疾人", "儿童", "所有有便利需求的人群"],a:3,exp:"无障碍设计服务残障人士、老人、儿童、孕妇、推婴儿车者等所有有便利需求者。"},
	{id:1282,cat:'📝 模考题库',q:"OCR技术主要用于解决什么问题？",o:["三维建模", "文字识别", "语音导览", "网络传输"],a:1,exp:"OCR即光学字符识别。"},
	{id:1283,cat:'📝 模考题库',q:"上博馆藏楚简《孔子诗论》主要记载了孔子对哪部经典的评论？",o:["《周易》", "《尚书》", "《诗经》", "《礼记》"],a:2,exp:"《孔子诗论》主要涉及对《诗经》的评论。"},
	{id:1284,cat:'📝 模考题库',q:"上海博物馆国家级非遗代表性项目包括？",o:["古书画装裱修复技艺", "青铜器修复与复制技艺", "古陶瓷修复技艺", "古籍修复技艺", "钟表修复技艺"],a:[1, 2],exp:"上博国家级非遗项目（2个）为青铜器修复与复制技艺、古陶瓷修复技艺。 上海市级非遗项目：（6个）古书画装裱修复技艺、古代家具修复技艺、古籍修复技艺、珂罗版书画复制技艺 上海博物馆共有 8 个非遗代表性项目",multi:true},
	{id:1285,cat:'📝 模考题库',q:"下列属于博物馆陈列辅助展品的有？",o:["文物原件", "复原场景", "多媒体触摸屏", "图表", "沙盘模型"],a:[1, 2, 3, 4],exp:"文物原件是核心展品，其余可作为辅助展品帮助理解。",multi:true},
	{id:1286,cat:'📝 模考题库',q:"文物出境展览通常需提交的材料包括？",o:["展览大纲", "展品目录及估价", "保险方案", "运输方案", "合作协议草案"],a:[0, 1, 2, 3, 4],exp:"出境展览涉及展品、保险、运输、协议、审批等完整链条。",multi:true},
	{id:1287,cat:'📝 模考题库',q:"博物馆教育活动设计原则包括？",o:["针对性", "趣味性", "互动性", "知识性", "公益性"],a:[0, 1, 2, 3, 4],exp:"高质量社教活动通常兼顾分众、趣味、互动、知识与公益。",multi:true},
	{id:1288,cat:'📝 模考题库',q:"上博馆藏良渚文化玉器中常见器型有？",o:["玉琮", "玉璧", "玉钺", "玉冠状饰", "玉龙"],a:[0, 1, 2, 3],exp:"玉龙是北方红山文化典型器，良渚玉器以琮、璧、钺、冠状饰等为代表。",multi:true},
	{id:1289,cat:'📝 模考题库',q:"博物馆基本陈列一旦设立，原则上应保持相对稳定，不宜频繁更换。",o:["正确", "错误"],a:0,exp:"基本陈列体现博物馆性质和定位，应保持稳定并适时优化。"},
	{id:1290,cat:'📝 模考题库',q:"上海博物馆的所有藏品都可以商业租赁，以获取运营资金。",o:["正确", "错误"],a:1,exp:"国有文物收藏单位馆藏文物不得随意出租、出售或赠与。"},
	{id:1291,cat:'📝 模考题库',q:"预防性保护的核心是控制文物保存环境，而非只修复已经损坏的部分。",o:["正确", "错误"],a:0,exp:"预防性保护强调通过环境控制延缓文物劣化。"},
	{id:1292,cat:'📝 模考题库',q:"博物馆社会教育工作等同于讲解服务。",o:["正确", "错误"],a:1,exp:"讲解只是社教的一种形式，社教还包括课程、讲座、研学、活动等。"},
	{id:1293,cat:'📝 模考题库',q:"博物馆文创产品开发应坚持社会效益优先，兼顾经济效益。",o:["正确", "错误"],a:0,exp:"博物馆具有公益属性，文创开发不能只追求商业利润。"},
	{id:1294,cat:'📝 模考题库',q:"ICOM 2022年博物馆定义中，博物馆的性质不包括哪一项？",o:["非营利", "永久性机构", "面向公众开放", "以营利为唯一目标"],a:3,exp:"ICOM 2022年定义强调博物馆是非营利、永久性、服务社会的机构。"},
	{id:1295,cat:'📝 模考题库',q:"标志中国近代博物馆诞生的事件是？",o:["1905年张謇创办南通博物苑", "1912年国立历史博物馆筹备处成立", "1925年故宫博物院成立", "1933年中央博物院筹备处成立"],a:0,exp:"南通博物苑通常被视为中国人自办近代博物馆的开端。仍存在，而且名称是南通博物苑（江苏省南通市濠南路19号）"},
	{id:1296,cat:'📝 模考题库',q:"中国第一家由国家举办的博物馆是？",o:["南通博物苑", "国立历史博物馆", "故宫博物院", "中央博物院"],a:1,exp:"国立历史博物馆筹备处成立于1912年，是国家举办博物馆的重要开端。"},
	{id:1297,cat:'📝 模考题库',q:"《博物馆条例》规定，博物馆取得登记证书后多久内应向公众开放？",o:["3个月", "6个月", "1年", "2年"],a:1,exp:"《博物馆条例》规定，博物馆应自取得登记证书之日起6个月内向公众开放。"},
	{id:1298,cat:'📝 模考题库',q:"国际博物馆日的日期是？",o:["5月18日", "4月23日", "6月10日", "9月27日"],a:0,exp:"国际博物馆日为每年5月18日。"},
	{id:1299,cat:'📝 模考题库',q:"2024年国际博物馆日主题“博物馆致力于教育和研究”对应的英文原主题是？",o:["Museums for Education and Research", "Museums, Education and Research", "Museums, Sustainability and Well-being", "The Future of Museums in a Changing World"],a:0,exp:"2024年国际博物馆日主题为“Museums for Education and Research”。"},
	{id:1300,cat:'📝 模考题库',q:"《中国文物、博物馆工作者职业道德准则》最早颁布于哪一年？",o:["1997", "2001", "2012", "2020"],a:0,exp:"该准则1997年颁布，2001年、2012年曾修订；若题目问“现行修订版”，则应答2012年。"},
	{id:1301,cat:'📝 模考题库',q:"世界上最早的公共博物馆一般认为是？",o:["牛津阿什莫林博物馆", "卢浮宫", "大英博物馆", "梵蒂冈博物馆"],a:0,exp:"阿什莫林博物馆1683年开放，常被称为世界最早公共博物馆。"},
	{id:1302,cat:'📝 模考题库',q:"“以物为中心”向“以人为中心”转变，是哪一阶段博物馆理念的典型表述？",o:["传统皇家收藏", "新博物馆学运动", "文艺复兴收藏", "自然史博物馆阶段"],a:1,exp:"新博物馆学强调社区、公众参与和社会服务。"},
	{id:1303,cat:'📝 模考题库',q:"上海博物馆人民广场馆舍全面建成开放于哪一年？",o:["1952", "1959", "1996", "2000"],a:2,exp:"上海博物馆人民广场馆于1996年开放。"},
	{id:1304,cat:'📝 模考题库',q:"上海博物馆东馆自何时起试开放？",o:["2023年10月", "2024年2月", "2024年9月", "2025年1月"],a:1,exp:"上博东馆于2024年2月2日起试开放。2024年6月26日扩大开放至约80%；2024年12月正式全面开放。"},
	{id:1305,cat:'📝 模考题库',q:"上海博物馆东馆的主要定位是？",o:["海派文化专题馆", "中国古代艺术博物馆/中国古代艺术通史陈列馆", "近现代艺术馆", "自然科学博物馆"],a:1,exp:"上博东馆以中国古代艺术博物馆为主要定位，构建中国古代艺术通史陈列。"},
	{id:1306,cat:'📝 模考题库',q:"上海博物馆人民广场馆建筑造型理念通常概括为？",o:["江南园林", "天圆地方", "海派石库门", "西式古典主义"],a:1,exp:"人民广场馆以“天圆地方”象征中国传统宇宙观。"},
	{id:1307,cat:'📝 模考题库',q:"上海博物馆馆藏大克鼎所属时代较稳妥的表述是？",o:["商代晚期", "西周孝王时期/西周时期", "春秋晚期", "战国早期"],a:1,exp:"上博官网将大克鼎标注为西周时期，具体可记为西周孝王时期。"},
	{id:1308,cat:'📝 模考题库',q:"上博馆藏晋侯稣钟出土于哪一遗址？",o:["殷墟", "三星堆", "山西曲沃晋侯墓地", "曾侯乙墓"],a:2,exp:"晋侯稣钟出土于山西曲沃北赵晋侯墓地。"},
	{id:1309,cat:'📝 模考题库',q:"上博馆藏唐代孙位《高逸图》现存描绘“竹林七贤”中的几位？",o:["四位", "五位", "六位", "七位"],a:0,exp:"《高逸图》残卷现存山涛、王戎、刘伶、阮籍四人。"},
	{id:1310,cat:'📝 模考题库',q:"上博馆藏《淳化阁帖》最善本属于？",o:["宋拓", "明拓", "清拓", "唐摹"],a:0,exp:"《淳化阁帖》最善本为宋拓本，不是原始刻石。"},
	{id:1311,cat:'📝 模考题库',q:"上博馆藏子仲姜盘是哪一时期的青铜器？",o:["商晚期", "西周早期", "春秋早期", "战国"],a:2,exp:"子仲姜盘为春秋早期青铜器，以盘内立体动物装饰著称。"},
	{id:1312,cat:'📝 模考题库',q:"上博馆藏商鞅方升是哪一领域的重要标准器？",o:["容量", "长度", "重量", "货币"],a:0,exp:"方升是量器，体现秦国统一度量衡中的容量标准。"},
	{id:1313,cat:'📝 模考题库',q:"上海博物馆馆藏春秋晚期青铜牺尊出土于哪里？",o:["山东临淄", "河南安阳", "陕西宝鸡", "山西浑源县李峪村"],a:3,exp:"上博牺尊出土于山西省大同市浑源县李峪村，不是山东临淄。"},
	{id:1314,cat:'📝 模考题库',q:"商代晚期青铜器纹饰的主流是？",o:["云雷纹", "饕餮纹/兽面纹", "蟠螭纹", "莲鹤纹"],a:1,exp:"商代晚期青铜器以兽面纹为典型主纹。"},
	{id:1315,cat:'📝 模考题库',q:"唐代“南青北白”中，“北白”主要指哪个窑口？",o:["越窑", "邢窑", "汝窑", "官窑"],a:1,exp:"唐代“南青北白”指越窑青瓷、邢窑白瓷。"},
	{id:1316,cat:'📝 模考题库',q:"元青花常用进口钴料“苏麻离青”主要来自？",o:["波斯/伊朗地区", "云南", "埃及", "日本"],a:0,exp:"苏麻离青通常认为是西亚波斯地区输入钴料。"},
	{id:1317,cat:'📝 模考题库',q:"宋代五大名窑中，以“金丝铁线”开片为典型特征的是？",o:["汝窑", "官窑", "哥窑", "钧窑"],a:2,exp:"哥窑以“金丝铁线”开片著称。"},
	{id:1318,cat:'📝 模考题库',q:"书法史上“颠张醉素”指的是？",o:["张芝、索靖", "张旭、怀素", "张即之、赵孟頫", "颜真卿、柳公权"],a:1,exp:"“颠张醉素”指张旭与怀素的草书风格。"},
	{id:1319,cat:'📝 模考题库',q:"下列哪一件不是“天下三大行书”之一？",o:["《兰亭序》", "《祭侄文稿》", "《黄州寒食诗帖》", "《九成宫醴泉铭》"],a:3,exp:"《九成宫醴泉铭》是欧阳询楷书名作，不属三大行书。"},
	{id:1320,cat:'📝 模考题库',q:"明代“吴门四家”指沈周、文徵明、唐寅和谁？",o:["仇英", "徐渭", "董其昌", "陈洪绶"],a:0,exp:"吴门四家为沈周、文徵明、唐寅、仇英。"},
	{id:1321,cat:'📝 模考题库',q:"“瘦金体”是哪位皇帝创制的书体？",o:["唐太宗", "宋徽宗", "唐玄宗", "乾隆帝"],a:1,exp:"瘦金体为宋徽宗赵佶所创。"},
	{id:1322,cat:'📝 模考题库',q:"良渚玉器中“玉琮”的基本形制是？",o:["外方内圆、中有穿孔", "外圆内方", "C形龙", "璧形圆片"],a:0,exp:"良渚玉琮典型形制为外方内圆、中有穿孔。"},
	{id:1323,cat:'📝 模考题库',q:"下列哪项不属于“文房四宝”？",o:["笔", "墨", "纸", "砚", "印"],a:4,exp:"文房四宝为笔、墨、纸、砚。"},
	{id:1324,cat:'📝 模考题库',q:"敦煌莫高窟开凿始于哪个时期？",o:["西汉", "前秦", "北魏", "隋"],a:1,exp:"莫高窟通常认为始凿于前秦建元二年。前秦建元二年（366年），僧人乐僔行至敦煌鸣沙山东麓，见三危山金光万道，遂开凿第一个洞窟，后逐渐形成莫高窟。莫高窟俗称千佛洞。"},
	{id:1325,cat:'📝 模考题库',q:"马王堆汉墓出土于？",o:["西安", "洛阳", "长沙", "广州"],a:2,exp:"马王堆汉墓位于湖南长沙。"},
	{id:1326,cat:'📝 模考题库',q:"曾侯乙编钟出土于哪个省？",o:["湖南", "湖北", "河南", "陕西"],a:1,exp:"曾侯乙编钟1978年出土于湖北随州。"},
	{id:1327,cat:'📝 模考题库',q:"下列青铜器中铭文字数最多的是？",o:["毛公鼎", "大克鼎", "散氏盘", "虢季子白盘"],a:0,exp:"毛公鼎铭文近500字，是现存铭文字数最多的青铜器之一。虢季子白盘——国博，西周晚期青铜器，铭文记战功与受赏。 散氏盘铭文——台北故宫博物院，是研究西周土地制度、田界契约的重要资料。”"},
	{id:1328,cat:'📝 模考题库',q:"宣德炉是哪一朝代宫廷用铜器代表？",o:["宋", "元", "明", "清"],a:2,exp:"宣德炉为明宣德年间宫廷铜器代表。"},
	{id:1329,cat:'📝 模考题库',q:"《中华人民共和国文物保护法》最新一次修订通过于哪一年？",o:["2013", "2015", "2017", "2024"],a:3,exp:"新修订《文物保护法》于2024年11月8日通过，自2025年3月1日起施行。"},
	{id:1330,cat:'📝 模考题库',q:"可移动文物中，珍贵文物分为？",o:["一级、二级", "一级、二级、三级", "甲级、乙级", "国宝级、省级、市级"],a:1,exp:"珍贵文物分为一级、二级、三级。"},
	{id:1331,cat:'📝 模考题库',q:"全国重点文物保护单位由哪一级公布？",o:["县级政府", "市级政府", "省级政府", "国务院"],a:3,exp:"全国重点文物保护单位由国务院核定公布。"},
	{id:1332,cat:'📝 模考题库',q:"2024年修订《文物保护法》中，擅自迁移、拆除不可移动文物，情节严重的，单位最高可处多少罚款？",o:["50万元", "100万元", "500万元", "1000万元"],a:3,exp:"新法规定，情节严重的单位可处500万元以上1000万元以下罚款。"},
	{id:1333,cat:'📝 模考题库',q:"下列属于非物质文化遗产的是？",o:["青铜器", "昆曲", "故宫", "兵马俑"],a:1,exp:"昆曲属于非物质文化遗产，其他为物质文化遗产或遗址类。"},
	{id:1334,cat:'📝 模考题库',q:"文物销售单位应当取得哪一级文物行政部门颁发的许可证？",o:["县级", "市级", "省级", "国务院文物行政部门"],a:2,exp:"文物销售单位应取得省级文物行政部门颁发的文物销售许可证。"},
	{id:1335,cat:'📝 模考题库',q:"根据《文物保护法》，考古发掘实行？",o:["备案制", "许可制", "自由发掘", "登记制"],a:1,exp:"考古发掘必须依法报批，实行许可管理。"},
	{id:1336,cat:'📝 模考题库',q:"上海地区崧泽文化距今约？",o:["3000年", "5000—6000年", "7000年", "9000年"],a:1,exp:"崧泽文化一般距今约5800—4900年。"},
	{id:1337,cat:'📝 模考题库',q:"上海广富林文化大致属于？",o:["新石器早期", "新石器晚期至夏商之际", "春秋战国", "汉代"],a:1,exp:"广富林文化约距今4000年左右，属新石器晚期至夏商之际。"},
	{id:1338,cat:'📝 模考题库',q:"上海青浦福泉山遗址主要属于哪一文化类型？",o:["良渚文化", "马家浜文化", "红山文化", "仰韶文化"],a:0,exp:"福泉山遗址以良渚文化高台墓地著称。"},
	{id:1339,cat:'📝 模考题库',q:"中国共产党第一次全国代表大会会址位于上海哪里？",o:["兴业路76号", "思南路107号", "愚园路81号", "山阴路132号"],a:0,exp:"中共一大会址位于上海兴业路76号。"},
	{id:1340,cat:'📝 模考题库',q:"上海1961年第一批全国重点文物保护单位中包括？",o:["豫园", "中共一大会址", "龙华寺", "玉佛寺"],a:1,exp:"中共一大会址列入第一批全国重点文物保护单位。 1961第一批：中共一大会址。1982第二批：豫园。 2006第六批：龙华塔，不是龙华寺。 玉佛寺不是全国重点文物保护单位。 （三大家族：陆深、潘恩、顾从礼）"},
	{id:1341,cat:'📝 模考题库',q:"第五批全国博物馆定级评估后，上海国家一级博物馆数量较稳妥的记忆是？",o:["5家", "7家", "12家", "20家"],a:2,exp:"第五批定级后，上海新增5家国家一级博物馆，加上原有7家，较稳妥记忆为12家。"},
	{id:1342,cat:'📝 模考题库',q:"上海博物馆东馆所在行政区是？",o:["黄浦区", "浦东新区", "徐汇区", "静安区"],a:1,exp:"上博东馆位于浦东新区世纪大道1952号。"},
	{id:1343,cat:'📝 模考题库',q:"上海元代水闸遗址博物馆位于？",o:["普陀区", "黄浦区", "杨浦区", "虹口区"],a:0,exp:"元代水闸遗址博物馆位于普陀区志丹路一带。"},
	{id:1344,cat:'📝 模考题库',q:"上海市域范围内自然地面最高点是？",o:["东佘山", "西佘山", "大金山岛", "天马山"],a:2,exp:"如果题干问“上海市域范围内”且没有排除海岛，应选大金山岛。上海统计资料和金山区资料均记载大金山为上海境内最高点，海拔约103米。"},
	{id:1345,cat:'📝 模考题库',q:"关于“上海最高点”的表述，最严谨的是？",o:["含海岛时为大金山岛；若限定陆域山体，应看题干口径", "一定是东方明珠", "一定是西佘山", "一定是天马山"],a:0,exp:"这类题最容易出争议。含海岛时，大金山岛是市域自然最高点；若题干限定“陆域山体”或“不含海岛”，佘山、天马山等口径在资料中容易出现差异，必须看题干限定。地理国情普查报道明确大金山岛最高，其次为佘山和天马山，均接近100米。"},
	{id:1346,cat:'📝 模考题库',q:"上海最大的湖泊是？",o:["淀山湖", "太湖", "西湖", "南湖"],a:0,exp:"上海统计局资料明确：淀山湖是上海最大的湖泊。"},
	{id:1347,cat:'📝 模考题库',q:"关于上海“母亲河”的说法，最严谨的是？",o:["只能是黄浦江", "只能是苏州河", "黄浦江和苏州河在不同语境中都可称为上海母亲河", "应为长江"],a:2,exp:"“母亲河”属于文化表述，不是严格行政地理概念。上海官方宣传中常以“一江一河”即黄浦江、苏州河共同作为城市核心水系。"},
	{id:1348,cat:'📝 模考题库',q:"上海河网大多属于哪一水系？",o:["黄浦江水系", "珠江水系", "长江水系", "辽河水系"],a:0,exp:"上海统计局资料显示，上海河网大多属黄浦江水系。"},
	{id:1349,cat:'📝 模考题库',q:"上海境内三个主要有居民岛屿是？",o:["崇明岛、长兴岛、横沙岛", "大金山岛、小金山岛、浮山岛", "崇明岛、九段沙、佘山岛", "复兴岛、泖岛、太阳岛"],a:0,exp:"上海统计资料列出上海境内辖有崇明、长兴、横沙三个岛屿，其中崇明岛是中国第三大岛。"},
	{id:1350,cat:'📝 模考题库',q:"长江口重要滩涂湿地位于哪里？",o:["崇明岛最东端", "长兴岛西部", "横沙岛南部", "金山三岛海域"],a:0,exp:"崇明东滩位于崇明岛最东端，是长江口重要滩涂湿地。"},
	{id:1351,cat:'📝 模考题库',q:"上海市区内较有代表性的内河岛屿是？",o:["复兴岛", "大金山岛", "崇明岛", "佘山岛"],a:0,exp:"复兴岛位于黄浦江，是上海市区内较有代表性的内河岛屿。"},
	{id:1352,cat:'📝 模考题库',q:"上海的地理位置表述正确的是？",o:["东濒东海，南临杭州湾", "西临渤海，北接钱塘江", "位于珠江三角洲前缘", "南接黄海，北临杭州湾"],a:0,exp:"上海地处长江三角洲前缘，东濒东海，南临杭州湾。"},
	{id:1353,cat:'📝 模考题库',q:"下列关于上海地形地貌的说法，正确的是？",o:["以上海丘陵山地为主", "平均海拔较低，属长江三角洲冲积平原", "全境多高山峡谷", "主要位于云贵高原"],a:1,exp:"上海整体地势低平，属于长江三角洲冲积平原。上海统计局资料也明确上海整体地势为坦荡低平的平原。"},
	{id:1354,cat:'📝 模考题库',q:"博物馆的核心职能通常包括？",o:["收藏", "保护", "研究", "展示", "教育"],a:[0, 1, 2, 3, 4],exp:"现代博物馆通常包括收藏、保护、研究、展示、教育等功能。",multi:true},
	{id:1355,cat:'📝 模考题库',q:"下列属于上海博物馆重要馆藏/镇馆级藏品的有？",o:["大克鼎", "后母戊鼎", "晋侯稣钟", "《高逸图》", "子仲姜盘"],a:[0, 2, 3, 4],exp:"后母戊鼎藏中国国家博物馆，不属于上博。",multi:true},
	{id:1356,cat:'📝 模考题库',q:"上海博物馆东馆中国古代艺术通史陈列中，官方介绍列出的常设展厅包括哪些？",o:["青铜器", "陶瓷", "书画", "玺印", "甲骨"],a:[0, 1, 2, 3],exp:"青铜、陶瓷、书法、绘画、印章、货币、雕塑、玉器；甲骨不是上博核心优势门类。 。",multi:true},
	{id:1357,cat:'📝 模考题库',q:"宋代五大名窑包括？",o:["汝", "官", "哥", "钧", "定", "龙泉"],a:[0, 1, 2, 3, 4],exp:"五大名窑为汝、官、哥、钧、定。",multi:true},
	{id:1358,cat:'📝 模考题库',q:"下列属于新博物馆学理念范畴的有？",o:["社区参与", "以物为中心", "生态博物馆", "非遗活态展示", "公众参与"],a:[0, 2, 3, 4],exp:"新博物馆学强调社区、公众、生态博物馆和活态文化展示；“以物为中心”是传统取向。",multi:true},
	{id:1359,cat:'📝 模考题库',q:"《文物保护法》规定的不可移动文物类型包括？",o:["古文化遗址", "古墓葬", "古建筑", "石窟寺", "壁画", "近代现代重要史迹"],a:[0, 1, 2, 3, 4, 5],exp:"不可移动文物包括古文化遗址、古墓葬、古建筑、石窟寺、石刻、壁画、近现代重要史迹和代表性建筑等。",multi:true},
	{id:1360,cat:'📝 模考题库',q:"上海地区考古学文化序列中，相邻关系正确的有？",o:["马家浜→崧泽", "崧泽→良渚", "良渚→广富林", "广富林→马桥", "马桥→红山"],a:[0, 1, 2, 3],exp:"上海地区常见序列为马家浜（新时期较早时期）—崧泽（6000）—良渚（5300-4300）—广富林（4000）—马桥（夏商时期前后）。福泉山不是“文化”，是良渚文化遗址；崧泽、广富林、马桥既是遗址名，也被用作考古学文化名称。福泉山遗址不是良渚古城遗址。良渚古城遗址在浙江杭州余杭，是2019年列入世界遗产的那个；福泉山是在上海青浦。",multi:true},
	{id:1361,cat:'📝 模考题库',q:"博物馆公共服务中的无障碍可包括？",o:["物理无障碍", "信息无障碍", "认知无障碍", "经济可及性", "只服务残疾人"],a:[0, 1, 2, 3],exp:"无障碍不仅面向残障人士，也涉及老年人、儿童、孕妇、外语观众等多类人群。",multi:true},
	{id:1362,cat:'📝 模考题库',q:"“世界三大博物馆”常见说法包括？",o:["大英博物馆", "卢浮宫", "艾尔米塔什博物馆", "大都会艺术博物馆", "故宫博物院"],a:[0, 1, 3],exp:"通行教材口径多为大英博物馆（伦敦）、卢浮宫（巴黎）、大都会（纽约）",multi:true},
	{id:1363,cat:'📝 模考题库',q:"策展人制度的优势包括？",o:["强化展览叙事", "整合学术研究与公众阐释", "完全消除藏品风险", "推动跨学科合作", "取代藏品保管制度"],a:[0, 1, 3],exp:"策展人制度有利于叙事、研究与跨学科整合，但不能消除风险，也不能取代藏品管理。",multi:true},
	{id:1364,cat:'📝 模考题库',q:"文物工作“十六字方针”包括？",o:["保护为主", "抢救第一", "合理利用", "加强管理", "最小干预"],a:[0, 1, 2, 3],exp:"十六字方针是“保护为主、抢救第一、合理利用、加强管理”；最小干预是文保技术原则。",multi:true},
	{id:1365,cat:'📝 模考题库',q:"上博馆藏书法名迹包括？",o:["怀素《苦笋帖》", "王献之《鸭头丸帖》", "苏轼《祭黄几道文》", "颜真卿《祭侄文稿》", "赵佶《秾芳诗帖》"],a:[0, 1, 2, 4],exp:"《祭侄文稿》藏台北故宫博物院，不在上博；其余为上博重要书法藏品。上博藏书法名迹：晋·王羲之《上虞帖》（唐摹本）、晋·王献之《鸭头丸帖》（唐摹本）、唐·怀素《苦笋帖》、东汉·熹平石经周易残石： 这是中国历史上最早的官方校对石经，字体为成熟的汉隶，方正平直，是“一字石经”的典范、北宋·苏轼《祭黄幾道文卷》（楷书）、北宋·米芾《多景楼诗册》、元·赵孟頫《行书手札册》、明·祝允明《前后赤壁赋卷》、北宋·赵佶《楷书千字文卷》、《秾芳诗帖》",multi:true},
	{id:1366,cat:'📝 模考题库',q:"上海博物馆是中国第一家国家级博物馆。",o:["正确", "错误"],a:1,exp:"中国第一家国家举办博物馆通常指国立历史博物馆，上博成立于1952年。"},
	{id:1367,cat:'📝 模考题库',q:"1905年张謇创办的南通博物苑被认为是中国近代博物馆诞生的重要标志。",o:["正确", "错误"],a:0,exp:"南通博物苑是中国人自办近代博物馆的重要开端。"},
	{id:1368,cat:'📝 模考题库',q:"国际博物馆日定于每年5月18日，由ICOM倡议设立。",o:["正确", "错误"],a:0,exp:"国际博物馆日为每年5月18日。"},
	{id:1369,cat:'📝 模考题库',q:"大克鼎是商代晚期青铜器，现藏中国国家博物馆。",o:["正确", "错误"],a:1,exp:"大克鼎为西周青铜器，现藏上海博物馆。"},
	{id:1370,cat:'📝 模考题库',q:"上海博物馆东馆于2024年2月2日起试开放。",o:["正确", "错误"],a:0,exp:"上博东馆于2024年2月2日起试开放。"},
	{id:1371,cat:'📝 模考题库',q:"晋侯稣钟共16枚，其中14枚藏上海博物馆，2枚藏山西博物院。",o:["正确", "错误"],a:0,exp:"晋侯稣钟共16枚，14枚藏上海博物馆，2枚藏山西博物院。"},
	{id:1372,cat:'📝 模考题库',q:"子仲姜盘为春秋早期青铜器，盘内立体动物装饰可转动是其重要特色。",o:["正确", "错误"],a:0,exp:"子仲姜盘以盘内动物装饰和高超铸造工艺著称。"},
	{id:1373,cat:'📝 模考题库',q:"根据《博物馆条例》，所有国有博物馆必须一律免费开放。",o:["正确", "错误"],a:1,exp:"《博物馆条例》是鼓励和推进免费开放，并非规定所有国有博物馆一律免费。"},
	{id:1374,cat:'📝 模考题库',q:"2026年4月14日，国际博物馆协会（ICOM）发布2026年5·18国际博物馆日主题。2026年恰逢ICOM成立80周年，该主题是：",o:["博物馆致力于教育和研究", "博物馆：联结世界的桥梁（Museums Uniting a Divided World）", "博物馆、可持续性与美好生活", "博物馆的力量"],a:1,exp:"2026年主题为「博物馆：联结世界的桥梁「，强调博物馆在文明对话和连接差异中的桥梁作用。2025—快速变化社会中的博物馆未来"},
	{id:1375,cat:'📝 模考题库',q:"2026年国际博物馆日中国主会场活动举办城市是：",o:["呼和浩特", "西安", "成都", "太原"],a:0,exp:"2026年中国主会场由国家文物局和内蒙古自治区人民政府主办，在呼和浩特举行。"},
	{id:1376,cat:'📝 模考题库',q:"上海博物馆「金字塔之巅：古埃及文明大展「于2025年8月17日收官。下列关于该展的说法，错误的是：",o:["全球博物馆单个收费特展参观人数逾277万人次", "展览总收入逾7.6亿元", "带动城市综合消费超过500亿元", "展期最后一周连续开放168小时"],a:2,exp:"公开报道为「带动城市综合消费超350亿元「，不是500亿元；277万人次、7.6亿元和168小时连续开放均有报道依据。"},
	{id:1377,cat:'📝 模考题库',q:"新修订《中华人民共和国文物保护法》于2025年3月1日起施行。其新增的「保护前置「机制可概括为：",o:["地上「先拆迁、后调查「，地下「先出让、后考古「", "地上「先调查、后建设「，地下「先考古、后出让「", "地上「先评估、后施工「，地下「先勘探、后规划「", "地上「先审批、后建设「，地下「先发掘、后开发「"],a:1,exp:"新法新增地上文物「先调查、后建设「、地下文物「先考古、后出让「的保护前置机制。"},
	{id:1378,cat:'📝 模考题库',q:"下列关于第四次全国文物普查的说法，错误的是：",o:["普查范围是我国境内地上、地下、水下的不可移动文物", "对已认定、登记的不可移动文物进行复查是「四普「重要内容", "工业遗产、村落民居、乡土建筑是第四次全国文物普查首次纳入的范畴", "普查标准时点为2024年4月30日"],a:2,exp:"「工业遗产、村落民居、乡土建筑首次进入文物普查范畴「是第三次全国文物普查的表述；四普范围为不可移动文物，标准时点为2024年4月30日。"},
	{id:1379,cat:'📝 模考题库',q:"习近平文化思想中，「两个结合「指把马克思主义基本原理同（ ）相结合、同（ ）相结合。",o:["中国具体实际；中华优秀传统文化", "中国具体实际；中国革命传统", "中国改革开放实践；中华优秀传统文化的精髓", "中国特色社会主义实践；中华民族精神"],a:0,exp:"「两个结合「即同中国具体实际相结合、同中华优秀传统文化相结合。"},
	{id:1380,cat:'📝 模考题库',q:"2026年是「十四五「规划收官后的开局之年，也是（ ）规划实施的起步之年。",o:["十五五", "十六五", "十一五", "十二五"],a:0,exp:"2026—2030年对应「十五五「时期；原「十四五收官之年「不准确，2025年才是「十四五「收官年。"},
	{id:1381,cat:'📝 模考题库',q:"党的二十大报告指出，中国式现代化的五个特征之一是：",o:["全体人民同步富裕", "物质文明和精神文明相协调", "人与自然对立发展", "以军事扩张实现发展"],a:1,exp:"中国式现代化是人口规模巨大的现代化、全体人民共同富裕的现代化、物质文明和精神文明相协调的现代化、人与自然和谐共生的现代化、走和平发展道路的现代化。（「人大富，文自和，和平路。「）"},
	{id:1382,cat:'📝 模考题库',q:"下列不属于2025—2026年文博领域重要政策/立法动态的是：",o:["新修订《文物保护法》2025年3月1日施行", "第四次全国文物普查进入成果汇总、认定登记和公布阶段", "2026年政府工作报告提出完成第四次全国文物普查", "《博物馆法》2025年正式颁布施行"],a:3,exp:"截至2026年7月，尚无《博物馆法》已于2025年正式颁布施行的事实；A、B、C均符合近年文博政策动态。"},
	{id:1383,cat:'📝 模考题库',q:"上海博物馆是国内较早建立文物修复机构的文博单位之一，其文物修复工场设立于：",o:["1952年", "1958年", "1960年", "1978年"],a:1,exp:"上海博物馆于1958年设立文物修复工场，1960年设立文物保护技术科学实验室。"},
	{id:1384,cat:'📝 模考题库',q:"2025年11月，上博东馆与美国纽约大都会艺术博物馆联合举办「融古烁新：宋元明清铜器的复古与创新「展。此次上海站新增69件上博馆藏，其中首次对外展出的为：",o:["31件", "41件", "51件", "61件"],a:1,exp:"相比纽约首展，上海站新增69件上博馆藏青铜器，其中41件为首次对外展出。"},
	{id:1385,cat:'📝 模考题库',q:"2025年上博东馆「何以中国「系列推出「龙腾中国：红山文化古国文明特展「。红山文化核心分布区主要在：",o:["辽河流域，以内蒙古东南、辽宁西部为核心", "黄河中游，主要在陕西、山西", "长江上游，主要在四川、重庆", "淮河流域，主要在安徽、河南"],a:0,exp:"红山文化主要分布在辽河流域，常与内蒙古东南部、辽宁西部等区域相关。"},
	{id:1386,cat:'📝 模考题库',q:"2026年政府工作报告关于文化遗产工作的表述中，明确提出要完成（ ），加强文化遗产系统性保护、监管和合理利用。",o:["第四次全国文物普查", "夏商周断代工程", "第一次全国可移动文物普查", "全国石窟寺专项调查"],a:0,exp:"2026年政府工作报告提出「完成第四次全国文物普查，加强文化遗产系统性保护、监管和合理利用「。"},
	{id:1387,cat:'📝 模考题库',q:"博物馆不仅是文物的栖身之所，更是文明对话的场域。从「保管者「到「连接者「，从「以物为本「到「以人为本「，中国博物馆正在经历一场静水深流的转型。上博「古埃及文明大展「13个月接待观众逾277万人次，正是这种转型的缩影——博物馆不再高冷，而是以更开放的姿态嵌入城市生活。这段文字意在说明：",o:["上博古埃及展是史上最成功的文化展览", "中国博物馆的功能定位正从「保管「走向「连接「", "博物馆应当降低门槛以吸引更多观众", "文物展览是城市文旅消费的核心引擎"],a:1,exp:"文段中心句是「从保管者到连接者「，古埃及展只是例证。"},
	{id:1388,cat:'📝 模考题库',q:"填入横线处最恰当的一项是：文物修复讲究「最小干预、可逆性、可辨识性「，这三条原则看似简单，实则____。一处笔误的补全、一道裂纹的弥合，既要经得起科技的检测，也要扛得住时间的____。",o:["玄机暗藏／拷问", "字字珠玑／审视", "微言大义／检验", "意味深长／推敲"],a:2,exp:"「微言大义「可对应原则虽短而内涵深，「时间的检验「为固定搭配。A语义偏玄，不如C稳妥。"},
	{id:1389,cat:'📝 模考题库',q:"下列句子中，标点符号使用正确的一项是：",o:["上博东馆的常设展包括《青铜馆》、《书法馆》、《绘画馆》等。", "新修订的《文物保护法》于2025年3月1日起施行，其亮点包括：先考古、后出让；加大违法处罚力度；鼓励民间合法收藏……等。", "「何以中国「是上博推出的文物考古系列大展，目前已展出「考古中国「「龙腾中国「等专题。", "河南郑州商城遗址的发现，将郑州建都史推至3600年前，印证了《史记》中「汤始居亳「的记载。"],a:2,exp:"并列书名号之间一般不加顿号；「省略号「和「等「不宜连用；D句事实表述过强且标点不是最佳。C标点规范。"},
	{id:1390,cat:'📝 模考题库',q:"一个黑圆在4×4方格最外圈按顺时针方向每步移动一格。初始在第1行第1列，外圈顺序为：第1行从左到右、第4列从上到下、第4行从右到左、第1列从下到上。第3步结束后，黑圆所在位置是：",o:["第1行第3列", "第1行第4列", "第2行第4列", "第4行第4列"],a:1,exp:"初始a11；第1步a12，第2步a13，第3步a14。原题给出的「a11→a14→a44「跳格规则不清，已替换。"},
	{id:1391,cat:'📝 模考题库',q:"某文博考察团计划依次前往6个遗址考察，分别是A、B、C、D、E、F。要求：①A、B必须连在一起（AB或BA均可）；②C不能安排在最后一个。共有多少种符合条件的路线？",o:["120", "192", "216", "240"],a:1,exp:"把AB捆绑为一个整体，共5个元素，排列为5!×2=240；其中C在最后时，前4个位置排列为4!×2=48，故240−48=192。"},
	{id:1392,cat:'📝 模考题库',q:"有学者认为：红山文化玉龙的发现证明，距今5000多年前辽河流域已出现「龙「图腾崇拜，且这一崇拜后来被中原王朝继承，因此「中华龙「起源于辽河而非黄河。以下哪项最能削弱上述结论？",o:["河南濮阳西水坡仰韶文化遗址也发现距今约6400年的蚌塑龙形象", "红山玉龙的形态与后世「中国龙「仍有较大差异", "辽河流域的红山文化在距今5000年后逐渐衰落，人群流向不明", "二里头遗址出土的绿松石龙形器距今约3800年"],a:0,exp:"A提供了更早的中原地区龙形象，直接削弱「起源于辽河而非黄河「的排他性结论。"},
	{id:1393,cat:'📝 模考题库',q:"新修订《文物保护法》新增「先考古、后出让「制度。某省实施一年后，抢救性发掘项目减少37%，主动性考古项目增加52%。以下哪项最能支持「先考古、后出让有利于文物保护「？",o:["抢救性发掘往往时间紧、成本高，且文物信息提取不完整", "该省同期土地出让总面积与前一年基本持平", "主动性考古能更系统地提取遗址信息，为后续保护规划提供依据", "该制度实施后，公众对考古工作的知晓度提升了28%"],a:2,exp:"题干核心是主动性考古增加，C说明主动性考古为什么更有利于系统保护，支持力度最直接。A也有支持性，但主要说明抢救性发掘不足，力度次于C。"},
	{id:1394,cat:'📝 模考题库',q:"张謇创立南通博物苑 之于 中国第一座公共博物馆，相当于：",o:["殷墟 之于 中国第一个有文献可考并为考古发掘所证实的商代都城遗址", "敦煌莫高窟 之于 世界最大佛教艺术宝库", "故宫博物院 之于 中国最大的古代文化艺术博物馆", "《四库全书》 之于 中国最大的类书"],a:0,exp:"「人物/创立或发现对象—历史地位「的确定性关系；《四库全书》是丛书，不是类书。B错：莫高窟是佛教石窟艺术遗址，不是皇家园林；中国现存最早的皇家（祭祀）园林常见说法为山西晋祠。 C错：故宫博物院成立于1925年，是中国最大的古代文化艺术博物馆之一；中国第一座公共博物馆/近代博物馆通常指1905年南通博物苑。 D错：《四库全书》是大型丛书；中国古代最大的类书是《永乐大典》。"},
	{id:1395,cat:'📝 模考题库',q:"上海博物馆人民广场馆与东馆的闭馆日分别为：",o:["人民广场馆周一闭馆，东馆周二闭馆", "人民广场馆周二闭馆，东馆周一闭馆", "两馆均为周一闭馆", "两馆均为周二闭馆"],a:0,exp:"上博官网显示：人民广场馆周一闭馆，东馆周二闭馆，国定节假日除外。"},
	{id:1396,cat:'📝 模考题库',q:"上海博物馆藏「大克鼎「铭文约290字，其主要史料价值在于记载：",o:["周王对贵族「克「的策命及赏赐土地、奴隶等内容", "周成王营建成周并出现「宅兹中国「", "秦统一文字、车轨、度量衡", "晋侯稣率军征伐夙夷"],a:0,exp:"大克鼎铭文主要叙述克凭先祖功绩受到周王策命和赏赐，是研究西周经济制度的重要史料；「宅兹中国「属何尊，不藏上博。"},
	{id:1397,cat:'📝 模考题库',q:"楹联是我国独特艺术形式，主要将哪两类艺术结合？",o:["诗词与书法", "诗词与篆刻", "书法与绘画", "绘画与篆刻"],a:0,exp:"楹联以对仗文学为内容，以书法书写为形式，常体现诗词文辞与书法艺术结合。"},
	{id:1398,cat:'📝 模考题库',q:"张謇1905年创立的南通博物苑，是中国历史上：",o:["第一座私人藏书楼", "第一座公共博物馆", "第一座皇家园林", "第一座近代图书馆"],a:1,exp:"南通博物苑通常被视为中国人自办的第一座公共博物馆。"},
	{id:1399,cat:'📝 模考题库',q:"国际博物馆日是每年的：",o:["5月8日", "5月18日", "5月28日", "6月18日"],a:1,exp:"国际博物馆日为每年5月18日。"},
	{id:1400,cat:'📝 模考题库',q:"2024年国际博物馆日主题是「博物馆致力于教育和研究「。2026年主题是：",o:["博物馆、可持续性与美好生活", "博物馆：联结世界的桥梁", "博物馆的力量", "博物馆与文化多样性"],a:1,exp:"2026年主题为「博物馆：联结世界的桥梁「。"},
	{id:1401,cat:'📝 模考题库',q:"「中华第一剑「虢国玉柄铁剑出土于：",o:["河南三门峡虢国墓", "湖北随州曾侯乙墓", "陕西西安秦始皇陵", "四川广汉三星堆"],a:0,exp:"虢国玉柄铁剑出土于河南三门峡虢国墓地虢季墓，属西周晚期器物。"},
	{id:1402,cat:'📝 模考题库',q:"下列关于妇好的说法，错误的是：",o:["姓「好「（读hào），「妇「为亲属称谓", "是甲骨文中可查的第一位女性军事统帅", "其庙号为「辛「，故铜器铭文中又称「后母辛「", "生活于商纣王时期，是纣王之妃"],a:3,exp:"妇好生活于商王武丁时期，是武丁之妻，并非商纣王之妃。"},
	{id:1403,cat:'📝 模考题库',q:"何尊内底铭文中出现「宅兹中国「，这是「中国「一词最早的文字记载。何尊现藏于：",o:["中国国家博物馆", "宝鸡青铜器博物院", "上海博物馆", "陕西历史博物馆"],a:1,exp:"何尊1963年出土于陕西宝鸡贾村，现藏宝鸡青铜器博物院。"},
	{id:1404,cat:'📝 模考题库',q:"后母戊鼎（原称司母戊鼎）是已知中国古代最重的青铜器，其所属朝代是：",o:["夏", "商", "西周", "春秋"],a:1,exp:"后母戊鼎为商代晚期青铜器。"},
	{id:1405,cat:'📝 模考题库',q:"三星堆出土的商代青铜神树中，修复完整的一号神树高度约为：",o:["196厘米", "296厘米", "396厘米", "496厘米"],a:2,exp:"三星堆一号青铜神树修复后通高约396厘米。"},
	{id:1406,cat:'📝 模考题库',q:"下列关于古籍整理与版本的说法，正确的是：",o:["「孤本「指世间仅存一份的某书某版本", "「善本「仅指宋代以前的刻本", "《永乐大典》是清代编纂的最大类书", "《四库全书》分经史子集四部，共收录典籍约7900种"],a:0,exp:"孤本指仅存一部或一份的版本；善本不限于宋以前刻本；《永乐大典》为明代类书；《四库全书》收书约3500余种。"},
	{id:1407,cat:'📝 模考题库',q:"中国列入联合国教科文组织非物质文化遗产名录、名册的项目总数：",o:["居世界第一", "居世界第二", "居世界第三", "居世界第四"],a:0,exp:"中国列入联合国教科文组织非遗名录名册项目总数长期位居世界第一。"},
	{id:1408,cat:'📝 模考题库',q:"昆曲的特点是：",o:["现存中国最古老剧种之一，起源于浙江温州", "现存中国最古老剧种之一，起源于江苏昆山", "起源于元代大都，以梆子腔为主", "起源于明代弋阳，以高腔为主"],a:1,exp:"昆曲发源于江苏昆山一带，是现存中国最古老的剧种之一。"},
	{id:1409,cat:'📝 模考题库',q:"2024年11月意大利返还我国的56件文物艺术品，主要为我国哪些地区的出土文物？",o:["甘肃、青海、陕西", "河南、陕西、山西", "湖南、湖北、江西", "四川、重庆、贵州"],a:0,exp:"该批文物主要涉及甘肃、青海、陕西等地区，其中包含马家窑文化彩陶、汉唐陶俑、元代陶兽。"},
	{id:1410,cat:'📝 模考题库',q:"对于通过非法途径流失海外的珍贵文物，下列哪种方式原则上不宜作为鼓励性追索方式？",o:["外交追索", "商业回购", "第三方斡旋", "诉讼依法追回"],a:1,exp:"外交追索、诉讼、第三方斡旋等是常见追索路径；对非法流失文物，商业回购易形成「赎买被盗物「的不良激励。"},
	{id:1411,cat:'📝 模考题库',q:"《女史箴图》唐摹本现藏于：",o:["大英博物馆", "波士顿艺术博物馆", "故宫博物院", "卢浮宫"],a:0,exp:"《女史箴图》唐摹本现藏英国大英博物馆。"},
	{id:1412,cat:'📝 模考题库',q:"下列各组景点，按从北到南地理位置排序正确的是：①户部巷 ②橘子洲 ③杜甫江阁 ④天一阁 ⑤晴川阁 ⑥沙面 ⑦辛亥革命纪念馆 ⑧黄埔军校旧址",o:["①⑤④②③⑧⑥⑦", "④①⑤②③⑧⑥⑦", "①⑤②③④⑥⑦⑧", "⑤①②③④⑥⑦⑧"],a:0,exp:"按纬度大致为武汉（约30.5°N）→宁波（约29.9°N）→长沙（约28.2°N）→广州（约23.1°N）。原答案把宁波排在长沙以南，地理顺序错误。"},
	{id:1413,cat:'📝 模考题库',q:"2026年4月29日揭晓的2025年度全国十大考古新发现中，哪项发现改变了学界对黄土高原和黄河流域文明进程的认知？",o:["吉林东部长白山旧石器时代遗址群", "甘肃庆阳南佐遗址", "河南郑州商城遗址", "山西昔阳钟村遗址"],a:1,exp:"南佐遗址是黄土高原距今5000年前后的一处都邑性聚落，改变了学界对黄土高原和黄河流域文明进程的认知。裴李岗遗址-水稻酿酒、旧新过渡、裴李岗文化；郑家沟遗址-红山文化、积石冢、玉器、祭祀；南佐遗址-宫殿式建筑、黄土高原文明化；钟村遗址-夏晚期高等级贵族墓葬群；郑州商城遗址—早商都城、仓储、水网；富平长春遗址-西周王畿、聚落墓地；琅琊台遗址-秦始皇东巡、筑琅琊台；绍兴越国都城和会稽郡遗址 -越国都城、会稽郡；苏峪口瓷窑址-西夏官窑、南北制瓷交融"},
	{id:1414,cat:'📝 模考题库',q:"2025年度全国十大考古新发现中，哪项发现了目前等级最高的夏晚期贵族墓葬群？",o:["河北宣化郑家沟遗址", "山西昔阳钟村遗址", "陕西富平长春遗址", "宁夏贺兰苏峪口瓷窑址"],a:1,exp:"山西昔阳钟村遗址发现目前等级最高的夏晚期贵族墓葬群。长白黑、裴酒、沟红玉；南佐殿、钟夏（仲夏）墓、商仓水；富春周、琅秦、绍越会、苏夏窑。"},
	{id:1415,cat:'📝 模考题库',q:"2025年度全国十大考古新发现中，哪项以黑曜岩石器工业著称，构建了距今约22万年至1.3万年的旧石器文化发展序列？",o:["河南新郑裴李岗遗址", "吉林东部长白山旧石器时代遗址群", "甘肃庆阳南佐遗址", "浙江绍兴越国都城和汉六朝会稽郡遗址"],a:1,exp:"长白山旧石器时代遗址群构建距今22万年至1.3万年古人类技术演进历程，并揭示黑曜岩资源利用和跨区域流通。长白黑、裴酒、沟红玉；南佐殿、钟夏（仲夏）墓、商仓水；富春周、琅秦、绍越会、苏夏窑。"},
	{id:1416,cat:'📝 模考题库',q:"《富春山居图》被誉为「画中之兰亭「，其两段分别藏于：",o:["浙江省博物馆（剩山图）／台北故宫博物院（无用师卷）", "故宫博物院／浙江省博物馆", "辽宁省博物馆／上海博物馆", "台北故宫博物院／南京博物院"],a:0,exp:"前段《剩山图》藏浙江省博物馆，后段《无用师卷》藏台北故宫博物院。"},
	{id:1417,cat:'📝 模考题库',q:"阎立本《步辇图》描绘吐蕃使者禄东赞朝见唐太宗的场景，现存画作一般认为是：",o:["隋代原作", "唐代原作", "宋代摹本", "元代摹本"],a:2,exp:"《步辇图》现藏故宫博物院，通常认为为宋摹本。"},
	{id:1418,cat:'📝 模考题库',q:"《洛神赋图》的传统作者是：",o:["顾恺之", "吴道子", "阎立本", "赵孟頫"],a:0,exp:"《洛神赋图》传统归于东晋顾恺之；赵孟頫有行书《洛神赋》书法作品，二者不可混淆。"},
	{id:1419,cat:'📝 模考题库',q:"颜真卿与柳公权并称「颜筋柳骨「。下列属于颜真卿公认墨迹真迹的是：",o:["《多宝塔碑》", "《祭侄季明文稿》", "《玄秘塔碑》", "《夫子庙堂碑》"],a:1,exp:"《祭侄季明文稿》为颜真卿墨迹名作，并被誉为「天下第二行书「。"},
	{id:1420,cat:'📝 模考题库',q:"「中华文明探源工程「在预研究基础上，作为国家「十五「重点科技攻关项目正式启动于：",o:["2001年", "2004年", "2008年", "2012年"],a:1,exp:"2001—2003年为预研究，2004年正式启动。"},
	{id:1421,cat:'📝 模考题库',q:"中华文明探源工程相关成果认为，我国进入「古国时代「、实证「中华五千年文明「的时间节点约为距今：",o:["4000年前", "5000年前", "6000年前", "8000年前"],a:1,exp:"探源工程认为距今5000年前后我国已进入文明阶段，出现国家，进入「古国时代「。"},
	{id:1422,cat:'📝 模考题库',q:"中国海上丝绸之路主要分为东海航线和南海航线。下列说法错误的是：",o:["南海航线以南海为中心，可抵东南亚、印度洋等区域", "陆上丝绸之路和海上丝绸之路均可通达印度相关区域", "汉代徐闻、合浦等港口是早期海上交通的重要节点", "泉州是海上丝绸之路唯一的联合国教科文组织世界遗产点"],a:3,exp:"泉州以「宋元中国的世界海洋商贸中心「列入世界遗产，但不能表述为海上丝路「唯一「的世界遗产点；海丝相关遗产与节点复杂，不宜作绝对化表述。"},
	{id:1423,cat:'📝 模考题库',q:"第四次全国文物普查的普查标准时点是：",o:["2023年11月1日", "2024年1月1日", "2024年4月30日", "2026年6月30日"],a:2,exp:"国务院通知明确，第四次全国文物普查标准时点为2024年4月30日。"},
	{id:1424,cat:'📝 模考题库',q:"上海博物馆青铜馆重器「大克鼎「出土于：",o:["陕西宝鸡", "陕西扶风法门寺任村", "河南安阳", "湖南宁乡"],a:1,exp:"大克鼎清光绪年间出土于陕西扶风法门寺任村。"},
	{id:1425,cat:'📝 模考题库',q:"西周青铜器「利簋「铭文记载了哪场战役，从而成为印证武王伐纣年代的关键器物？",o:["牧野之战", "涿鹿之战", "巨鹿之战", "长平之战"],a:0,exp:"利簋铭文记载武王伐商牧野之战相关内容。"},
	{id:1426,cat:'📝 模考题库',q:"下列关于「后母戊鼎「的说法错误的是：",o:["1939年出土于河南安阳武官村", "鼎腹内壁铸「后母戊「三字", "是已知最重的商代青铜器，重约832公斤", "现藏于上海博物馆"],a:3,exp:"后母戊鼎现藏中国国家博物馆，不在上海博物馆。"},
	{id:1427,cat:'📝 模考题库',q:"青铜器中「盨（xǔ）「的器用主要是：",o:["盛酒", "盛食（黍、稷、稻粱等）", "盛水", "烹煮"],a:1,exp:"盨为西周中晚期常见盛食器。"},
	{id:1428,cat:'📝 模考题库',q:"上海博物馆藏「子仲姜盘「的特殊之处在于盘内铸有：",o:["可转动的圆雕水生动物", "可拆卸的鼎耳", "错金银纹饰", "铭文「宅兹中国「"],a:0,exp:"子仲姜盘内有鱼、龟、蛙、水鸟等可转动圆雕动物，极具工艺特色。"},
	{id:1429,cat:'📝 模考题库',q:"我国目前出土的早期人工冶铁制品之一、常被称为「中华第一剑「的是：",o:["虢国玉柄铁剑（西周晚期）", "战国铁农具", "汉代铁剑", "商代铁刃铜钺"],a:0,exp:"虢国玉柄铁剑是西周晚期人工冶铁制品的重要实物，被称为「中华第一剑「。"},
	{id:1430,cat:'📝 模考题库',q:"下列关于「曾侯乙编钟「的说法，正确的是：",o:["出土于湖南长沙", "属于西周早期", "全套65件，总重约2500公斤", "现藏于上海博物馆"],a:2,exp:"曾侯乙编钟出土于湖北随州曾侯乙墓，属战国早期，现藏湖北省博物馆，全套65件。"},
	{id:1431,cat:'📝 模考题库',q:"甲骨文最早被学界发现并确认，一般认为始于：",o:["1899年王懿荣从中药「龙骨「中发现", "1900年罗振玉在敦煌发现", "1928年中央研究院发掘殷墟时首次发现", "1976年妇好墓发掘时首次确认"],a:0,exp:"甲骨文发现通常以1899年王懿荣识别「龙骨「为起点。"},
	{id:1432,cat:'📝 模考题库',q:"下列关于「四羊方尊「的说法，正确的是：",o:["商代晚期，出土于湖南宁乡", "西周早期，出土于陕西宝鸡", "现藏于上海博物馆青铜馆", "是已知最重的青铜器"],a:0,exp:"四羊方尊为商代晚期青铜器，1938年出土于湖南宁乡，现藏中国国家博物馆。"},
	{id:1433,cat:'📝 模考题库',q:"何尊铭文「宅兹中国「中的「中国「主要指：",o:["现代国家意义上的中国", "成周（洛阳）一带的天下之中", "关中平原", "殷墟一带"],a:1,exp:"何尊铭文中的「中国「不是现代国名，而是指以成周为中心的「天下之中「。"},
	{id:1434,cat:'📝 模考题库',q:"下列关于古籍版本的说法，正确的是：",o:["「殿本「多指清代武英殿刻本等宫廷刻书", "「坊本「指官方刻本", "「监本「指寺院刻本", "「蜀本「指元代浙江刻本"],a:0,exp:"坊本多指书坊刻本，监本多指国子监刻本，蜀本指四川地区刻本。"},
	{id:1435,cat:'📝 模考题库',q:"《四库全书》七阁本中，文津阁本现主要藏于：",o:["台北故宫博物院", "甘肃省图书馆", "中国国家图书馆", "浙江图书馆"],a:2,exp:"文津阁本现藏中国国家图书馆已改为藏地考法。（北苑、巾帼、甘肃、澜沧江，源宗汇亡。） 文渊阁本 → 台北故宫 * 文津阁本 → 国家图书馆 * 文溯阁本 → 甘肃 * 文澜阁本 → 浙江 * 文源、文宗、文汇 → 已毁/散亡"},
	{id:1436,cat:'📝 模考题库',q:"我国现存有明确纪年的较早雕版印刷品是：",o:["唐咸通九年《金刚经》", "宋版《大藏经》", "五代冯道刻《九经》", "隋代《舍利经》"],a:0,exp:"敦煌出土唐咸通九年《金刚经》是现存有明确纪年的早期雕版印刷品。"},
	{id:1437,cat:'📝 模考题库',q:"中国项目「二十四节气「入选联合国教科文组织人类非物质文化遗产代表作名录的年份是：",o:["2014年", "2016年", "2018年", "2020年"],a:1,exp:"「二十四节气「于2016年列入人类非物质文化遗产代表作名录。"},
	{id:1438,cat:'📝 模考题库',q:"中国古琴「减字谱「的创制大约始于：",o:["唐代", "宋代", "明代", "魏晋"],a:0,exp:"古琴减字谱一般认为由唐代曹柔在文字谱基础上简化形成。"},
	{id:1439,cat:'📝 模考题库',q:"下列关于「马家窑文化彩陶「的说法，正确的是：",o:["主要分布于黄河上游甘青地区，距今约5000—4000年", "以彩陶艺术发达著称", "2024年意大利返还我国的56件文物中包含马家窑文化彩陶", "以上都对"],a:3,exp:"A、B、C均正确；原B若写「以黑陶著称「则错误，已改为「以彩陶艺术发达著称「。"},
	{id:1440,cat:'📝 模考题库',q:"博物馆藏品保护与修复的基本原则不包括：",o:["预防为主", "最小干预", "原址保存优先于异地保存", "可逆性"],a:2,exp:"「原址保存优先「主要适用于不可移动文物保护语境，不是博物馆馆藏文物保护修复的基本原则。"},
	{id:1441,cat:'📝 模考题库',q:"下列关于「二里头遗址「的说法，正确的是：",o:["位于河南偃师，通常被视为夏代晚期都邑性遗址", "出土了「中国「二字最早记载", "是红山文化的代表遗址", "出土了后母戊鼎"],a:0,exp:"二里头遗址位于河南偃师，是探索夏文化和早期国家的重要遗址；「宅兹中国「为何尊铭文。二里头：3800-3500 * 二里头＝河南偃师＝夏晚都城 * 二里头＝徐旭生1959＝寻找夏墟 * 二里头＝宫殿道路作坊墓＝早期都城 * 二里头＝青铜爵＋绿松石龙＝王权礼制 * 二里头＝最早中国探索＝夏文化核心 * 二里头≠何尊中国、≠殷墟甲骨、≠三星堆古蜀、≠良渚五千年"},
	{id:1442,cat:'📝 模考题库',q:"良渚古城遗址列入世界文化遗产的年份是：",o:["2015年", "2017年", "2019年", "2021年"],a:2,exp:"良渚古城遗址于2019年列入《世界遗产名录》。"},
	{id:1443,cat:'📝 模考题库',q:"良渚遗址实证中华五千年文明，其核心证据主要包括：",o:["大型水利系统、玉礼器体系与都城格局", "甲骨文与青铜器", "长城与兵马俑", "佛教石窟与造像"],a:0,exp:"良渚的都城、水利系统、等级化玉礼器体系是其文明实证的关键。"},
	{id:1444,cat:'📝 模考题库',q:"下列关于「三星堆「的说法，错误的是：",o:["位于四川广汉，属古蜀文明", "祭祀坑出土青铜神树、纵目面具等", "主要年代相当于商代晚期至西周早期", "出土了何尊"],a:3,exp:"何尊出土于陕西宝鸡，不是三星堆遗物。"},
	{id:1445,cat:'📝 模考题库',q:"下列属于「元四家「的是：",o:["黄公望、吴镇、倪瓒、王蒙", "沈周、文徵明、唐寅、仇英", "董其昌、徐渭、八大山人、石涛", "顾恺之、吴道子、阎立本、张萱"],a:0,exp:"元四家为黄公望、吴镇、倪瓒、王蒙；赵孟頫不是通常所称「元四家「之一。"},
	{id:1446,cat:'📝 模考题库',q:"「天下三大行书「通常指《兰亭序》《祭侄文稿》《黄州寒食帖》，作者分别是：",o:["王羲之／颜真卿／苏轼", "王献之／柳公权／黄庭坚", "王羲之／欧阳询／米芾", "王羲之／颜真卿／黄庭坚"],a:0,exp:"三大行书作者分别为王羲之、颜真卿、苏轼。"},
	{id:1447,cat:'📝 模考题库',q:"下列关于《清明上河图》的说法，正确的是：",o:["作者张择端，描绘北宋汴京城市生活", "现藏上海博物馆", "属于南宋作品", "描绘的是临安城"],a:0,exp:"《清明上河图》作者张择端，描绘北宋汴京及汴河两岸城市生活，现藏故宫博物院。"},
	{id:1448,cat:'📝 模考题库',q:"「瘦金体「的创制者是：",o:["宋徽宗赵佶", "唐玄宗", "唐太宗", "宋高宗"],a:0,exp:"瘦金体为宋徽宗赵佶创造和代表的书体。"},
	{id:1449,cat:'📝 模考题库',q:"下列关于「敦煌莫高窟「的说法，错误的是：",o:["通常认为始建于前秦建元二年（366年）", "现存洞窟735个，壁画约4.5万平方米", "藏经洞发现于1900年，与王圆箓有关", "《女史箴图》原件藏于敦煌研究院"],a:3,exp:"《女史箴图》原作已佚，唐摹本藏大英博物馆，不藏敦煌研究院。"},
	{id:1450,cat:'📝 模考题库',q:"2025年度全国十大考古新发现中，河北宣化郑家沟遗址将哪一考古学文化的时间轴线延长近200年？",o:["红山文化", "仰韶文化", "龙山文化", "良渚文化"],a:0,exp:"郑家沟遗址发现红山文化典型遗存，将红山文化时间轴线延长近200年，并扩展其分布范围。"},
	{id:1451,cat:'📝 模考题库',q:"2025年度全国十大考古新发现中，宁夏贺兰苏峪口瓷窑址的重要意义主要在于：",o:["揭示西夏宫廷用瓷烧造与南北制瓷技术交融", "证明青花瓷起源于西夏", "证明邢窑白瓷由此向外输出", "确立汝窑官窑制度的源头"],a:0,exp:"苏峪口瓷窑址与西夏宫廷用瓷、北宋和西夏技术文化交流、南北方制瓷技术交融有关。"},
	{id:1452,cat:'📝 模考题库',q:"2025年度全国十大考古新发现中，河南郑州商城遗址的新发现完整呈现了：",o:["规划有序、功能完备的商代都城格局", "夏代晚期最高等级贵族墓葬", "红山文化积石冢", "旧石器黑曜岩工业"],a:0,exp:"郑州商城遗址新发现进一步呈现早商都邑空间格局和功能分区。"},
	{id:1453,cat:'📝 模考题库',q:"下列关于秦始皇陵兵马俑的说法，正确的是：①1974年发现于陕西西安临潼；②属于秦代遗存；③秦始皇陵及兵马俑坑于1987年列入世界遗产名录。",o:["仅①正确", "仅①②正确", "仅②③正确", "①②③均正确"],a:3,exp:"兵马俑1974年发现于临潼，属秦代遗存，秦始皇陵及兵马俑坑1987年列入世界遗产。"},
	{id:1454,cat:'📝 模考题库',q:"我国第一批禁止出国（境）展览文物共64件/套。下列不在其中的是：",o:["何尊", "后母戊鼎", "四羊方尊", "大克鼎"],a:2,exp:"* 第一批（2002）：后母戊鼎、何尊、大克鼎、大盂鼎、利簋、虢季子白盘、晋侯稣钟等 * 第三批（2013）：四羊方尊、越王勾践剑、商子龙鼎、晋侯鸟尊等 * 第二批（2012）：书画类为主，不是青铜器。《平复帖》、《步辇图》"},
	{id:1455,cat:'📝 模考题库',q:"下列关于「曾侯乙墓「的说法，错误的是：",o:["1978年发掘于湖北随州", "墓主为战国早期曾国国君乙", "出土编钟、尊盘等重要文物", "曾侯乙即春秋五霸之一的楚庄王"],a:3,exp:"曾侯乙是战国早期曾国国君乙，不是楚庄王。"},
	{id:1456,cat:'📝 模考题库',q:"「青铜器之乡「通常指：",o:["陕西宝鸡", "河南安阳", "湖南宁乡", "四川广汉"],a:0,exp:"陕西宝鸡因西周青铜器大量出土而被称为「青铜器之乡「。"},
	{id:1457,cat:'📝 模考题库',q:"甲骨文最早的科学考古发掘，通常指：",o:["1928年中央研究院历史语言研究所在殷墟的发掘", "1899年王懿荣购藏「龙骨「", "1903年《铁云藏龟》出版", "1976年妇好墓发掘"],a:0,exp:"1899年是学术发现起点，1928年殷墟发掘则开启科学考古发掘。"},
	{id:1458,cat:'📝 模考题库',q:"「司母辛「铜器多见于妇好墓，「辛「是妇好的：",o:["庙号", "姓氏", "封地", "夫家氏名"],a:0,exp:"妇好死后庙号为「辛「，相关青铜器铭文有「司母辛「等。"},
	{id:1459,cat:'📝 模考题库',q:"上海博物馆东馆全面建成开放的年份是：",o:["2023年", "2024年", "2025年", "2022年"],a:1,exp:"上博东馆于2024年逐步开放并实现全面建成开放。"},
	{id:1460,cat:'📝 模考题库',q:"下列关于「文创产品「与博物馆的说法，错误的是：",o:["故宫文创是行业标杆之一", "上博古埃及展衍生品销售是其营收构成之一", "博物馆文创不得涉及馆藏文物形象的合法授权开发", "「让文物活起来「是博物馆文创开发的重要政策导向之一"],a:2,exp:"博物馆可在合法合规前提下开发和授权文物形象用于文创，C表述过于绝对。"},
	{id:1461,cat:'📝 模考题库',q:"国际博物馆协会（ICOM）总部位于：",o:["法国巴黎", "英国伦敦", "美国纽约", "意大利罗马"],a:0,exp:"ICOM总部位于法国巴黎。"},
	{id:1462,cat:'📝 模考题库',q:"下列关于流失文物追索与文化财产保护的国际公约，组合最相关的是：",o:["1954年《海牙公约》、1970年UNESCO公约、1995年UNIDROIT公约", "1949年《日内瓦公约》", "1982年《联合国海洋法公约》", "1966年《国际文化合作原则宣言》"],a:0,exp:"1954年海牙公约、1970年UNESCO公约，针对非法进出口文化财产及所有权非法转让、1995年UNIDROIT公约进一步涉及被盗或非法出口文物的返还与归还。这三个是文化财产保护、非法进出口和返还领域的核心文件。"},
	{id:1463,cat:'📝 模考题库',q:"圆明园流失文物「十二生肖兽首「中，截至2026年7月，已知回归祖国的有：",o:["7件", "8件", "9件", "12件全部"],a:1,exp:"牛、虎、猴、猪、马、鼠、兔、龙共8件已回归；蛇、鸡、狗、羊仍下落不明或未回归。"},
	{id:1464,cat:'📝 模考题库',q:"下列关于大英博物馆中国文物收藏的说法，错误的是：",o:["《女史箴图》唐摹本藏于此", "斯坦因获取的大量敦煌写本部分藏于此", "大英博物馆是中国境外收藏中国文物较多的机构之一", "大英博物馆所有中国文物均为合法购买所得"],a:3,exp:"大英博物馆中国文物来源复杂，不能绝对化表述为「所有均为合法购买所得「。"},
	{id:1465,cat:'📝 模考题库',q:"「南海一号「沉船是宋代远洋贸易船，其保护展示馆位于：",o:["广东阳江", "福建泉州", "海南三亚", "浙江宁波"],a:0,exp:"「南海一号「整体打捞后在广东海上丝绸之路博物馆（水晶宫）保护展示，位于广东阳江。"},
	{id:1466,cat:'📝 模考题库',q:"下列城市中，不属于「海上丝绸之路：中国史迹「联合申遗常见节点城市的是：",o:["广州", "泉州", "宁波", "扬州", "郑州"],a:4,exp:"广州、泉州、宁波、扬州等均为海丝重要港口或节点；郑州为内陆商都，与海丝联合申遗节点不匹配。"},
	{id:1467,cat:'📝 模考题库',q:"「一带一路「倡议中，「丝绸之路经济带「的三大走向不包括：",o:["中国—中亚—俄罗斯—欧洲", "中国—中亚—西亚—波斯湾—地中海", "中国—东南亚—南亚—印度洋", "中国—中南半岛—印度洋—欧洲"],a:2,exp:"C属于「21世纪海上丝绸之路「的方向，不是「丝绸之路经济带「的三大走向。一、现代：「丝绸之路经济带「三大走向 丝绸之路经济带＝陆上部分。 1.官方三大走向是： * 西北/东北 → 中亚、俄罗斯 → 欧洲、波罗的海 * 西北 → 中亚、西亚 → 波斯湾、地中海 * 西南 → 中南半岛 → 印度洋现代「海上丝绸之路「怎么记 21世纪海上丝绸之路＝海上部分。 大方向可以记： * 中国沿海港口 → 南海 → 印度洋 → 欧洲 * 中国沿海港口 → 南海 → 南太平洋 古代路上丝绸之路： * 起点：长安、洛阳 * 关键通道：河西走廊 * 关键区域：西域、中亚、西亚 * 终点方向：欧洲、地中海世界 * 代"},
	{id:1468,cat:'📝 模考题库',q:"2025年上博东馆「融古烁新「铜器展中，策展叙事将宋徽宗与清高宗（乾隆）对比，二者在宋元明清铜器发展中的角色可概括为：",o:["宋徽宗是起始，清高宗是高潮", "清高宗是起始，宋徽宗是高潮", "二者均为低谷期", "二者均与铜器无关，主要是瓷器"],a:0,exp:"该展将宋徽宗与清高宗作为礼制改革和仿古铜器发展中的关键人物，宋徽宗为起始，清高宗为高潮。"},
	{id:1469,cat:'📝 模考题库',q:"下列关于2025年3月1日起施行的新修订《文物保护法》的表述，正确的有：",o:["明确境内地下、内水和领海中遗存的一切文物属于国家所有", "新增「先调查、后建设「「先考古、后出让「保护前置机制", "赋予文物行政部门监督检查中的行政强制措施", "明确人民检察院可对文物保护提起公益诉讼", "删除「民间收藏文物「内容，禁止民间收藏"],a:[0, 1, 2, 3],exp:"新法保留并规范民间收藏相关内容，并未禁止合法民间收藏；A、B、C、D均符合新法修订方向。",multi:true},
	{id:1470,cat:'📝 模考题库',q:"下列关于陆上丝路与海上丝路的说法，正确的有：",o:["陆上丝路以长安等地为起点，经河西走廊、西域、中亚、西亚抵欧洲", "海上丝路以南海航线为主，东海航线为辅", "两者均可抵达或通向印度相关区域", "泉州、广州、宁波、扬州均是海上丝路重要港口或节点城市", "海上丝路正式开通早于陆上丝路"],a:[0, 1, 2, 3],exp:"E表述过于绝对且不符合通行知识；A、B、C、D为常规考点。",multi:true},
	{id:1471,cat:'📝 模考题库',q:"下列关于「中华文明探源工程「的表述，正确的有：",o:["是在「夏商周断代工程「之后由国家支持的重大科研项目", "2001—2003年为预研究，2004年作为「十五「重点科技攻关项目正式启动", "成果认为距今5000年前我国已进入文明阶段，出现国家，进入「古国时代「", "主要研究对象仅为夏商周三代", "项目采取多学科联合研究路径"],a:[0, 1, 2, 4],exp:"探源工程不是仅研究夏商周三代，而是聚焦中华文明起源与早期发展，采用考古学、自然科学、人文社会科学多学科方法。",multi:true},
	{id:1472,cat:'📝 模考题库',q:"博物馆藏品保护与修复中常见的原则包括：",o:["预防为主", "最小干预", "可逆性", "可辨识性", "原址优先"],a:[0, 1, 2, 3],exp:"原址优先主要适用于不可移动文物保护语境；馆藏文物保护更强调预防性保护、最小干预、可逆、可辨识等原则。",multi:true},
	{id:1473,cat:'📝 模考题库',q:"下列入选2025年度全国十大考古新发现的有：",o:["吉林东部长白山旧石器时代遗址群", "河南新郑裴李岗遗址", "河北宣化郑家沟遗址", "浙江余姚河姆渡遗址", "宁夏贺兰苏峪口瓷窑址"],a:[0, 1, 2, 4],exp:"2025年度全国十大考古新发现包括长白山旧石器遗址群、新郑裴李岗、宣化郑家沟、贺兰苏峪口瓷窑址等；浙江余姚河姆渡遗址不是该年度入选项目。",multi:true},
	{id:1474,cat:'📝 模考题库',q:"第一次全国可移动文物普查的起止时间是？",o:["2012-2016年", "2013-2017年", "2011-2015年", "2014-2018年"],a:0,exp:"2012年10月至2016年12月，历时5年，首次摸清全国国有可移动文物家底。"},
	{id:1475,cat:'📝 模考题库',q:"第一次全国可移动文物普查共登记国有可移动文物约多少？",o:["约5000万件/套", "约6400万件/套", "约1.08亿件/套", "约2亿件/套"],a:2,exp:"登记约1.08亿件/套。口诀：一普摸家底，1.08亿记心里。"},
	{id:1476,cat:'📝 模考题库',q:"第一次可移动文物普查结果显示，收藏可移动文物最多的博物馆是？",o:["中国国家博物馆", "上海博物馆", "故宫博物院", "南京博物院"],a:2,exp:"故宫博物院以约186万件/套居全国之首。"},
	{id:1477,cat:'📝 模考题库',q:"第一次全国可移动文物普查覆盖了多少家国有文物收藏保管机构？",o:["约5000家", "约8000家", "约1.1万家", "约1.6万家"],a:2,exp:"普查覆盖约1.1万家国有文物收藏保管机构。"},
	{id:1478,cat:'📝 模考题库',q:"关于第一次全国可移动文物普查，下列说法正确的有？",o:["首次摸清全国国有可移动文物家底", "建立了全国可移动文物信息登录平台", "实现了全部文物的数字化展示", "为文物保护利用提供了科学依据"],a:[0, 1, 3],exp:"普查建立了统一平台和数据库。全部数字化展示不是普查目标。",multi:true},
];

const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "000000000000",
  appId: "YOUR_APP_ID"
};

let firebaseReady = false;
let syncStatus = 'ok';
let syncTimer = null;

function initFirebase(){
  try{
    if(typeof firebase==='undefined'){ syncStatus='error'; return; }
    if(firebase.apps.length===0){ firebase.initializeApp(FIREBASE_CONFIG); }
    firebaseReady = true;
    pullFromCloud();
  }catch(e){ syncStatus='error'; console.warn('Firebase init failed:', e.message); }
}

function getCloudRef(){
  if(!firebaseReady)return null;
  try{ return firebase.database().ref('quizData'); }catch(e){ return null; }
}

function pushToCloud(d){
  if(!firebaseReady)return;
  var ref=getCloudRef();
  if(!ref)return;
  syncStatus='pending';
  var cloudData = { ...d, _cloudTime: Date.now() };
  if(cloudData.customQuestions){
    cloudData.customQuestions = cloudData.customQuestions.map(function(q){
      return {q:q.q, o:q.o, a:q.a, exp:q.exp, cat:q.cat, custom:true};
    });
  }
  ref.set(cloudData).then(function(){
    syncStatus='ok';
    if(currentScreen==='home') render();
  }).catch(function(e){
    syncStatus='error';
    console.warn('Cloud sync failed:', e.message);
  });
}

function scheduleCloudSync(){
  if(!firebaseReady)return;
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){ pushToCloud(appData); }, 800);
}

function pullFromCloud(){
  var ref=getCloudRef();
  if(!ref)return;
  ref.once('value').then(function(snap){
    var cloud=snap.val();
    if(!cloud){ pushToCloud(appData); return; }
    if(!cloud._cloudTime){ pushToCloud(appData); return; }
    var localTime = appData._cloudTime || 0;
    var cloudTime = cloud._cloudTime || 0;
    if(cloudTime > localTime){
      ['answers','favorites','wrongSet','multiConfirmed'].forEach(function(k){
        if(cloud[k]) appData[k] = cloud[k];
      });
      if(cloud.notes && cloud.notes.length>0) appData.notes = cloud.notes;
      if(cloud.customQuestions && cloud.customQuestions.length>0){
        appData.customQuestions = cloud.customQuestions;
      }
      appData._cloudTime = cloudTime;
      saveToLocal(appData);
      questionBank = questionBank.filter(function(q){ return !q.custom; });
      appData.customQuestions.forEach(function(q,i){
        if(!questionBank.find(function(qq){ return qq.custom && qq._customIdx===i; })){
          questionBank.push({...q, cat:'📝 自定义题库', id:90000+i, _customIdx:i});
        }
      });
      render();
    } else if(localTime > cloudTime){
      pushToCloud(appData);
    }
  }).catch(function(e){ console.warn('Cloud pull failed:', e.message); });
}

function saveToLocal(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function loadData(){
  try{ var d=JSON.parse(localStorage.getItem(STORAGE_KEY)); if(d&&d.answers)return d; }catch(e){}
  try{ return JSON.parse(DEFAULT_BACKUP); }catch(e){}
  return {};
}

function saveData(d){
  saveToLocal(d);
  scheduleCloudSync();
}

// Stats
function getStats(cat){
  let total=0,done=0,correct=0;
  let qs=cat?questionBank.filter(q=>q.cat===cat):questionBank;
  qs.forEach(q=>{
    total++;
    if(isQuizAnswered(q)){
      done++;
      if(isCorrect(q,appData.answers[q.id]))correct++;
    }
  });
  return {total,done,correct,rate:done?Math.round(correct/done*100):0};
}

function isCorrect(q,ans){
  if(Array.isArray(q.a))return Array.isArray(ans)&&q.a.length===ans.length&&q.a.every(v=>ans.includes(v));
  return ans===q.a;
}

function getCatProgress(cat){
  let qs=questionBank.filter(q=>q.cat===cat);
  let done=qs.filter(q=>isQuizAnswered(q)).length;
  return {done,total:qs.length,pct:qs.length?Math.round(done/qs.length*100):0};
}

// ===== QUIZ =====
let quizOrder=[];
function startCatQuiz(){quizSource='category';quizOrder=[...questionBank.filter(q=>q.cat===currentCat).map(q=>q.id)];currentQIdx=0;renderQuiz();}
function startCatRandom(){quizSource='category';quizOrder=[...questionBank.filter(q=>q.cat===currentCat)].sort(()=>Math.random()-.5).map(q=>q.id);currentQIdx=0;renderQuiz();}
function openQuiz(idx){quizSource='category';quizOrder=[...questionBank.filter(q=>q.cat===currentCat).map(q=>q.id)];currentQIdx=idx;renderQuiz();}

function getCurrentQuizQuestion(){return questionBank.find(q=>q.id===quizOrder[currentQIdx]);}
function isMultiConfirmed(qid){return appData.multiConfirmed&&appData.multiConfirmed[qid];}
function isQuizAnswered(q){
  let userAns=appData.answers[q.id];
  if(userAns===undefined)return false;
  if(Array.isArray(q.a))return isMultiConfirmed(q.id);
  return true;
}

function renderQuiz(){
  let q=getCurrentQuizQuestion();
  let total=quizOrder.length;
  let userAns=appData.answers[q.id];
  let answered=isQuizAnswered(q);
  let isMulti=Array.isArray(q.a);
  let multiSelecting=isMulti&&!answered;
  let html=`
<div style="background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px">
  <button class="back-btn" style="color:#fff" onclick="goBackFromQuiz()">←</button>
  <span style="flex:1;font-size:14px">${currentCat||''} ${currentQIdx+1}/${total}</span>
  <button style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer" onclick="toggleFav(${q.id});renderQuiz()">${appData.favorites[q.id]?'★':'☆'}</button>
</div>
<div class="container">
  <div class="progress-bar mb-12"><div class="progress-fill" style="width:${(currentQIdx+1)/total*100}%"></div></div>
  <div class="quiz-header">
    <span>${q.cat}</span><span>${isMulti?'多选':'单选'}</span>
  </div>
  <div class="quiz-question">${q.q}</div>
  <div class="quiz-options">`;
  q.o.forEach((opt,i)=>{
    let cls='quiz-option';
    if(answered){
      let correct=isCorrect(q,i);
      let userSelected=isMulti?(Array.isArray(userAns)&&userAns.includes(i)):userAns===i;
      if(userSelected&&correct)cls+=' correct';
      else if(userSelected&&!correct)cls+=' wrong';
      else if(correct)cls+=' show-correct';
    }else if(!isMulti&&userAns===i){cls+=' selected'}
    else if(isMulti&&Array.isArray(userAns)&&userAns.includes(i)){cls+=' selected'}
    html+=`<div class="${cls}" onclick="${answered?'':'selectAnswer('+i+')'}"><strong>${'ABCDEFGH'[i]}.</strong> ${opt}</div>`;
  });
  html+=`</div>`;
  if(multiSelecting){
    let selectedCount=Array.isArray(userAns)?userAns.length:0;
    html+=`<div style="padding:12px 0;text-align:center">
      <span style="font-size:13px;color:var(--sub)">已选 ${selectedCount} 项 · </span>
      <button class="btn btn-primary btn-sm" ${selectedCount===0?'disabled':''} onclick="confirmMultiAnswer()">✓ 确认答案</button>
    </div>`;
  }
  if(answered){
    let isRight=isCorrect(q,userAns);
    html+=`<div class="quiz-explain">
      <span class="tag ${isRight?'tag-correct':'tag-wrong'}">${isRight?'✓ 正确':'✗ 错误'}</span>
      ${isMulti?('<br>正确答案：'+q.a.map(i=>'ABCDEFGH'[i]).join('、')):('<br>正确答案：'+'ABCDEFGH'[q.a])}
      <br><br>📖 ${q.exp}
    </div>`;
  }
  html+=`<div class="btn-row mt-12">
    <button class="btn btn-outline btn-sm" ${currentQIdx===0?'disabled':''} onclick="prevQuiz()">上一题</button>
    <button class="btn btn-outline btn-sm" style="flex:2" onclick="toggleFav(${q.id});renderQuiz()">${appData.favorites[q.id]?'★ 已收藏':'☆ 收藏'}</button>
    <button class="btn btn-primary btn-sm" ${currentQIdx>=total-1?'disabled':''} onclick="nextQuiz()">下一题</button>
  </div></div>`;
  app.innerHTML=html;
}

function selectAnswer(i){
  let q=getCurrentQuizQuestion();
  let userAns=appData.answers[q.id];
  if(Array.isArray(q.a)){
    if(!Array.isArray(userAns))userAns=[];
    let idx=userAns.indexOf(i);
    if(idx>=0)userAns.splice(idx,1);else userAns.push(i);
    appData.answers[q.id]=userAns;
  }else{
    appData.answers[q.id]=i;
    // check correctness for wrong set
    if(!isCorrect(q,i)){
      appData.wrongSet[q.id]=true;
    }else{
      delete appData.wrongSet[q.id];
    }
    saveData(appData);
    renderQuiz();
    return;
  }
  saveData(appData);
  renderQuiz();
}

// For multi-select: confirm button
function confirmMultiAnswer(){
  let q=getCurrentQuizQuestion();
  let userAns=appData.answers[q.id]||[];
  if(!appData.multiConfirmed)appData.multiConfirmed={};
  appData.multiConfirmed[q.id]=true;
  if(!isCorrect(q,userAns)){
    appData.wrongSet[q.id]=true;
  }else{
    delete appData.wrongSet[q.id];
  }
  saveData(appData);
  renderQuiz();
}

function prevQuiz(){if(currentQIdx>0){currentQIdx--;renderQuiz()}}
function nextQuiz(){if(currentQIdx<quizOrder.length-1){currentQIdx++;renderQuiz()}}

function toggleFav(id){
  if(appData.favorites[id])delete appData.favorites[id];
  else appData.favorites[id]=true;
  saveData(appData);
}

      if(examTimeLeft<300)timerEl.classList.add('warn');

}

<div style="background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px">
  <button class="back-btn" style="color:#fff" onclick="currentScreen='exam';clearInterval(examTimer);renderExam();startExamTimerDisplay()">← 答题卡</button>

<div class="container">
  <div class="quiz-header"><span>${q.cat}</span><span>${isMulti?'多选':'单选'}</span></div>
  <div class="quiz-question">${q.q}</div>
  <div class="quiz-options">`;

    let cls='quiz-option';

    if(isMulti&&Array.isArray(userAns)&&userAns.includes(i))cls+=' selected';

  });
  html+=`</div>
  <div class="btn-row mt-12">
    <button class="btn btn-outline btn-sm" ${currentQIdx===0?'disabled':''} onclick="prevExamQ()">上一题</button>
    <button class="btn btn-primary btn-sm" ${currentQIdx>=29?'disabled':''} onclick="nextExamQ()">下一题</button>

function selectExamAnswer(i){
  let q=examQuestions[currentQIdx];
  if(Array.isArray(q.a)){
    if(!Array.isArray(examAnswers[q.id]))examAnswers[q.id]=[];
    let idx=examAnswers[q.id].indexOf(i);
    if(idx>=0)examAnswers[q.id].splice(idx,1);else examAnswers[q.id].push(i);
  }else{
    examAnswers[q.id]=i;
  }
  renderExamQuiz();
}

function prevExamQ(){if(currentQIdx>0){currentQIdx--;renderExamQuiz()}}
function nextExamQ(){if(currentQIdx<29){currentQIdx++;renderExamQuiz()}}

function startExamTimerDisplay(){
  examTimer=setInterval(()=>{
    examTimeLeft--;
    if(examTimeLeft<=0){submitExam();return;}
    let timerEl=document.getElementById('examTimer');
    if(timerEl){
      let m=Math.floor(examTimeLeft/60),s=examTimeLeft%60;
      timerEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if(examTimeLeft<300)timerEl.classList.add('warn');
    }
  },1000);
}

function submitExam(){
  clearInterval(examTimer);
  // Save answers
  Object.keys(examAnswers).forEach(id=>{
    appData.answers[id]=examAnswers[id];
    let q=questionBank.find(q=>q.id===parseInt(id));
    if(q&&!isCorrect(q,examAnswers[id]))appData.wrongSet[id]=true;
  });
  saveData(appData);
  currentScreen='examResult';
  renderExamResult();
}

function renderExamResult(){
  let total=examQuestions.length;
  let correct=0;
  let details=[];
  examQuestions.forEach(q=>{
    let userAns=examAnswers[q.id];
    let right=userAns!==undefined&&isCorrect(q,userAns);
    if(right)correct++;
    details.push({q,userAns,right});
  });
  let rate=Math.round(correct/total*100);
  let grade=rate>=90?'🏆 优秀':rate>=75?'👍 良好':rate>=60?'📚 及格':'💪 继续加油';
  let html=`
<div style="background:var(--primary);color:#fff;padding:20px 16px;text-align:center">
  <button class="back-btn" style="color:#fff" onclick="currentScreen='home';render()">← 返回首页</button>
  <div class="score" style="font-size:64px">${rate}</div>
  <div style="font-size:18px">${grade}</div>
  <div style="font-size:14px;opacity:.85;margin-top:4px">${correct}/${total} 正确</div>
</div>
<div class="container">`;
  details.forEach((d,i)=>{
    let q=d.q;
    let userAns=d.userAns;
    let isRight=d.right;
    let isMulti=Array.isArray(q.a);
    let correctLabel=isMulti?q.a.map(i=>'ABCDEFGH'[i]).join('、'):'ABCDEFGH'[q.a];
    let userLabel=userAns===undefined?'未作答':(isMulti?(Array.isArray(userAns)?userAns.map(i=>'ABCDEFGH'[i]).join('、'):''):'ABCDEFGH'[userAns]);
    html+=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="badge ${isRight?'tag-correct':'tag-wrong'}" style="background:${isRight?'#e8f5e9':'#fde8ec'};color:${isRight?'var(--green)':'var(--accent)'}">${isRight?'✓':'✗'} 第${i+1}题</span>

function parseNoteToQuestions(text,cat){
  let questions=[];
  // 按句号、分号、换行拆分
  let sentences=text.split(/[。；\n]+/).map(s=>s.trim()).filter(s=>s.length>6);

  sentences.forEach(s=>{
    // 1. 识别定义/概念句："XX是YY"、"XX指YY"、"XX称为YY"
    let defMatch=s.match(/(.{2,20})[是指称为]+(.{2,40})/);
    if(defMatch){
      let term=defMatch[1].replace(/[,，\s]+/g,'');
      let def=defMatch[2].replace(/[,，\s]+/g,'');
      if(term.length>=2&&def.length>=3){
        // 生成错误干扰项
        let wrongDefs=generateWrongDefs(def);
        let o=[def,...wrongDefs].sort(()=>Math.random()-.5);
        questions.push({
          q:`${term}的含义是？`,
          o:o,
          a:o.indexOf(def),
          exp:s,
          cat:cat,
          custom:true
        });
      }
    }

    // 2. 识别数字/时间句：包含数字的句子
    let numMatch=s.match(/(\d{2,4}[一-龥]{0,2}[年月日])|(\d+[一-龥]*[万亿千百个件座家次])/);
    if(numMatch&&!defMatch&&s.length<60){
      let numStr=numMatch[0];
      let prefix=s.substring(0,s.indexOf(numStr)).replace(/[,，\s]+/g,'').slice(-8);
      if(prefix.length>=2){
        let wrongNum=generateWrongNums(numStr);
        let o=[numStr,...wrongNum].sort(()=>Math.random()-.5);
        questions.push({
          q:`${prefix}是多少？`,
          o:o,
          a:o.indexOf(numStr),
          exp:s,
          cat:cat,
          custom:true
        });
      }
    }

    // 3. 识别"不包括/禁止/不得"句 → 判断题
    if((s.includes('不')||s.includes('禁止')||s.includes('不得'))&&s.length<80&&!defMatch){
      let positive=s.replace(/不/g,'').replace(/禁止/g,'可以').replace(/不得/g,'可以');
      questions.push({
        q:s,
        o:['正确','错误'],
        a:0,
        exp:s,
        cat:cat,
        custom:true
      });
    }
  });

  // 去重
  let seen=new Set();
  return questions.filter(q=>{
    let key=q.q;
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  });
}

function generateWrongDefs(correct){
  let wrongs=['与'+correct+'无关的概念','对'+correct+'的相反表述','历史上曾有争议的另一种说法','常见误解：混淆了相关概念'];
  return wrongs.slice(0,3);
}

function generateWrongNums(correct){
  let n=parseInt(correct.replace(/[^\d]/g,''));
  if(isNaN(n))return ['数值A','数值B','数值C'];
  let wrongs=[];
  if(n>100){wrongs.push((n*0.5).toFixed(0)+correct.replace(/\d/g,''));wrongs.push((n*0.8).toFixed(0)+correct.replace(/\d/g,''));wrongs.push((n*1.3).toFixed(0)+correct.replace(/\d/g,''))}
  else if(n>10){wrongs.push((n-3)+correct.replace(/\d/g,''));wrongs.push((n+2)+correct.replace(/\d/g,''));wrongs.push((n*2)+correct.replace(/\d/g,''))}
  else{wrongs.push((n+1)+correct.replace(/\d/g,''));wrongs.push((n+2)+correct.replace(/\d/g,''));wrongs.push((n+3)+correct.replace(/\d/g,''))}
  return wrongs;
}

  <button class="back-btn" style="color:#fff" onclick="currentScreen='notes';renderNotes()">← 返回笔记</button>
  <h2 style="margin-top:4px">🧠 智能出题</h2>
  <p style="font-size:13px;opacity:.85">从笔记中识别出 ${genQuestions.length} 道候选题目</p>
</div>
<div class="container">
  <p class="text-sub mb-12">点击题目可编辑，确认后存入个人题库</p>`;
  if(genQuestions.length===0){
    html+=`<div class="card text-center"><p style="font-size:48px">🔍</p><p>笔记中未识别到适合出题的内容</p><p class="text-sub">试试写一些包含数字、定义或判断的笔记</p></div>`;
  }else{
    genQuestions.forEach((q,i)=>{
      html+=`
      <div class="card" style="cursor:pointer" onclick="editGenQ(${i})">
        <span class="badge" style="margin-bottom:4px;display:inline-block">${q.cat}</span>
        <div style="font-weight:500;font-size:14px">${i+1}. ${escHtml(q.q)}</div>
        <div style="font-size:12px;color:var(--sub);margin-top:4px">答案：${escHtml(q.o[q.a])} | 选项数：${q.o.length}</div>
      </div>`;
    });
    html+=`
    <div class="btn-row mt-12">
      <button class="btn btn-outline" onclick="currentScreen='notes';renderNotes()">🔙 返回</button>
      <button class="btn btn-primary" onclick="saveAllGen()">💾 全部存入题库 (${genQuestions.length}题)</button>
    </div>`;
  }
  html+=`</div>`;
  app.innerHTML=html;
}

function editGenQ(idx){
  genEditIdx=idx;
  renderGenEditor();
}

function renderGenEditor(){
  let q=genQuestions[genEditIdx];
  let html=`
<div style="background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px">
  <button class="back-btn" style="color:#fff" onclick="renderGenPreview()">←</button>
  <span style="flex:1;font-weight:600">编辑题目 ${genEditIdx+1}/${genQuestions.length}</span>
  <button style="background:none;border:none;color:#fff;font-size:16px;cursor:pointer" onclick="genQuestions.splice(${genEditIdx},1);renderGenPreview()">🗑️</button>
</div>
<div class="container">
  <div style="margin-bottom:12px">
    <label style="font-size:13px;color:var(--sub);display:block;margin-bottom:4px">题目</label>
    <textarea id="genQ" rows="3" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;resize:vertical">${escHtml(q.q)}</textarea>
  </div>
  <div style="margin-bottom:12px">
    <label style="font-size:13px;color:var(--sub);display:block;margin-bottom:4px">分类</label>
    <select id="genCat" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit">
      ${noteCats.map(c=>`<option value="${c}" ${q.cat===c?'selected':''}>${c}</option>`).join('')}
    </select>
  </div>`;
  q.o.forEach((opt,i)=>{
    let isAnswer=q.a===i;
    html+=`
    <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
      <input id="genOpt${i}" value="${escHtml(opt)}" style="flex:1;padding:10px;border:1.5px solid ${isAnswer?'var(--green)':'var(--border)'};border-radius:8px;font-size:14px;font-family:inherit" placeholder="选项${'ABCDEFGH'[i]}">
      <input type="radio" name="genAns" value="${i}" ${isAnswer?'checked':''} style="width:20px;height:20px;cursor:pointer" title="设为正确答案">
    </div>`;
  });
  html+=`
  <div style="margin-bottom:12px">
    <label style="font-size:13px;color:var(--sub);display:block;margin-bottom:4px">解析</label>
    <textarea id="genExp" rows="2" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical">${escHtml(q.exp||'')}</textarea>
  </div>
  <button class="btn btn-primary" onclick="saveGenEdit()">💾 保存修改</button>
</div>`;
  app.innerHTML=html;
}

function saveGenEdit(){
  genQuestions[genEditIdx]={
    q:document.getElementById('genQ').value.trim(),
    o:['A','B','C','D'].map((_,i)=>document.getElementById('genOpt'+i)?.value||'').filter(x=>x),
    a:parseInt(document.querySelector('input[name="genAns"]:checked')?.value||'0'),
    exp:document.getElementById('genExp').value.trim(),
    cat:document.getElementById('genCat').value,
    custom:true
  };
  renderGenPreview();
}

function saveAllGen(){
  genQuestions.forEach(q=>{
    let idx=appData.customQuestions.length;
    appData.customQuestions.push({...q,custom:true});
    questionBank.push({...q,cat:'📝 自定义题库',id:90000+idx,_customIdx:idx,custom:true});
  });
  saveData(appData);
  alert(`已存入 ${genQuestions.length} 道题到个人题库！刷新后在章节练习中找到"📝 自定义题库"`);
  genQuestions=[];
  currentScreen='notes';
  renderNotes();
}

// ===== 数据导出导入 =====
function exportData(){
  let data={...appData,exportTime:new Date().toISOString()};
  let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;a.download='上博刷题_备份_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  let file=e.target.files[0];
  if(!file)return;
  let reader=new FileReader();
  reader.onload=function(ev){
    try{
      let data=JSON.parse(ev.target.result);
      if(!data.answers||!data.favorites){alert('文件格式不正确，不是有效的备份文件');return}
      if(!confirm(`即将导入：\n• ${Object.keys(data.answers||{}).length} 条做题记录\n• ${Object.keys(data.favorites||{}).length} 条收藏\n• ${Object.keys(data.wrongSet||{}).length} 道错题\n• ${(data.notes||[]).length} 条笔记\n• ${(data.customQuestions||[]).length} 道自定义题目\n\n确定覆盖当前数据？`))return;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
      location.reload();
    }catch(err){alert('导入失败：'+err.message)}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ===== INIT =====
// 尝试初始化 Firebase 云同步
if(FIREBASE_CONFIG.apiKey!=='YOUR_API_KEY'){
  initFirebase();
}
render();
</script>
</body>
</html>
